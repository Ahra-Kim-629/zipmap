spring.application.name=zipmap
spring.thymeleaf.cache=false

# 2. Standard Spring Boot properties for multipart file uploads
# Maximum size of a single file
spring.servlet.multipart.max-file-size=10MB
# Maximum size of a request (including all files and form data)
spring.servlet.multipart.max-request-size=10MB
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/zipmap?serverTimezone=Asia/Seoul
spring.profiles.include=secret

mybatis.mapper-locations=mappers/*Mapper.xml
mybatis.configuration.map-underscore-to-camel-case=true

# SQL Logging
logging.level.com.example.board.repository=TRACE

# DevTools
spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true
