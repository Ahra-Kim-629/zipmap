spring.application.name=zipmap
spring.thymeleaf.cache=false

spring.servlet.multipart.max-file-size=150MB
spring.servlet.multipart.max-request-size=150MB
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/zipmap?allowMultiQueries=true&serverTimezone=Asia/Seoul

spring.config.import=optional:application-secret.properties

mybatis.mapper-locations=mappers/*Mapper.xml
mybatis.configuration.map-underscore-to-camel-case=true

# SQL Logging
logging.level.com.daedong.zipmap.mapper=TRACE

# DevTools
spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true

server.servlet.session.persistent=false

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

server.tomcat.max-part-count=100

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Redis ?? ?? ??? ?? ??
spring.data.redis.repositories.enabled=false
spring.cache.type=none

# (??) Redis ?? ?? ???? ???? ??? ??
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# MyBatis ENUM ??? ??( MyBatis? ENUM ??? ??? ? ??? ??? ?? ?? )
mybatis.configuration.default-enum-type-handler=org.apache.ibatis.type.EnumTypeHandler