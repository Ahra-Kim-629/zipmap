spring.application.name=zipmap
spring.thymeleaf.cache=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/zipmap?serverTimezone=Asia/Seoul
spring.profiles.include=secret
spring.datasource.username=root
spring.datasource.password=0000

mybatis.mapper-locations=classpath:postmapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# SQL Logging
logging.level.com.example.board.mappers=TRACE

# DevTools
spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true
