spring.application.name=zipmap
spring.thymeleaf.cache=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/zipmap?serverTimezone=Asia/Seoul

spring.profiles.include=secret

mybatis.mapper-locations=mappers/*Mapper.xml
mybatis.configuration.map-underscore-to-camel-case=true

# SQL Logging
logging.level.com.daedong.zipmap.mapper=TRACE

# DevTools
spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true

server.servlet.session.persistent=false

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# registration
spring.security.oauth2.client.registration.naver.client-id=ZlQphHM3Qkz_wkZ6hlHV
spring.security.oauth2.client.registration.naver.client-secret=vbtQvpcvox
spring.security.oauth2.client.registration.naver.redirect-uri=http://localhost:8080/login/oauth2/code/naver
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.scope=name,email,gender,mobile
spring.security.oauth2.client.registration.naver.client-name=Naver

# provider
spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response

spring.mvc.pathmatch.matching-strategy=ant_path_matcher