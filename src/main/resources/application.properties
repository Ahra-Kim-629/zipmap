spring.application.name=zipmap

# Thymeleaf Cache Disable
spring.thymeleaf.cache=false

# MySQL Setting
spring.datasource.url=jdbc:mysql://localhost:3306/zipmap
spring.datasource.username=root
spring.datasource.password=0000
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis Setting
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.daedong.zipmap.domain

# -------------------------------------------------
# File Upload Configuration
# -------------------------------------------------
# 1. Custom property for upload directory path
file.upload-dir=C:/upload/

# 2. Standard Spring Boot properties for multipart file uploads
# Maximum size of a single file
spring.servlet.multipart.max-file-size=10MB
# Maximum size of a request (including all files and form data)
spring.servlet.multipart.max-request-size=10MB