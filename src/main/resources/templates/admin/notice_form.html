<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>공지사항 작성</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>
    <h1>공지사항 작성</h1>
    <form th:action="@{/admin/notice}" method="post">
        <div>
            <label for="title">제목</label>
            <input type="text" id="title" name="title" required>
        </div>
        <div>
            <label for="content">내용</label>
            <textarea id="content" name="content" rows="10" required></textarea>
        </div>
        <div>
            <label for="startDate">게시 시작 일시:</label>
            <input type="text" id="startDate" name="startDate" placeholder="시작 날짜와 시간을 선택하세요">
        </div>
        <div>
            <label for="endDate">게시 종료 일시:</label>
            <input type="text" id="endDate" name="endDate" placeholder="종료 날짜와 시간을 선택하세요">
        </div>
        <div>
            <button type="submit">등록</button>
            <button type="button" onclick="history.back()">취소</button>
        </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <script th:src="@{/js/admin-notice.js}"></script>
</body>
</html>
