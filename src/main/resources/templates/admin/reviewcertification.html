<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <title>리뷰 목록</title>
    <!-- CSRF 토큰 설정 -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <!-- JQuery 추가 -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- CSS: 테이블, 검색, 체크박스, 지도 -->
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;
        }

        .pagination {
            margin-top: 20px;
            text-align: center;
        }

        .pagination a, .pagination strong {
            margin: 0 5px;
            text-decoration: none;
            color: black;
        }

        .pagination strong {
            font-weight: bold;
            color: red;
        }

        .search-container {
            margin-bottom: 20px;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 5px;
        }

        .checkbox-group {
            margin: 5px 0;
        }

        .checkbox-group label {
            margin-right: 10px;
        }

        #map {
            width: 100%;
            height: 400px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }
    </style>

</head>

<body>

<div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px;">
    <h1 style="margin: 0;">리뷰 목록</h1>
    <a th:href="@{/admin}"
       style="padding: 6px 16px; border: 1px solid #343a40; border-radius: 50px; text-decoration: none; color: #343a40; font-size: 14px; background-color: white;">
        관리자 홈
    </a>
</div>

<!-- 리뷰 테이블 -->
<table>
    <colgroup>
        <col style="width: 10%">
        <col style="width: 30%">
        <col style="width: 15%">
        <col style="width: 10%">
        <col style="width: 10%">
        <col style="width: 10%">
        <col style="width: 15%">
    </colgroup>
    <thead>
    <tr>
        <th>인증 사진</th>
        <th>제목</th>
        <th>주소</th>
        <th>작성자 ID</th>
        <th>평점</th>
        <th>작성일</th>
        <th>관리</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="review : ${reviews.content}" class="review-item">

        <td>
            <div th:if="${review.filePath != null}" style="text-align: center;">
                <div style="width: 80px; height: 60px; overflow: hidden; margin: 0 auto; border: 1px solid #ddd; border-radius: 4px;">
                    <img th:src="|/files/${review.filePath}|"
                         alt="인증 사진"
                         style="width: 100%; height: 100%; object-fit: cover; cursor: pointer;"
                         onclick="window.open(this.src)">
                </div>
                <!-- 다운로드 링크 추가 -->
                <a th:href="|/files/${review.filePath}|" download style="display: inline-block; margin-top: 5px; font-size: 11px; text-decoration: none; color: blue;">[다운로드]</a>
            </div>
            <span th:if="${review.filePath == null}" style="font-size: 11px; color: #999;">사진 없음</span>
        </td>

        <td style="text-align: left;">
            <!-- [수정] 상세 페이지 링크 변경 -->
            <a th:href="@{/admin/certification/confirm/{id}(id=${review.id})}" th:text="${review.title}" style="font-weight: bold;"></a>
        </td>

        <td th:text="${review.address != null && review.address.contains('동 ') ? review.address.substring(0, review.address.indexOf('동 ') + 1) : review.address}"></td>
        <td th:text="${review.loginId}"></td>
        <td th:text="${review.point}"></td>
        <td th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd')}"></td>

        <td>
            <div style="display: flex; gap: 5px; justify-content: center; align-items: center;">
                <!-- 승인 버튼 -->
                <button type="button" th:onclick="'updateStatus(' + ${review.id} + ', \'ACTIVE\')'"
                        style="background-color: #28a745; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;">
                    승인
                </button>

                <!-- 반려 버튼 -->
                <button type="button" th:onclick="'updateStatus(' + ${review.id} + ', \'BANNED\')'"
                        style="background-color: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;">
                    반려
                </button>
            </div>
            <div th:if="${review.reviewStatus.name() == 'REJECTED'}" class="alert alert-warning">
                <strong>[반려됨]</strong> 사유: <span th:text="${review.rejectMessage}">서류가 흐릿합니다.</span>
                <a th:href="@{/review/certification(reviewId=${review.id})}" class="btn btn-sm btn-outline-dark">다시 인증하기</a>
            </div>

            <form id="statusForm" th:action="@{/admin/reviews/update-certification}" method="post" style="display: none;">
                <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}"/>
                <input type="hidden" name="reviewId" id="formReviewId">
                <input type="hidden" name="status" id="formStatus">
                <input type="hidden" name="message" id="formMessage">
            </form>
        </td>
    </tr>
    </tbody>
</table>

<!-- 페이징 -->
<div class="pagination" th:if="${reviews.totalPages > 0}">
    <a th:if="${!reviews.first}"
       th:href="@{/admin/certification/list(page=${reviews.number-1})}">&laquo;
        이전</a>
    <span th:if="${reviews.first}" style="color: gray;">&laquo; 이전</span>

    <span th:each="page: ${#numbers.sequence(0, reviews.totalPages-1)}">
        <a th:if="${page != reviews.number}"
           th:href="@{/admin/certification/list(page=${page})}"
           th:text="${page+1}"></a>
        <strong th:if="${page == reviews.number}" th:text="${page+1}"></strong>
    </span>

    <a th:if="${!reviews.last}"
       th:href="@{/admin/certification/list(page=${reviews.number+1})}">다음
        &raquo;</a>
    <span th:if="${reviews.last}" style="color: gray;">다음 &raquo;</span>
</div>


</body>
<script>
    function updateStatus(reviewId, status) {
        const token = $("meta[name='_csrf']").attr("content");
        const header = $("meta[name='_csrf_header']").attr("content");

        if (status === 'BANNED') {
            // 반려 사유 입력 받기
            let reasonCode = prompt("반려 사유를 선택하세요.\n1. 서류 미비\n2. 서류 화질 미비\n3. 기타 (직접 입력)", "1");

            if (reasonCode === null) return; // 취소

            let message = "";
            if (reasonCode === "1") message = "서류 미비";
            else if (reasonCode === "2") message = "서류 화질 미비";
            else if (reasonCode === "3") {
                message = prompt("반려 사유를 직접 입력해주세요.");
                if (!message || message.trim() === "") {
                    alert("사유를 입력해야 합니다.");
                    return;
                }
            } else {
                alert("잘못된 선택입니다.");
                return;
            }

            if (confirm(`'${message}' 사유로 반려하시겠습니까?`)) {
                $.ajax({
                    url: "/admin/reviews/update-status", // AdminController의 메서드 매핑 확인 필요
                    type: "POST",
                    data: {
                        reviewId: reviewId,
                        status: status,
                        message: message
                    },
                    beforeSend: function(xhr) {
                        if (token && header) xhr.setRequestHeader(header, token);
                    },
                    success: function(res) {
                        alert("반려 처리가 완료되었습니다.");
                        location.reload();
                    },
                    error: function(xhr) {
                        alert("오류가 발생했습니다: " + xhr.responseText);
                    }
                });
            }
        } else if (status === 'ACTIVE') {
            // 승인 처리
            if (confirm("이 리뷰를 승인하시겠습니까?")) {
                $.ajax({
                    url: "/admin/reviews/update-status",
                    type: "POST",
                    data: {
                        reviewId: reviewId,
                        status: status
                    },
                    beforeSend: function(xhr) {
                        if (token && header) xhr.setRequestHeader(header, token);
                    },
                    success: function(res) {
                        alert("승인 처리가 완료되었습니다.");
                        location.reload();
                    },
                    error: function(xhr) {
                        alert("오류가 발생했습니다: " + xhr.responseText);
                    }
                });
            }
        }
    }
</script>
</html>
