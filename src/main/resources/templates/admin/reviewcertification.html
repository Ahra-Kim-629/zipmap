<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <title>리뷰 목록</title>

    <!-- CSS: 테이블, 검색, 체크박스, 지도 -->
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;
        }

        .pagination {
            margin-top: 20px;
            text-align: center;
        }

        .pagination a, .pagination strong {
            margin: 0 5px;
            text-decoration: none;
            color: black;
        }

        .pagination strong {
            font-weight: bold;
            color: red;
        }

        .search-container {
            margin-bottom: 20px;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 5px;
        }

        .checkbox-group {
            margin: 5px 0;
        }

        .checkbox-group label {
            margin-right: 10px;
        }

        #map {
            width: 100%;
            height: 400px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }
    </style>

</head>

<body>

<h1>리뷰 목록</h1>


<!-- 리뷰 테이블 -->
<table>
    <colgroup>
        <col style="width: 40%">
        <col style="width: 20%">
        <col style="width: 15%">
        <col style="width: 10%">
        <col style="width: 15%">
    </colgroup>
    <table>
        <colgroup>
            <col style="width: 10%"> <col style="width: 30%">
            <col style="width: 15%">
            <col style="width: 10%">
            <col style="width: 10%">
            <col style="width: 10%">
            <col style="width: 15%">
        </colgroup>
        <thead>
        <tr>
            <th>인증 사진</th> <th>제목</th>
            <th>주소</th>
            <th>작성자 ID</th>
            <th>평점</th>
            <th>작성일</th>
            <th>관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="review : ${reviews.content}"
            th:if="${review.reviewStatus == 'BANNED'}"
            class="review-item">

            <td>
                <div th:if="${review.filePath != null}" style="width: 80px; height: 60px; overflow: hidden; margin: 0 auto; border: 1px solid #ddd; border-radius: 4px;">
                    <img th:src="|/files/${review.filePath}|"
                         alt="인증 사진"
                         style="width: 100%; height: 100%; object-fit: cover; cursor: pointer;"
                         onclick="window.open(this.src)">
                </div>
                <span th:if="${review.filePath == null}" style="font-size: 11px; color: #999;">사진 없음</span>
            </td>

            <td style="text-align: left;">
                <a th:href="@{/review/detail/{id}(id=${review.id})}" th:text="${review.title}" style="font-weight: bold;"></a>
            </td>

            <td th:text="${review.address != null && review.address.contains('동 ') ? review.address.substring(0, review.address.indexOf('동 ') + 1) : review.address}"></td>
            <td th:text="${review.loginId}"></td>
            <td th:text="${review.point}"></td>
            <td th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd')}"></td>

            <td>
                <div style="display: flex; gap: 5px; justify-content: center; align-items: center;">
                    <form th:action="@{/admin/reviews/toggle-status}" method="post" style="margin: 0;">
                        <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}"/>
                        <input type="hidden" name="id" th:value="${review.id}">
                        <input type="hidden" name="status" value="ACTIVE">
                        <button type="submit" style="background-color: #28a745; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;">
                            승인
                        </button>
                    </form>

                    <a th:href="@{/admin/reviews/delete/{id}(id=${review.id})}"
                       onclick="return confirm('영구 삭제하시겠습니까?');"
                       style="color: white; background: #dc3545; padding: 5px 10px; border-radius: 4px; text-decoration: none; font-size: 12px;">
                        삭제
                    </a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

<!-- 페이징 -->
<div class="pagination" th:if="${reviews.totalPages > 0}">
    <a th:if="${!reviews.first}"
       th:href="@{/review(page=${reviews.number-1}, searchType=${searchType}, keyword=${keyword}, pros=${pros}, cons=${cons})}">&laquo;
        이전</a>
    <span th:if="${reviews.first}" style="color: gray;">&laquo; 이전</span>

    <span th:each="page: ${#numbers.sequence(0, reviews.totalPages-1)}">
        <a th:if="${page != reviews.number}"
           th:href="@{/review(page=${page}, searchType=${searchType}, keyword=${keyword}, pros=${pros}, cons=${cons})}"
           th:text="${page+1}"></a>
        <strong th:if="${page == reviews.number}" th:text="${page+1}"></strong>
    </span>

    <a th:if="${!reviews.last}"
       th:href="@{/review(page=${reviews.number+1}, searchType=${searchType}, keyword=${keyword}, pros=${pros}, cons=${cons})}">다음
        &raquo;</a>
    <span th:if="${reviews.last}" style="color: gray;">다음 &raquo;</span>
</div>


</body>
</html>
