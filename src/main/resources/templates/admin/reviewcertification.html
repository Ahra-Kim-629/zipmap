<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <style>
        .list-container { padding: 60px 0; background-color: #fdfcf9; }
        .list-card { background: #fff; padding: 40px; border-radius: 24px; border: none; }
        .table th { font-weight: 600; }
        .cert-thumbnail { width: 80px; height: 60px; object-fit: cover; border-radius: 8px; cursor: pointer; }
        .review-title { font-weight: bold; text-decoration: none; color: #333; }
        .review-title:hover { color: #0d6efd; }

        /* ✨ 페이징 디자인 (완벽 통일) */
        .pagination-container { margin-top: 40px; display: flex; justify-content: center; padding-bottom: 20px; }
        .pagination { display: flex; list-style: none; padding-left: 0; }
        .page-link { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: #555; border: none; margin: 0 4px; border-radius: 12px !important; font-weight: 700; transition: 0.2s; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.04); text-decoration: none; }
        .page-item.active .page-link { background-color: var(--main-orange, #ff7e00); border-color: var(--main-orange, #ff7e00); color: white; box-shadow: 0 4px 12px rgba(230, 126, 34, 0.3); }
        .page-link:hover:not(.active) { background-color: #f8f9fa; transform: translateY(-2px); color: #333; }
        .page-item.disabled .page-link { color: #ccc; pointer-events: none; background-color: #fcfcfc; box-shadow: none; }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="list-container">
        <div class="container">
            <div class="list-card daedong-shadow">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold">실거주 인증 관리</h2>
                    <a th:href="@{/admin}" class="btn btn-outline-secondary rounded-pill">관리자 홈</a>
                </div>

                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th scope="col" class="text-center">인증사진</th>
                            <th scope="col">제목</th>
                            <th scope="col">주소</th>
                            <th scope="col">작성자</th>
                            <th scope="col" class="text-center">평점</th>
                            <th scope="col" class="text-center">신청일</th>
                            <th scope="col" class="text-center">상태</th>
                            <th scope="col" class="text-center">관리</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="review : ${reviews.content}" class="review-item">
                            <td class="text-center">
                                <div th:if="${review.filePath != null}">
                                    <img th:src="@{/files/{path}(path=${review.filePath})}"
                                         class="cert-thumbnail" alt="인증 사진"
                                         onclick="window.open(this.src)">
                                </div>
                                <span th:unless="${review.filePath != null}" class="text-muted small">없음</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/certification/confirm/{id}(id=${review.id})}"
                                   th:text="${review.title}" class="review-title"></a>
                            </td>
                            <td th:text="${review.address != null && review.address.contains('동 ') ? review.address.substring(0, review.address.indexOf('동 ') + 1) : review.address}"></td>
                            <td th:text="${review.loginId}"></td>
                            <td class="text-center fw-bold" th:text="${review.point}"></td>
                            <td class="text-center" th:text="${#temporals.format(review.createdAt, 'yy-MM-dd')}"></td>
                            <td class="text-center">
                                <span th:if="${review.reviewStatus?.name() == 'PENDING'}" class="badge bg-warning text-dark">대기중</span>
                                <span th:if="${review.reviewStatus?.name() == 'ACTIVE'}" class="badge bg-success">승인</span>
                                <span th:if="${review.reviewStatus?.name() == 'BANNED'}" class="badge bg-danger">반려</span>
                            </td>
                            <td class="text-center">
                                <a th:href="@{/admin/certification/confirm/{id}(id=${review.id})}" class="btn btn-sm btn-primary">
                                    확인
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <!-- 페이징 -->
                <nav id="paginationContainer" class="pagination-container" th:if="${reviews != null and reviews.totalPages > 0}">
                    <ul class="pagination" th:with="
                        currentPage=${reviews.number + 1},
                        blockStart=${(currentPage - 1) div 5 * 5 + 1}">

                        <li class="page-item" th:classappend="${blockStart == 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/certification/list(page=${blockStart - 1})}">
                                <i class="bi bi-chevron-left"></i>
                            </a>
                        </li>

                        <li class="page-item"
                            th:each="page : ${#numbers.sequence(1, reviews.totalPages)}"
                            th:if="${page >= blockStart and page < blockStart + 5}"
                            th:classappend="${page == currentPage} ? 'active'">
                            <a class="page-link"
                               th:href="@{/admin/certification/list(page=${page})}"
                               th:text="${page}"></a>
                        </li>

                        <li class="page-item" th:classappend="${blockStart + 4 >= reviews.totalPages} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/certification/list(page=${blockStart + 5})}">
                                <i class="bi bi-chevron-right"></i>
                            </a>
                        </li>
                    </ul>
                </nav>

            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="script">
    <!-- No custom script needed for now, as actions are on the detail page -->
</th:block>
</html>
