<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<div layout:fragment="content">
  <div class="container mt-5">
    <h2 class="mb-4">🚨 신고 내역 관리</h2>
    <!-- 신고 글을 전체 목록 / 처리완료된 글만 / 안읽음 글만 나누게 해서 보게 하는 기능 -->
    <div class="d-flex justify-content-end mb-3">
      <div class="btn-group" role="group">
        <a th:href="@{/admin/report/list}"
           class="btn btn-sm" th:classappend="${currentFilter == null ? 'btn-dark' : 'btn-outline-dark'}">전체</a>
        <a th:href="@{/admin/report/list(status='PENDING')}"
           class="btn btn-sm" th:classappend="${currentFilter == 'PENDING' ? 'btn-warning' : 'btn-outline-warning'}">확인 안 함</a>
        <a th:href="@{/admin/report/list(status='CONFIRMED')}"
           class="btn btn-sm" th:classappend="${currentFilter == 'CONFIRMED' ? 'btn-success' : 'btn-outline-success'}">확인함</a>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">
        <table class="table table-hover text-center align-middle">
          <thead class="table-light">
          <tr>
            <th>번호</th>
            <th>유형</th> <!-- 게시글/리뷰 구분 -->
            <th>바로가기</th>
            <th>신고자</th>
            <th>사유</th>
            <th>상태</th>
            <th>날짜</th>
            <th>관리</th> <!-- 상세보기 -> 관리로 변경 -->
          </tr>
          </thead>
          <tbody>
          <tr th:each="report : ${reports}">
            <td th:text="${report.id}"></td>
            <td>
              <span class="badge bg-secondary" th:if="${report.targetType == 'POST'}">게시글</span>
              <span class="badge bg-info" th:if="${report.targetType == 'REVIEW'}">리뷰</span>
            </td>
            <td>
              <!-- 게시글인 경우 -->
              <a th:if="${report.targetType == 'POST'}" th:href="@{/post/detail/{id}(id=${report.targetId})}" class="btn btn-sm btn-outline-primary" target="_blank">
                게시글 보기 <i class="bi bi-box-arrow-up-right"></i>
              </a>
              <!-- 리뷰인 경우 -->
              <a th:if="${report.targetType == 'REVIEW'}" th:href="@{/review/detail/{id}(id=${report.targetId})}" class="btn btn-sm btn-outline-info" target="_blank">
                리뷰 보기 <i class="bi bi-box-arrow-up-right"></i>
              </a>
            </td>
            <td th:text="${report.reporterName}"></td> <!-- 신고자 이름 표시 -->
            <td>
              <!-- 신고 사유 한글 변환 -->
              <span th:switch="${report.reasonType}">
                <span th:case="'SPAM'">스팸/홍보</span>
                <span th:case="'ABUSE'">욕설/비하</span>
                <span th:case="'INAPPROPRIATE'">부적절한 콘텐츠</span>
                <span th:case="'ETC'">기타</span>
                <span th:case="*" th:text="${report.reasonType}"></span>
              </span>
            </td>
            <!-- 상태 (Status) 처리 완료 / 안 읽음 부분 처리 -->
            <td>
              <a th:href="@{/admin/report/toggleStatus/{id}(id=${report.id}, currentFilter=${currentFilter})}"
                 style="text-decoration: none;">
    <span class="badge shadow-sm"
          th:classappend="${report.status.name() == 'PENDING' ? 'bg-warning' : 'bg-success'}"
          th:text="${report.status.name() == 'PENDING' ? '확인 안 함' : '확인됨'}"
          style="cursor: pointer;">
    </span>
              </a>
            </td>
            <!-- 신고 등록일,시간 날짜 표시 -->
            <td th:text="${#temporals.format(report.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
            <td>
              <div class="d-flex gap-2 justify-content-center">
                <!-- 상세보기 모달 트리거 버튼 -->
                <button type="button" class="btn btn-sm btn-secondary" data-bs-toggle="modal" th:data-bs-target="'#reportModal' + ${report.id}">
                  내용 보기
                </button>

                <!-- 삭제 버튼 추가 -->
                <a th:href="@{/admin/report/delete/{id}(id=${report.id})}"
                   class="btn btn-sm btn-danger"
                   onclick="return confirm('정말 삭제하시겠습니까?');">
                  삭제
                </a>
              </div>

              <!-- 모달 -->
              <div class="modal fade" th:id="'reportModal' + ${report.id}" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered">
                  <div class="modal-content">
                    <div class="modal-header">
                      <h5 class="modal-title">신고 상세 내용</h5>
                      <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body text-start">
                      <p><strong>신고 대상:</strong> <span th:text="${report.targetType == 'POST' ? '게시글' : '리뷰'}"></span></p>
                      <p><strong>신고 사유:</strong>
                        <span th:switch="${report.reasonType}">
                          <span th:case="'SPAM'">스팸/영리목적 홍보</span>
                          <span th:case="'ABUSE'">욕설/비하발언/인신공격</span>
                          <span th:case="'INAPPROPRIATE'">부적절한 콘텐츠 (음란물/도박)</span>
                          <span th:case="'ETC'">기타 (직접 입력)</span>
                          <span th:case="*" th:text="${report.reasonType}"></span>
                        </span>
                      </p>
                      <p><strong>상세 내용:</strong></p>
                      <div class="p-3 bg-light rounded mb-3" th:text="${report.content}" style="white-space: pre-wrap;"></div>

                      <div th:if="${report.filePath != null}">
                        <p><strong>첨부 파일:</strong></p>
                        <img th:src="|/files/${report.filePath}|"
                             class="img-fluid rounded"
                             alt="증거 사진"
                             style="max-height: 400px; width: auto;">
                      </div>
                    </div>
                    <div class="modal-footer">
                      <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
                    </div>
                  </div>
                </div>
              </div>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(reports)}">
            <td colspan="8">신고 내역이 없습니다.</td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
</html>
