<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <style>
        /* [1] 배경 및 전체 레이아웃 */
        body { background-color: #f4f7f6 !important; }
        .admin-list-container { padding: 40px 0; min-height: calc(100vh - 250px); }

        /* [2] 메인 카드 컨테이너 (통합 디자인) */
        .list-card {
            background: #fff;
            padding: 40px;
            border-radius: 24px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* [3] 테이블 디자인 (실거주 인증 관리 스타일과 100% 통일) */
        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; border: none; }
        .table {
            min-width: 1100px;
            border-collapse: separate;
            border-spacing: 0 12px; /* 행 사이 간격 */
            margin-top: -10px;
        }

        /* 헤더 스타일 */
        .table thead th {
            background-color: #f8f9fa !important;
            color: #6c757d;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 15px;
            border: none;
            text-align: center;
        }

        /* 행(Row) 스타일: 마우스 올렸을 때 색상만 변경 (움직임 제거) */
        .table tbody tr {
            background-color: #fff;
            transition: background-color 0.2s ease;
        }
        .table tbody tr:hover {
            background-color: #f8f9fa !important;
        }

        .table td {
            vertical-align: middle;
            padding: 20px 15px;
            border: none !important;
            text-align: center;
        }

        /* [4] 버튼 스타일 (민트/초록 테마 통일) */
        .btn-theme {
            background-color: #3f8a7e;
            color: #fff;
            border-radius: 50px;
            padding: 8px 18px;
            font-weight: 600;
            border: none;
            transition: 0.3s;
            font-size: 0.85rem;
        }
        .btn-theme:hover { background-color: #325e5a; color: #fff; }

        .btn-delete-custom {
            background-color: #ffeded;
            color: #dc3545;
            padding: 8px 18px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .btn-delete-custom:hover { background-color: #dc3545; color: white; }

        /* [5] 페이징 디자인 (민트/초록 테마) */
        .pagination-container { margin-top: 40px; display: flex; justify-content: center; }
        .pagination { display: flex; list-style: none; padding-left: 0; }
        .page-link {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            color: #555; border: none; margin: 0 4px; border-radius: 12px !important;
            font-weight: 700; transition: all 0.2s ease; background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); text-decoration: none;
        }
        .page-item.active .page-link {
            background-color: #3f8a7e !important;
            color: white !important;
            box-shadow: 0 4px 12px rgba(63, 138, 126, 0.3);
        }
        .page-link:hover:not(.active) {
            background-color: #325e5a;
            transform: translateY(-2px);
            color: #fff;
        }
        .page-item.disabled .page-link { color: #ccc; pointer-events: none; background-color: #fcfcfc; }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="admin-list-container">
        <div class="container">
            <div class="list-card daedong-shadow">

                <div class="d-flex justify-content-between align-items-center mb-5">
                    <h2 class="fw-bold mb-0 text-dark">
                        <i class="bi bi-chat-left-text-fill me-2" style="color: #3f8a7e;"></i>리뷰 목록 관리
                    </h2>
                    <a th:href="@{/admin}" class="btn btn-outline-secondary rounded-pill px-3 shadow-sm">
                        <i class="bi bi-house-door me-1"></i>관리자 홈
                    </a>
                </div>

                <div class="table-wrapper">
                    <table class="table align-middle">
                        <thead>
                        <tr>
                            <th style="width: 35%">제목</th>
                            <th style="width: 15%">주소</th>
                            <th style="width: 12%">작성자 ID</th>
                            <th style="width: 8%">평점</th>
                            <th style="width: 15%">작성일</th>
                            <th style="width: 15%">관리</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="review : ${reviews.content}">
                            <td style="text-align: left; padding-left: 25px;">
                                <a th:href="@{/review/detail/{id}(id=${review.id})}"
                                   th:text="${review.title}"
                                   class="text-dark fw-bold text-decoration-none"></a>
                            </td>
                            <td th:text="${review.address != null && review.address.contains('동 ') ? review.address.substring(0, review.address.indexOf('동 ') + 1) : review.address}"></td>
                            <td th:text="${review.loginId}"></td>
                            <td class="fw-bold text-primary" th:text="${review.point}"></td>
                            <td class="text-muted small" th:text="${review.createdAt != null ? #temporals.format(review.createdAt, 'yyyy-MM-dd HH:mm') : ''}"></td>
                            <td>
                                <div class="d-flex gap-2 justify-content-center align-items-center">
                                    <form th:action="@{/admin/reviews/toggle-status}" method="post" class="m-0">
                                        <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}"/>
                                        <input type="hidden" name="id" th:value="${review.id}">
                                        <input type="hidden" name="status" th:value="${review.reviewStatus == 'ACTIVE' ? 'BANNED' : 'ACTIVE'}">

                                        <button type="submit" th:if="${review.reviewStatus == 'ACTIVE'}"
                                                class="btn-theme">
                                            숨기기
                                        </button>
                                        <button type="submit" th:if="${review.reviewStatus == 'BANNED'}"
                                                class="btn btn-secondary rounded-pill px-3" style="font-size: 0.85rem; font-weight: 600;">
                                            노출하기
                                        </button>
                                    </form>

                                    <a th:href="@{/admin/reviews/delete/{id}(id=${review.id})}"
                                       onclick="return confirm('정말 영구 삭제하시겠습니까?');"
                                       class="btn-delete-custom">
                                        삭제
                                    </a>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <nav id="paginationContainer" class="pagination-container" th:if="${reviews.totalPages > 0}">
                    <ul class="pagination" th:with="
                        currentPage=${reviews.number + 1},
                        blockStart=${(currentPage - 1) div 5 * 5 + 1}">

                        <li class="page-item" th:classappend="${blockStart == 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/reviews(page=${blockStart - 1}, searchType=${searchType}, keyword=${keyword})}">
                                <i class="bi bi-chevron-left"></i>
                            </a>
                        </li>

                        <li class="page-item"
                            th:each="p : ${#numbers.sequence(1, reviews.totalPages)}"
                            th:if="${p >= blockStart and p < blockStart + 5}"
                            th:classappend="${p == currentPage} ? 'active'">
                            <a class="page-link"
                               th:href="@{/admin/reviews(page=${p}, searchType=${searchType}, keyword=${keyword})}"
                               th:text="${p}"></a>
                        </li>

                        <li class="page-item" th:classappend="${blockStart + 4 >= reviews.totalPages} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/reviews(page=${blockStart + 5}, searchType=${searchType}, keyword=${keyword})}">
                                <i class="bi bi-chevron-right"></i>
                            </a>
                        </li>
                    </ul>
                </nav>

            </div>
        </div>
    </div>
</div>
</html>
