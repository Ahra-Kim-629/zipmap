<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <style>
        /* 배경 및 컨테이너 스타일 */
        .admin-list-container { padding: 60px 0; background-color: #f4f7f6; min-height: 80vh; }
        .list-card { background: #f4f7f6; padding: 40px; border-radius: 24px; border: none; }
        .list-title { font-weight: 800; color: #3E362E; margin-bottom: 30px; }

        /* 테이블 래퍼 및 테이블 디자인 */
        .table-wrapper { border-radius: 15px; overflow: hidden; border: 1px solid #eee; }
        .table { margin-bottom: 0; width: 100%; border-collapse: collapse; }
        .table thead { background-color: #f8f9fa; }
        .table th { font-weight: 700; color: #555; font-size: 0.9rem; padding: 15px; border-bottom: 2px solid #eee; text-align: center; }
        .table td { vertical-align: middle; padding: 15px; font-size: 0.95rem; border-bottom: 1px solid #f1f1f1; text-align: center; }

        /* 버튼 공통 스타일 */
        .btn-toggle { padding: 6px 16px; font-weight: 600; font-size: 0.85rem; border-radius: 50px; border: none; transition: 0.3s; }
        .btn-delete { background-color: #dc3545; color: white; padding: 6px 16px; font-size: 0.85rem; border-radius: 50px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn-delete:hover { background-color: #c82333; color: white; }

        /* 페이징 디자인 (사용자 페이지와 완벽 통일) */
        .pagination-container { margin-top: 40px; display: flex; justify-content: center; }
        .pagination { display: flex; list-style: none; padding-left: 0; }
        .page-link { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: #555; border: none; margin: 0 4px; border-radius: 12px !important; font-weight: 700; transition: 0.2s; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.04); text-decoration: none; }
        .page-item.active .page-link { background-color: var(--main-orange, #ff7e00); border-color: var(--main-orange, #ff7e00); color: white; box-shadow: 0 4px 12px rgba(230, 126, 34, 0.3); }
        .page-link:hover:not(.active) { background-color: #f8f9fa; transform: translateY(-2px); color: #333; }
        .page-item.disabled .page-link { color: #ccc; pointer-events: none; background-color: #fcfcfc; box-shadow: none; }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="admin-list-container">
        <div class="container">
            <div class="list-card daedong-shadow">


                <div class="position-relative">
                    <h2 class="list-title text-center">리뷰 목록</h2>
                    <a th:href="@{/admin}" class="btn btn-outline-dark btn-sm rounded-pill px-3 position-absolute" style="top: 0; right: 0;">관리자 홈</a>
                </div>

                <div class="table-wrapper shadow-sm">
                    <table class="table">
                        <colgroup>
                            <col style="width: 40%">
                            <col style="width: 20%">
                            <col style="width: 15%">
                            <col style="width: 10%">
                            <col style="width: 15%">
                        </colgroup>
                        <thead>
                        <tr>
                            <th>제목</th>
                            <th>주소</th>
                            <th>작성자 ID</th>
                            <th>평점</th>
                            <th>작성일</th>
                            <th>관리</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="review : ${reviews.content}" class="review-item"
                            th:data-address="${review.address}"
                            th:data-title="${review.title}"
                            th:data-pros="${#strings.arrayJoin(review.prosList, ',')}"
                            th:data-cons="${#strings.arrayJoin(review.consList, ',')}">

                            <td style="text-align: left; padding-left: 25px;">
                                <a th:href="@{/review/detail/{id}(id=${review.id})}" th:text="${review.title}" class="text-dark fw-bold text-decoration-none"></a>
                            </td>
                            <td th:text="${review.address != null && review.address.contains('동 ') ? review.address.substring(0, review.address.indexOf('동 ') + 1) : review.address}"></td>
                            <td th:text="${review.loginId}"></td>
                            <td th:text="${review.point}"></td>
                            <td class="text-muted small" th:text="${review.createdAt != null ? #temporals.format(review.createdAt, 'yyyy-MM-dd HH:mm:ss') : ''}"></td>
                            <td>
                                <div style="display: flex; gap: 8px; justify-content: center; align-items: center;">
                                    <form th:action="@{/admin/reviews/toggle-status}" method="post" style="margin: 0;">
                                        <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}"/>
                                        <input type="hidden" name="page" th:value="${reviews.number + 1}">
                                        <input type="hidden" name="id" th:value="${review.id}">
                                        <input type="hidden" name="status" th:value="${review.reviewStatus.name() == 'ACTIVE' ? 'BANNED' : 'ACTIVE'}">

                                        <button type="submit" th:if="${review.reviewStatus.name() == 'ACTIVE'}"
                                                class="btn btn-warning btn-toggle text-white">
                                            <i class="bi bi-eye-slash me-1"></i>숨기기
                                        </button>

                                        <button type="submit" th:if="${review.reviewStatus.name() == 'BANNED'}"
                                                class="btn btn-secondary btn-toggle">
                                            <i class="bi bi-eye me-1"></i>노출하기
                                        </button>
                                    </form>

                                    <a th:href="@{/admin/reviews/delete/{id}(id=${review.id})}"
                                       onclick="return confirm('정말 영구 삭제하시겠습니까?');"
                                       class="btn-delete">
                                        삭제
                                    </a>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <nav id="paginationContainer" class="pagination-container justify-content-center" th:if="${reviews.totalPages > 0}">
                    <ul class="pagination" th:with="
                        currentPage=${reviews.number + 1},
                        blockStart=${(currentPage - 1) div 5 * 5 + 1}">

                        <li class="page-item" th:classappend="${blockStart == 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/reviews(page=${blockStart - 1}, searchType=${searchType}, keyword=${keyword})}">
                                <i class="bi bi-chevron-left"></i>
                            </a>
                        </li>

                        <li class="page-item"
                            th:each="page : ${#numbers.sequence(1, reviews.totalPages)}"
                            th:if="${page >= blockStart and page < blockStart + 5}"
                            th:classappend="${page == currentPage} ? 'active'">
                            <a class="page-link"
                               th:href="@{/admin/reviews(page=${page}, searchType=${searchType}, keyword=${keyword})}"
                               th:text="${page}"></a>
                        </li>

                        <li class="page-item" th:classappend="${blockStart + 4 >= reviews.totalPages} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/reviews(page=${blockStart + 5}, searchType=${searchType}, keyword=${keyword})}">
                                <i class="bi bi-chevron-right"></i>
                            </a>
                        </li>
                    </ul>
                </nav>

            </div>
        </div>
    </div>
</div>
</html>
