<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원 관리 페이지</title>
    <style>
        table {
          /* 표 전체 테두리와 칸 사이의 간격을 하나로 합칩니다. 안 하면 선이 두 줄로 보여요! */
          border-collapse: collapse;
          width: 100%;
        }
        th, td {
          /* 두께 1px, 직선(solid), 검정색(#000) 선을 그립니다. */
          border: 1px solid #000;
          padding: 8px; /* 칸 안의 여유 공간 */
          text-align: center;
        }
        th {
          background-color: #f2f2f2; /* 제목 칸 배경색 */
        }
    </style>
</head>
<!-- 2026.2.11 종빈 생성 -->
<body>
<div class="container mt-5">
    <h2 class="mb-4">전체 회원 리스트</h2>

    <table class="table table-hover border" style="width: 100%">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>로그인 ID</th>
            <th>이름</th>
            <th>성별</th>
            <th>연락처</th>
            <th>이메일</th>
            <th>주소</th>
            <th>권한(Role)</th>
            <th>상태</th>
            <th>가입일</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${userList}">
            <td th:text="${user.id}"></td>
            <td th:text="${user.loginId}"></td>
            <td th:text="${user.name}"></td>
            <td th:text="${user.gender}"></td>
            <td th:text="${user.phone}"></td>
            <td th:text="${user.email}"></td>
            <td th:text="${user.address}"></td>

            <form th:action="@{/admin/updateStatus}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="id" th:value="${user.id}">

                <td>
                    <select name="role" class="form-select form-select-sm">
                        <option value="VIEWER" th:selected="${user.role == 'VIEWER'}">VIEWER</option>
                        <option value="WRITER" th:selected="${user.role == 'WRITER'}">WRITER</option>
                        <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">ADMIN</option>
                    </select>
                </td>
                <td>
                    <div style="display: flex; gap: 5px;">
                        <select name="accountStatus" class="form-select form-select-sm">
                            <option value="ACTIVE" th:selected="${user.accountStatus == 'ACTIVE'}">ACTIVE</option>
                            <option value="SLEEP" th:selected="${user.accountStatus == 'SLEEP'}">SLEEP</option>
                            <option value="BANNED" th:selected="${user.accountStatus == 'BANNED'}">BANNED</option>
                        </select>
                        <button type="submit" class="btn btn-sm btn-warning">변경</button>
                    </div>
                </td>
            </form>

            <td th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd')}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
