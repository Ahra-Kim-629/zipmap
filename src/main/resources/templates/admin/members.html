<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <style>
        /* 1. 배경 및 전체 컨테이너 */
        body { background-color: #f4f7f6 !important; }
        .admin-content { padding: 40px 0; min-height: calc(100vh - 250px); }

        /* 2. 메인 카드 (제목부터 페이징까지 감싸는 흰색 판) */
        .list-card {
            background: #fff;
            padding: 40px;
            border-radius: 24px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* 3. 테이블 디자인 (실거주 인증 관리 스타일과 100% 통일) */
        .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .table {
            min-width: 1100px;
            border-collapse: collapse; /* 실거주 인증 페이지처럼 선으로 구분 */
            margin-top: 20px;
        }

        /* 헤더 스타일 */
        .table thead th {
            background-color: #f8f9fa !important;
            color: #6c757d;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 15px;
            border-bottom: 1px solid #eee;
            text-align: center;
        }

        /* 행(Row) 스타일: 마우스 올렸을 때 색상만 변경 (움직임 제거) */
        .table tbody tr {
            background-color: #fff;
            transition: background-color 0.2s ease;
        }
        .table tbody tr:hover {
            background-color: #f8f9fa !important;
            /* transform 제거됨 */
        }

        .table td {
            vertical-align: middle;
            padding: 18px 15px;
            border-bottom: 1px solid #f1f1f1;
            text-align: center;
        }

        /* 4. 버튼 및 요소 스타일 */
        .btn-sm-custom {
            background-color: #3f8a7e;
            color: #fff;
            border-radius: 50px;
            padding: 6px 16px;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .btn-sm-custom:hover { background-color: #325e5a; color: #fff; }

        /* 5. 페이징 디자인 (민트/초록 테마) */
        .pagination-container { margin-top: 40px; display: flex; justify-content: center; }
        .pagination { display: flex; list-style: none; padding-left: 0; }
        .page-link {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            color: #555; border: none; margin: 0 4px; border-radius: 12px !important;
            font-weight: 700; transition: all 0.2s ease; background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); text-decoration: none;
        }
        .page-item.active .page-link {
            background-color: #3f8a7e !important;
            color: white !important;
            box-shadow: 0 4px 12px rgba(63, 138, 126, 0.3);
        }
        .page-link:hover:not(.active) {
            background-color: #325e5a;
            transform: translateY(-2px);
            color: #fff;
        }
        .page-item.disabled .page-link { color: #ccc; pointer-events: none; background-color: #fcfcfc; }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="admin-content">
        <div class="container">
            <div class="list-card daedong-shadow">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold mb-0 text-dark">
                        <i class="bi bi-people-fill me-2" style="color: #3f8a7e;"></i>회원 관리
                    </h2>
                    <a th:href="@{/admin}" class="btn btn-outline-secondary rounded-pill px-3 shadow-sm">
                        <i class="bi bi-house-door me-1"></i>관리자 홈
                    </a>
                </div>

                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>아이디 / 이름</th>
                            <th>성별</th>
                            <th>이메일</th>
                            <th>주소</th>
                            <th style="width: 200px;">상태 관리</th>
                            <th>가입일</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="user : ${users.content}">
                            <td class="text-muted small" th:text="${user.id}"></td>
                            <td>
                                <div class="fw-bold" th:text="${user.loginId}"></div>
                                <div class="small text-muted" th:text="${user.name}"></div>
                            </td>
                            <td th:text="${#strings.toString(user.gender) == 'M' ? '남성' : '여성'}"></td>
                            <td class="small text-muted" th:text="${user.email}"></td>
                            <td class="text-start small">
                                    <span class="d-inline-block text-truncate" style="max-width: 150px;"
                                          th:text="${user.address}" th:title="${user.address}"></span>
                            </td>
                            <td>
                                <form th:action="@{/admin/updateStatus}" method="post" class="d-flex gap-2 justify-content-center">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <input type="hidden" name="id" th:value="${user.id}">
                                    <select name="accountStatus" class="form-select form-select-sm shadow-sm" style="width: 100px; border-radius: 8px;">
                                        <option value="ACTIVE" th:selected="${user.accountStatus?.name() == 'ACTIVE'}">ACTIVE</option>
                                        <option value="PENDING" th:selected="${user.accountStatus?.name() == 'PENDING'}">PENDING</option>
                                        <option value="BANNED" th:selected="${user.accountStatus?.name() == 'BANNED'}">BANNED</option>
                                    </select>
                                    <button type="submit" class="btn-sm-custom">변경</button>
                                </form>
                            </td>
                            <td class="text-muted small" th:text="${#temporals.format(user.createdAt, 'yyyy.MM.dd')}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div th:if="${users == null or users.empty}" class="text-center py-5">
                    <p class="text-muted fw-bold">가입된 회원이 없습니다.</p>
                </div>

                <nav id="paginationContainer" class="pagination-container" th:if="${users != null and users.totalPages > 0}">
                    <ul class="pagination" th:with="
                        currentPage=${users.number + 1},
                        blockStart=${(currentPage - 1) div 5 * 5 + 1}">

                        <li class="page-item" th:classappend="${blockStart == 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/members(page=${blockStart - 2})}">
                                <i class="bi bi-chevron-left"></i>
                            </a>
                        </li>

                        <li class="page-item"
                            th:each="page : ${#numbers.sequence(1, users.totalPages)}"
                            th:if="${page >= blockStart and page < blockStart + 5}"
                            th:classappend="${page == currentPage} ? 'active'">
                            <a class="page-link" th:href="@{/admin/members(page=${page - 1})}" th:text="${page}"></a>
                        </li>

                        <li class="page-item" th:classappend="${blockStart + 4 >= users.totalPages} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/members(page=${blockStart + 4})}">
                                <i class="bi bi-chevron-right"></i>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div> </div>
    </div>
</div>

<th:block layout:fragment="script"></th:block>
</html>
