<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <style>
        .admin-content { padding: 40px 0; background-color: #f8f9fa; min-height: 90vh; }
        .table-card { background: white; border-radius: 15px; border: none; overflow: hidden; }

        /* 테이블 스타일 커스텀 */
        .table thead { background-color: #343a40; color: white; }
        .table th { font-size: 0.85rem; font-weight: 600; padding: 15px; border: none; }
        .table td { vertical-align: middle; font-size: 0.9rem; padding: 12px; border-bottom: 1px solid #f1f1f1; }

        /* 권한 및 상태 배지 스타일 */
        .role-badge { font-size: 0.75rem; font-weight: bold; padding: 4px 10px; border-radius: 50px; }
        .role-admin { background-color: #e8f5e9; color: #2e7d32; }
        .role-writer { background-color: #e3f2fd; color: #1565c0; }
        .role-viewer { background-color: #f5f5f5; color: #616161; }

        .status-active { color: #28a745; font-weight: bold; }
        .status-banned { color: #dc3545; font-weight: bold; }

        .form-select-sm { font-size: 0.8rem; border-radius: 6px; border: 1px solid #ddd; }
        .btn-update { font-size: 0.75rem; font-weight: bold; white-space: nowrap; }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="admin-content">
        <div class="container">
            <div class="container-fluid px-4">
                <div class="d-flex justify-content-between align-items-end mb-4">
                    <h2 class="fw-bold mb-0 text-dark"><i class="bi bi-people-fill me-2"></i>회원 관리</h2>
                    <a th:href="@{/admin}" class="btn btn-outline-dark btn-sm rounded-pill px-3">관리자 홈으로</a>
                </div>

                <div class="table-card daedong-shadow">
                    <table class="table table-hover mb-0 text-center">
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>아이디 / 이름</th>
                            <th>성별</th>
                            <th>이메일</th>
                            <th>주소</th>
                            <th>권한 변경</th>
                            <th>상태 관리</th>
                            <th>가입일</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="user : ${userList}">
                            <td class="text-muted" th:text="${user.id}">1</td>

                            <td>
                                <div class="fw-bold" th:text="${user.loginId}">user01</div>
                                <div class="small text-muted" th:text="${user.name}">홍길동</div>
                            </td>

                            <td>
                                <!-- 전부 여성으로 조회돼서 코드 수정 2/24
                                <span class="small" th:text="${user.gender == 'M' ? '남성' : '여성'}">성별</span>
                                -->

                                <span class="small" th:text="${#strings.toString(user.gender) == 'M' ? '남성' : '여성'}">성별</span>
                            </td>

                            <td>
                                <div class="small text-muted"><i class="bi bi-envelope me-1"></i> <span
                                        th:text="${user.email}">mail@test.com</span></div>
                            </td>

                            <td class="text-start">
                            <span class="small text-truncate d-inline-block" style="max-width: 150px;"
                                  th:text="${user.address}" th:title="${user.address}">주소 정보</span>
                            </td>

                            <td colspan="2" class="p-0">
                                <form th:action="@{/admin/updateStatus}" method="post"
                                      class="d-flex align-items-center justify-content-center gap-2 p-2">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <input type="hidden" name="id" th:value="${user.id}">

                                    <select name="role" class="form-select form-select-sm" style="width: 100px;">
                                        <option value="VIEWER" th:selected="${user.role?.name() == 'VIEWER'}">VIEWER</option>
                                        <option value="WRITER" th:selected="${user.role?.name() == 'WRITER'}">WRITER</option>
                                        <option value="ADMIN" th:selected="${user.role?.name() == 'ADMIN'}">ADMIN</option>
                                    </select>

                                    <select name="accountStatus" class="form-select form-select-sm"
                                            th:classappend="${user.accountStatus == 'ACTIVE' ? 'status-active' : (user.accountStatus == 'BANNED' ? 'status-banned' : '')}"
                                            style="width: 100px;">
                                        <option value="ACTIVE" th:selected="${user.accountStatus?.name() == 'ACTIVE'}">ACTIVE
                                        </option>
                                        <option value="PENDING" th:selected="${user.accountStatus?.name() == 'PENDING'}">PENDING
                                        </option>
                                        <option value="BANNED" th:selected="${user.accountStatus?.name() == 'BANNED'}">BANNED
                                        </option>
                                    </select>

                                    <button type="submit" class="btn btn-warning btn-sm btn-update rounded-3 px-3">변경
                                    </button>
                                </form>
                            </td>

                            <td class="text-muted small" th:text="${#temporals.format(user.createdAt, 'yyyy.MM.dd')}">
                                2024.01.01
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div th:if="${userList.empty}" class="text-center py-5">
                    <p class="text-muted">가입된 회원이 없습니다.</p>
                </div>
            </div>
        </div>
    </div>
</div>
</html>
