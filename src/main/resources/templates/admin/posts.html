<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <style>
        .admin-content { padding: 40px 0; background-color: #f8f9fa; min-height: 90vh; }
        .table-card { background: white; border-radius: 15px; border: none; overflow: hidden; }

        /* 테이블 스타일 */
        .table thead { background-color: #343a40; color: white; }
        .table th { font-size: 0.85rem; font-weight: 600; padding: 15px; border: none; }
        .table td { vertical-align: middle; font-size: 0.9rem; padding: 12px; border-bottom: 1px solid #f1f1f1; }

        /* 상태별 텍스트 및 버튼 */
        .status-active-text { color: #28a745; font-weight: bold; }
        .status-banned-text { color: #dc3545; font-weight: bold; }

        .post-link { text-decoration: none; color: #333; font-weight: 600; }
        .post-link:hover { color: var(--main-orange); text-decoration: underline; }

        /* 버튼 커스텀 */
        .btn-toggle { font-size: 0.75rem; font-weight: bold; border-radius: 6px; padding: 5px 10px; }
        .btn-delete { font-size: 0.75rem; font-weight: bold; color: #dc3545; text-decoration: none; }
        .btn-delete:hover { color: #a71d2a; }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="admin-content">
        <div class="container">
            <div class="d-flex justify-content-between align-items-end mb-4">
                <div>
                    <h2 class="fw-bold mb-1 text-dark"><i class="bi bi-journal-text me-2"></i>게시글 관리</h2>
                    <p class="text-muted small mb-0">부적절한 게시글을 숨기거나 영구 삭제할 수 있습니다.</p>
                </div>
                <a th:href="@{/admin}" class="btn btn-outline-dark btn-sm rounded-pill px-3">
                    <i class="bi bi-arrow-left me-1"></i>관리자 홈
                </a>
            </div>

            <div th:if="${message}" class="alert alert-primary border-0 rounded-3 small py-2 mb-3"
                 th:text="${message}"></div>
            <div th:if="${error}" class="alert alert-danger border-0 rounded-3 small py-2 mb-3"
                 th:text="${error}"></div>

            <div class="table-card daedong-shadow shadow-sm">
                <table class="table table-hover mb-0 text-center">
                    <thead>
                    <tr>
                        <th style="width: 8%;">번호</th>
                        <th style="width: 40%;">제목</th>
                        <th style="width: 12%;">작성자</th>
                        <th style="width: 15%;">작성일</th>
                        <th style="width: 10%;">좋아요</th>
                        <th style="width: 15%;">상태 제어</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="post : ${posts}">
                        <td class="text-muted small" th:text="${post.id}">1</td>
                        <td class="text-start ps-4">
                            <a th:href="@{/board/detail/{id}(id=${post.id})}" class="post-link" th:text="${post.title}">게시글
                                제목</a>
                            <span th:if="${post.postStatus == 'BANNED'}" class="badge bg-danger ms-1"
                                  style="font-size: 0.6rem;">숨김됨</span>
                        </td>
                        <td>
                            <span class="small fw-bold" th:text="${post.loginId}">userid</span>
                        </td>
                        <td class="text-muted small" th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">
                            2026-02-11
                        </td>
                        <td>
                            <span class="small fw-bold text-primary" th:text="${post.likeCount}">0</span>
                        </td>

                        <td>
                            <div class="d-flex flex-column gap-1 align-items-center">
                                <form th:action="@{/admin/posts/toggle-status}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <input type="hidden" name="id" th:value="${post.id}">
                                    <input type="hidden" name="status" th:value="${post.postStatus}">

                                    <button type="submit" th:if="${post.postStatus == 'ACTIVE'}"
                                            class="btn btn-warning btn-toggle">
                                        <i class="bi bi-eye-slash me-1"></i>숨기기
                                    </button>
                                    <button type="submit" th:if="${post.postStatus == 'BANNED'}"
                                            class="btn btn-secondary btn-toggle">
                                        <i class="bi bi-eye me-1"></i>노출하기
                                    </button>
                                </form>

                                <a th:href="@{/admin/posts/delete/{id}(id=${post.id})}"
                                   th:onclick="return confirm('이 게시글을 영구 삭제하시겠습니까? 복구가 불가능합니다.');"
                                   class="btn-delete small">
                                    <i class="bi bi-trash3 me-1"></i>영구 삭제
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${posts.empty}">
                        <td colspan="6" class="py-5 text-muted text-center">게시글이 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <nav th:if="${totalCount > 0}"
                 th:with="totalPages=${T(java.lang.Math).ceil(totalCount * 1.0 / size).intValue()}"
                 class="mt-5 d-flex justify-content-center">
                <ul class="pagination">
                    <li class="page-item" th:classappend="${page == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/posts(page=${page - 1}, searchType=${searchType}, keyword=${keyword})}">
                            <i class="bi bi-chevron-left"></i>
                        </a>
                    </li>
                    <li class="page-item" th:each="p : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${p == page} ? 'active'">
                        <a class="page-link"
                           th:href="@{/admin/posts(page=${p}, searchType=${searchType}, keyword=${keyword})}"
                           th:text="${p + 1}"></a>
                    </li>
                    <li class="page-item" th:classappend="${page >= totalPages - 1} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/posts(page=${page + 1}, searchType=${searchType}, keyword=${keyword})}">
                            <i class="bi bi-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>
</html>
