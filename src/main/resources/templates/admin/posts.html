        .pagination .active a { background-color: #007bff; color: white; border-color: #007bff; }
        .pagination .disabled a { color: #ccc; pointer-events: none; }
    </style>

<!-- 게시글 리스트 -->
<table>
    <thead>
    <tr>
        <th>번호</th>
        <th>제목</th>
        <th>작성자</th>
        <th>작성일</th>
        <th>좋아요</th>
        <th>숨김</th>
        <th>삭제</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="post : ${posts}">
        <td th:text="${post.id}"></td>
        <td><a th:href="@{/board/detail/{id}(id=${post.id})}" th:text="${post.title}"></a></td>
        <td th:text="${post.userId}"></td>
        <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></td>
        <td th:text="${post.likeCount}"></td>
        <td>
            <form th:action="@{/admin/posts/toggle-status}" method="post">
                <input type="hidden" name="id" th:value="${post.id}">
                <input type="hidden" name="status" th:value="${post.postStatus}">

                <button type="submit" th:if="${post.postStatus == 'ACTIVE'}"
                        style="background-color: #ffc107; border: none; padding: 5px 10px; cursor: pointer;">
                    BANNED로 수정
                </button>

                <button type="submit" th:if="${post.postStatus == 'BANNED'}"
                        style="background-color: #6c757d; color: white; border: none; padding: 5px 10px; cursor: pointer;">
                    ACTIVE로 수정
                </button>
            </form>
        </td>
        <td>
            <a th:href="@{/admin/posts/delete/{id}(id=${post.id})}"
               th:onclick="return confirm('정말 삭제하시겠습니까?');"
               style="color: red;">삭제</a>
        </td>

    </tr>
    <tr th:if="${posts.empty}">
        <td colspan="20">게시글이 없습니다.</td>
    </tr>


    </tbody>
</table>

<!-- 페이징-->
<nav th:if="${totalCount > 0}"
     th:with="totalPages=${T(java.lang.Math).ceil(totalCount * 1.0 / size).intValue()}"
     aria-label="Page navigation">

    <ul class="pagination">
        <li class="page-item" th:classappend="${page == 0} ? 'disabled'">
            <a class="page-link" th:href="@{/admin/posts(page=${page - 1}, searchType=${searchType}, keyword=${keyword})}">&lt;</a>
        </li>

        <li class="page-item" th:each="p : ${#numbers.sequence(0, totalPages - 1)}"
            th:classappend="${p == page} ? 'active'">
            <a class="page-link" th:href="@{/admin/posts(page=${p}, searchType=${searchType}, keyword=${keyword})}"
               th:text="${p + 1}"></a>
        </li>

        <li class="page-item" th:classappend="${page >= totalPages - 1} ? 'disabled'">
            <a class="page-link" th:href="@{/admin/posts(page=${page + 1}, searchType=${searchType}, keyword=${keyword})}">&gt;</a>
        </li>
    </ul>
</nav>
