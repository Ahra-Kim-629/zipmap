<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        /* 관리자 페이지 본문 전체의 배경색을 강제로 지정 */
        body {
            background-color: #f4f7f6 !important;
        }

        .admin-container { padding: 60px 0; min-height: 90vh; }
        .notice-card { max-width: 750px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 20px; border: none; }
        .page-title {  font-weight: 800; color: #3E362E; }

        /* 섹션 구분 */
        .form-section { margin-bottom: 35px; }
        .section-label { font-weight: 700; color: #3E362E; margin-bottom: 20px; display: block; font-size: 1.1rem; border-left: 4px solid var(--main-orange); padding-left: 12px; }

        /* 입력창 스타일 */
        .form-label { font-size: 0.85rem; font-weight: 600; color: #666; margin-bottom: 8px; }
        .form-control, .form-select { border-radius: 10px; padding: 12px 15px; border: 1px solid #eee; background-color: #fdfdfd; }
        .form-control:focus { border-color: var(--main-orange); box-shadow: 0 0 0 0.25rem rgba(230,126,34,0.1); background-color: #fff; }

        /* 이미지 미리보기 박스 */
        .preview-box {
            width: 100%; min-height: 150px; border: 2px dashed #eee; border-radius: 15px;
            display: flex; align-items: center; justify-content: center; overflow: hidden; background: #fafafa;
        }
        .preview-box img { max-width: 100%; height: auto; }

        /* 날짜 입력창 커스텀 */
        .flatpickr-input { background-color: #fff !important; cursor: pointer; }

        .guide-text { font-size: 0.75rem; color: #999; margin-top: 5px; line-height: 1.4; }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="admin-container">
        <div class="container">
            <div class="notice-card daedong-shadow">
                <div class="text-center mb-5">
                    <h2 class="page-title mb-2">중앙 모달 공지 등록</h2>
                    <p class="text-muted small">메인 화면 접속 시 정중앙에 나타날 팝업 공지를 설정합니다.</p>
                </div>

                <form id="noticeForm" th:action="@{/admin/notice/write}" method="post" enctype="multipart/form-data" onsubmit="return validateForm()">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="form-section">
                        <span class="section-label">공지 콘텐츠</span>
                        <div class="mb-4">
                            <label for="title" class="form-label">관리용 제목</label>
                            <input type="text" id="title" name="title" class="form-control"
                                   placeholder="목록 식별을 위한 제목을 입력하세요" required>
                        </div>
                        <div class="row g-4">
                            <div class="col-md-7">
                                <label for="imageFile" class="form-label">팝업 이미지 등록</label>
                                <input type="file" id="imageFile" name="imageFile" class="form-control mb-2"
                                       accept="image/*" required onchange="previewImage(this)">
                                <div class="guide-text">
                                    <i class="bi bi-info-circle me-1"></i> 중앙 모달은 <strong>가로 450px ~ 500px</strong> 크기가
                                    가장 적당합니다.<br>
                                    <i class="bi bi-info-circle me-1"></i> 배경이 투명한 PNG 파일을 권장합니다.
                                </div>
                            </div>
                            <div class="col-md-5">
                                <label class="form-label">이미지 미리보기</label>
                                <div class="preview-box" id="imagePreview">
                                    <span class="text-muted small">이미지를 선택하세요</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <span class="section-label">연결 및 노출 순서</span>
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label for="linkUrl" class="form-label">클릭 시 이동할 URL (선택)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 text-muted"><i
                                            class="bi bi-link-45deg"></i></span>
                                    <input type="url" id="linkUrl" name="linkUrl" class="form-control border-start-0"
                                           placeholder="https://...">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label for="priority" class="form-label">노출 우선순위</label>
                                <input type="number" id="priority" name="priority"
                                       class="form-control text-center fw-bold" value="0" min="0">
                                <div class="guide-text text-end">※ 숫자가 높을수록 먼저 노출</div>
                            </div>
                        </div>
                    </div>

                    <div class="form-section border-0 mb-0">
                        <span class="section-label">게시 기간</span>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="startDate" class="form-label">시작 일시</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0"><i
                                            class="bi bi-calendar-check"></i></span>
                                    <input type="text" id="startDate" name="startDate"
                                           class="form-control border-start-0" placeholder="시작 날짜와 시간" required >
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="endDate" class="form-label">종료 일시</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0"><i
                                            class="bi bi-calendar-x"></i></span>
                                    <input type="text" id="endDate" name="endDate" class="form-control border-start-0"
                                           placeholder="종료 날짜와 시간" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-3 justify-content-center mt-5 pt-4 border-top">
                        <button type="submit" class="btn btn-orange px-5 py-3 fw-bold rounded-pill shadow-sm">공지사항 등록
                        </button>
                        <button type="button" onclick="history.back()"
                                class="btn btn-outline-secondary px-5 py-3 rounded-pill">취소하기
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>

    <script th:inline="javascript">
        let startPicker;
        let endPicker;

        $(document).ready(function() {
            const commonConfig = {
                locale: "ko",
                minDate: "today",
                allowInput: true // ✨ 핵심 마법의 1줄: 달력의 readonly 잠금을 풀어서, 브라우저 순정 말풍선이 작동하게 만듭니다!
            };

            startPicker = flatpickr("#startDate", {
                ...commonConfig,
                onChange: function(selectedDates, dateStr) {
                    endPicker.set("minDate", dateStr);
                }
            });

            endPicker = flatpickr("#endDate", {
                ...commonConfig,
                onChange: function(selectedDates, dateStr) {
                    startPicker.set("maxDate", dateStr);
                }
            });
        });

        // 이미지 미리보기 및 확장자 철벽 방어
         function previewImage(input) {

            const preview = document.getElementById('imagePreview');

            if (input.files && input.files[0]) {
                const file = input.files[0];
                const validTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];

                // ✨ 철벽 방어: 허락되지 않은 파일(엑셀, 텍스트 등)이면 튕겨냄
                if (!validTypes.includes(file.type)) {
                    alert("⚠️ 팝업 공지에는 이미지 파일만 첨부할 수 있습니다.");
                    input.value = ''; // 꼼수 방지: 선택된 파일 찌꺼기를 강제로 삭제
                    preview.innerHTML = `<span class="text-muted small">이미지를 선택하세요</span>`; // 미리보기 초기화
                    return; // 더 이상 진행하지 않고 여기서 함수 종료!
                }

                // 무사히 통과한 진짜 이미지 파일만 미리보기 실행
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}" alt="미리보기" style="max-height: 200px; object-fit: contain;">`;
                }
                reader.readAsDataURL(file);
            } else {
                // 사용자가 탐색기 창을 열었다가 그냥 '취소'를 눌렀을 때 원래 상태로 복구
                preview.innerHTML = `<span class="text-muted small">이미지를 선택하세요</span>`;
            }
        }

        // 우선순위 음수 입력 방지
        const priorityInput = document.getElementById('priority');

        priorityInput.addEventListener('input', function() {
            if (this.value < 0) {
                alert('우선순위는 0 이상의 숫자만 입력 가능합니다.');
                this.value = 0; // 음수일 경우 0으로 강제 초기화
            }
        });

        // 키보드로 마이너스(-) 입력 자체를 차단하고 싶을 때
        priorityInput.addEventListener('keydown', function(e) {
            if (e.key === '-' || e.key === 'e') { // 'e'는 지수 표기법 방지
                e.preventDefault();
            }
        });
    </script>
</div>
</html>
