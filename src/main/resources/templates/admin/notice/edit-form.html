<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        /* 기존 스타일 유지 */
        .admin-container { padding: 60px 0; background-color: #fdfcf9; min-height: 90vh; }
        .notice-card { max-width: 750px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 20px; border: none; }
        .page-title {  font-weight: 800; color: #3E362E; }
        .form-section { margin-bottom: 35px; }
        .section-label { font-weight: 700; color: #3E362E; margin-bottom: 20px; display: block; font-size: 1.1rem; border-left: 4px solid #e67e22; padding-left: 12px; }
        .form-label { font-size: 0.85rem; font-weight: 600; color: #666; margin-bottom: 8px; }
        .form-control, .form-select { border-radius: 10px; padding: 12px 15px; border: 1px solid #eee; background-color: #fdfdfd; }
        .preview-box { width: 100%; min-height: 150px; border: 2px dashed #eee; border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #fafafa; }
        .preview-box img { max-width: 100%; height: auto; }
        .guide-text { font-size: 0.75rem; color: #999; margin-top: 5px; line-height: 1.4; }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="admin-container">
        <div class="container">
            <div class="notice-card daedong-shadow">
                <div class="text-center mb-5">
                    <h2 class="page-title mb-2">중앙 모달 공지 수정</h2>
                    <p class="text-muted small">기존 공지 내용을 수정합니다. 이미지를 선택하지 않으면 기존 이미지가 유지됩니다.</p>
                </div>

                <div th:if="${reviewDTO.reviewStatus.name() == 'BANNED'}"
                     class="alert alert-danger mb-4 rounded-3">
                    <i class="bi bi-exclamation-octagon-fill me-2"></i>
                    <strong>인증 반려된 게시글입니다.</strong> 내용을 보완하여 수정 완료하시면 인증 서류 제출 페이지로 이동합니다.
                    <div class="mt-2 small" th:text="'사유: ' + ${reviewDTO.message}">반려 사유 내용</div>
                </div>

                <form th:action="@{/admin/notice/edit/{id}(id=${notice.id})}" th:object="${notice}" method="post" enctype="multipart/form-data">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" th:field="*{id}">

                    <div class="form-section">
                        <span class="section-label">공지 콘텐츠</span>
                        <div class="mb-4">
                            <label for="title" class="form-label">관리용 제목</label>
                            <input type="text" id="title" th:field="*{title}" class="form-control" placeholder="제목을 입력하세요" required>
                        </div>
                        <div class="row g-4">
                            <div class="col-md-7">
                                <label for="imageFile" class="form-label">이미지 교체 (선택)</label>
                                <input type="file" id="imageFile" name="imageFile" class="form-control mb-2" accept="image/*" onchange="previewImage(this)">
                                <div class="guide-text">
                                    <i class="bi bi-info-circle me-1"></i> 새로운 이미지를 선택하면 기존 이미지가 삭제되고 교체됩니다.
                                </div>
                            </div>
                            <div class="col-md-5">
                                <label class="form-label">이미지 미리보기</label>
                                <div class="preview-box" id="imagePreview">
                                    <img th:if="*{filePath != null}" th:src="@{/files/{name}(name=*{filePath})}" alt="기존 이미지">
                                    <span th:unless="*{filePath != null}" class="text-muted small">이미지 없음</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <span class="section-label">연결 및 노출 순서</span>
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label for="linkUrl" class="form-label">클릭 시 이동할 URL</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-link-45deg"></i></span>
                                    <input type="url" id="linkUrl" th:field="*{linkUrl}" class="form-control border-start-0" placeholder="https://...">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label for="priority" class="form-label">노출 우선순위</label>
                                <input type="number" id="priority" th:field="*{priority}" class="form-control text-center fw-bold" min="0">
                            </div>
                        </div>
                    </div>

                    <div class="form-section border-0 mb-0">
                        <span class="section-label">게시 기간</span>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="startDate" class="form-label">시작 일자</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-calendar-check"></i></span>
                                    <input type="text" id="startDate" th:field="*{startDate}" class="form-control border-start-0" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="endDate" class="form-label">종료 일자</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-calendar-x"></i></span>
                                    <input type="text" id="endDate" th:field="*{endDate}" class="form-control border-start-0" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-3 justify-content-center mt-5 pt-4 border-top">
                        <button type="submit" class="btn btn-orange px-5 py-3 fw-bold rounded-pill shadow-sm">수정 완료</button>
                        <button type="button" onclick="history.back()" class="btn btn-outline-secondary px-5 py-3 rounded-pill">취소하기</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>

    <script th:inline="javascript">
        $(document).ready(function() {
            // 서버에서 넘어온 기존 날짜 값 (DTO의 LocalDate)
            const initialStart = [[${notice.startDate}]];
            const initialEnd = [[${notice.endDate}]];

            const commonConfig = {
                locale: "ko",
                altInput: true,
                altFormat: "Y-m-d",
                dateFormat: "Y-m-d" // 실제 value에 들어갈 형식
            };

            const startPicker = flatpickr("#startDate", {
                ...commonConfig,
                defaultDate: initialStart, // 기존 값 세팅
                onChange: function(selectedDates, dateStr) {
                    endPicker.set("minDate", dateStr);
                }
            });

            const endPicker = flatpickr("#endDate", {
                ...commonConfig,
                defaultDate: initialEnd, // 기존 값 세팅
                minDate: initialStart,
                onChange: function(selectedDates, dateStr) {
                    startPicker.set("maxDate", dateStr);
                }
            });
        });

        function previewImage(input) {
            const preview = document.getElementById('imagePreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}" alt="미리보기">`;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</div>
</html>
