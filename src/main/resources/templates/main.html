<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <link rel="stylesheet" th:href="@{/css/frontpage.css}">
</th:block>

<div layout:fragment="content">
    <th:block th:if="${noticeList != null && noticeList.size() > 0}">
        <div class="modal fade" id="noticeCarouselModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content daedong-modal-content">

                    <div class="modal-header daedong-modal-header">
                        <h5 class="modal-title"><i class="bi bi-scroll me-2"></i>대동여집도 소식</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>

                    <div class="modal-body p-0">
                        <div id="noticeCarousel" class="carousel slide" data-bs-ride="false">
                            <div class="carousel-indicators">
                                <button th:each="notice, stat : ${noticeList}"
                                        type="button"
                                        data-bs-target="#noticeCarousel"
                                        th:data-bs-slide-to="${stat.index}"
                                        th:classappend="${stat.first} ? 'active'"
                                        aria-current="true"></button>
                            </div>

                            <div class="carousel-inner">
                                <div th:each="notice, stat : ${noticeList}"
                                     th:classappend="${stat.first} ? 'active'"
                                     class="carousel-item">
                                    <a th:href="${notice.linkUrl}" target="_blank">
                                        <img th:src="@{/files/notice/{name}(name=${notice.imagePath})}"
                                             class="d-block w-100" th:alt="${notice.title}">
                                    </a>
                                    <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 py-1">
                                        <p class="small mb-0" th:text="${notice.title}">공지 제목</p>
                                    </div>
                                </div>
                            </div>

                            <button class="carousel-control-prev" type="button" data-bs-target="#noticeCarousel"
                                    data-bs-slide="prev">
                                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">이전</span>
                            </button>
                            <button class="carousel-control-next" type="button" data-bs-target="#noticeCarousel"
                                    data-bs-slide="next">
                                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">다음</span>
                            </button>
                        </div>
                    </div>

                    <div class="modal-footer daedong-modal-footer">
                        <div class="custom-check">
                            <label>
                                <input type="checkbox" id="hideNoticeToday">
                                <span>오늘 하루 보지 않기</span>
                            </label>
                        </div>
                        <button type="button" class="btn-daedong-close" data-bs-dismiss="modal">닫기</button>
                    </div>
                </div>
            </div>
        </div>
    </th:block>

    <header class="hero-section text-center">
        <div class="container">
            <h1 class="fw-bold mb-3">서울 자취방, 속지 말고 확인하세요</h1>
            <p class="text-muted mb-5">실제 거주자가 작성한 생생한 이미지 후기부터 자취 꿀팁까지</p>
            <div class="row justify-content-center">
                <div class="col-md-7">
                    <div class="search-box-wrapper mx-auto bg-white d-flex align-items-center">
                        <input
                                type="text"
                                class="form-control hero-input"
                                placeholder="동네 이름이나 건물명을 입력하세요"
                        />
                        <button class="btn btn-orange btn-search-hero" type="button">
                            <i class="bi bi-search me-2"></i>검색
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container py-5">
        <div class="row g-4">
            <div class="col-lg-8">
                <h4 class="fw-bold mb-4">최신 방 후기</h4>
                <div class="row row-cols-1 row-cols-md-2 g-4">
                    <div class="col" th:each="review : ${reviewDTOList}">
                        <div class="card shadow-sm h-100 border-0 rounded-4 overflow-hidden shadow-hover"
                             style="cursor: pointer;"
                             th:onclick="|location.href='@{/review/detail/{id}(id=${review.id})}'|">
                            <img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=500"
                                 class="card-img-top" style="height:200px; object-fit:cover;">
                            <div class="card-body">
                                <span class="badge badge-daedong mb-2" th:text="${review.address}">관악구 봉천동</span>
                                <h5 class="card-title fw-bold" th:text="${review.title}">채광 맛집 분리형 원룸</h5>
                                <p class="card-text text-muted small text-truncate" th:utext="${review.content}">집주인분
                                    친절하시고 수압 좋습니다...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card daedong-shadow mb-4 border-0">
                    <div class="card-header bg-white py-3 border-0">
                        <h5 class="fw-bold mb-0">커뮤니티 활성글</h5>
                    </div>
                    <div class="list-group list-group-flush">
                        <a th:each="post : ${postDTOList}" th:href="@{/board/detail/{id}(id=${post.id})}"
                           class="list-group-item list-group-item-action py-3">
                            <div class="d-flex w-100 justify-content-between align-items-center">
                                <h6 class="mb-1 fw-bold"
                                    th:classappend="${post.category == 'TRADE' ? 'text-orange' : (post.category == 'COMMUNITY' ? 'text-success' : 'text-warning')}"
                                    th:text="'[' + ${post.category} + ']'">
                                </h6>
                                <small class="text-muted text-muted-date" th:data-date="${post.createdAt}">계산
                                    중...</small>
                            </div>

                            <div class="d-flex align-items-center mt-1">
                                <i th:if="${post.likeCount > 10}" class="bi bi-fire hot-trend-icon"></i>
                                <span class="post-title small fw-bold" th:text="${post.title}">제목</span>
                                <span class="reason-badge" th:if="${post.reasonType == 'CATEGORY_TOP'}">인기</span>
                            </div>
                        </a>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <a class="btn btn-dark btn-lg fw-bold shadow-sm py-3" th:href="@{/board/write}">
                        <i class="bi bi-pencil-square me-2"></i>글쓰기
                    </a>
                </div>
            </div>
        </div>
    </main>
    <script th:src="@{/js/frontpage.js}"></script>
</div>
</html>
