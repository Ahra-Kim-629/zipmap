<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <link rel="stylesheet" th:href="@{/css/alarm.css}">
    <style>
        .board-container { padding: 40px 0; background-color: #f5f4ef; }
        .page-title {  font-weight: 800; color: #3E362E; }

        /* 필터 카드 */
        .filter-card {
            background: #FDFBF7;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            border: 1px solid #F0EBE1;
            margin-bottom: 40px;
        }
        .filter-card .form-select, .filter-card .form-control {
            background-color: #ffffff;
            border: 1px solid #EAEAEA;
            height: 50px;
            font-weight: 600;
            color: #333;
            border-radius: 12px !important;
        }

        /* 카테고리 글자 중앙 정렬 */
        .filter-card .form-select {
            text-align: left;
            text-align-last: left;
            cursor: pointer;
            padding-left: 15px; /* 글자가 테두리에 너무 붙지 않도록 왼쪽 여백 추가 */
        }

        .filter-card .form-select:focus, .filter-card .form-control:focus {
            background-color: #fff;
            box-shadow: none;
            border-color: #EAEAEA;
        }

        .btn-search {
            background-color: #3f8a7e !important;
            color: #ffffff !important;
            border: none !important;
            border-radius: 12px !important;
            height: 50px;
            font-size: 1.05rem;
            transition: background-color 0.2s;
        }
        .btn-search:hover {
            background-color: #325e5a !important;
        }

        /* 테이블 디자인 */
        .board-table-card { background: white; border-radius: 15px; overflow: hidden; border: none; }
        .table thead { background-color: #f8f9fa; border-bottom: 2px solid #eee; }
        .table th { font-weight: 700; color: #555; font-size: 0.9rem; border: none; padding: 15px; }
        .table td { vertical-align: middle; padding: 15px; font-size: 0.95rem; border-bottom: 1px solid #f1f1f1; }

        /* 카테고리별 배지 색상 */
        .badge-group { background-color: #e3f2fd; color: #0d47a1; } /* 공구 - 파랑 */
        .badge-share { background-color: #f1f8e9; color: #33691e; } /* 나눔 - 초록 */
        .badge-free { background-color: #fff3e0; color: #e65100; }  /* 자유 - 주황 */

        .post-link { text-decoration: none; color: #333; font-weight: 600; transition: 0.2s; }
        .post-link:hover { color: var(--main-orange); }

        /* 좋아요 아이콘 */
        .like-count { color: #dc3545; font-weight: 600; font-size: 0.9rem; }

        /* 페이징 */
        .pagination { justify-content: center; }
        .page-link {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            color: #555; border: none; margin: 0 4px; border-radius: 12px !important;
            font-weight: 700; transition: all 0.2s ease; background: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .page-item.active .page-link {
            background-color: #3f8a7e !important; /* 검색 버튼과 동일한 오렌지색 */
            border-color: #F97316 !important;
            color: #ffffff !important;
            box-shadow: 0 4px 12px rgba(63, 138, 126, 0.3);
        }
        .page-link:hover:not(.active) {
            background-color: #325e5a; transform: translateY(-2px);
            color: #ffffff;
        }

        /* 카테고리 선택 버튼 스타일 */
        .category-btn { width: 100%; padding: 15px; font-weight: bold; border-radius: 12px; transition: 0.2s; }
        .category-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="board-container">
        <div class="container">
            <div class="d-flex justify-content-between align-items-end mb-4">
                <div>
                    <h2 class="page-title mb-1">커뮤니티</h2>
                    <p class="text-muted small mb-0">자취생들의 꿀팁 공유부터 공동구매까지 함께해요.</p>
                </div>
                <div class="d-flex gap-2">
                    <a th:href="@{/post/write}" class="btn px-4 py-2 fw-bold text-dark rounded-pill shadow-sm" style="border: 1px solid #e0e0e0; background: #ffffff;">
                        <i class="bi bi-pencil-fill me-2"></i> 글쓰기
                    </a>
                </div>
            </div>

            <div th:if="${message}" class="alert alert-primary border-0 rounded-3 mb-4" th:text="${message}"></div>
            <div th:if="${error}" class="alert alert-danger border-0 rounded-3 mb-4" th:text="${error}"></div>

            <div class="filter-card daedong-shadow">
                <form action="/post" method="get">
                    <div class="row g-2">
                        <div class="col-md-2">
                            <select name="category" class="form-select form-control">
                                <option value="" th:selected="${category == null or category == ''}">카테고리 전체</option>
                                <option value="GROUP" th:selected="${category == 'GROUP'}">공구</option>
                                <option value="SHARE" th:selected="${category == 'SHARE'}">나눔</option>
                                <option value="FREE" th:selected="${category == 'FREE'}">자유</option>
                            </select>
                        </div>

                        <div class="col-md-2">
                            <select name="location" class="form-select form-control">
                                <option value="">지역 전체</option>
                                <option value="SEOUL_WEST" th:selected="${location == 'SEOUL_WEST'}">서울 서부</option>
                                <option value="SEOUL_SOUTH" th:selected="${location == 'SEOUL_SOUTH'}">서울 남부</option>
                                <option value="SEOUL_EAST" th:selected="${location == 'SEOUL_EAST'}">서울 동부</option>
                                <option value="SEOUL_NORTH" th:selected="${location == 'SEOUL_NORTH'}">서울 북부</option>
                                <option value="SEOUL_CENTER" th:selected="${location == 'SEOUL_CENTER'}">서울 중앙</option>
                            </select>
                        </div>

                        <div class="col-md-1">
                            <select name="searchType" class="form-select form-control" style="padding-left: 10px; padding-right: 5px;">
                                <option value="title" th:selected="${searchType == 'title'}">제목</option>
                                <option value="content" th:selected="${searchType == 'content'}">내용</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <input type="text" name="keyword" th:value="${keyword}" id="keyword" class="form-control"
                                   placeholder="검색어를 입력하세요">
                        </div>

                        <div class="col-md-2">
                            <button type="submit" class="btn btn-search w-100 fw-bold">검색하기</button>
                        </div>
                    </div>
                </form>
            </div>

            <!-- 알림받기 버튼 -->
            <div th:if="${keyword != null and keyword != ''}">
                <div id="alertSettingArea" style="display:none;">
                    <p id="appliedKeywordsContainer" class="d-flex align-items-center">
                        <i class="bi bi-bell-plus-fill me-2" style="color: #3f8a7e;"></i>
                        <span>새로운 키워드 <span id="appliedKeywords"></span> 알림을 받아보시겠어요?</span>
                    </p>
                    <button type="button" id="btnSaveKeyword" class="btn btn-primary shadow-sm">
                        <i class="bi bi-check2-circle me-1"></i> 알림 받기 설정
                    </button>
                </div>

                <div id="alreadySubscribed" style="display:none;">
                    <p class="fw-bold small text-muted mb-3">
                        <i class="bi bi-info-circle me-1"></i> 현재 알림 설정 중인 키워드 (클릭 시 취소)
                    </p>
                    <div id="oldKeywordsList" class="d-flex flex-wrap gap-2">
                    </div>
                </div>
            </div>

            <div class="board-table-card daedong-shadow">
                <table class="table mb-0 text-center">
                    <thead>
                    <tr>
                        <th style="width: 5%;">
                            <input type="checkbox" id="checkAll" class="form-check-input" onclick="toggleAllCheckboxes()">
                        </th>
                        <th style="width: 8%;">번호</th>
                        <th style="width: 50%;">제목</th>
                        <th style="width: 15%;">작성자</th>
                        <th style="width: 17%;">작성일</th>
                        <th style="width: 10%;"><i class="bi bi-heart-fill text-danger"></i></th>
                        <th style="width: 8%;"><i class="bi bi-hand-thumbs-down-fill text-primary"></i></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="post : ${posts}" th:style="${post.category == 'NOTICE'} ? 'background-color: #fff9f5;' : ''">
                        <td>
                            <input type="checkbox" name="selectedPosts" th:value="${post.id}" class="form-check-input post-checkbox">
                        </td>
                        <td class="text-center">
                            <span th:if="${post.category == 'NOTICE'}" class="badge bg-danger rounded-pill">공지</span>
                            <span th:unless="${post.category == 'NOTICE'}" class="text-muted small" th:text="${post.id}"></span>
                        </td>
                        <td class="text-start ps-4">
                            <span th:if="${post.category == 'GROUP'}" class="badge badge-group rounded-pill me-1">공구</span>
                            <span th:if="${post.category == 'SHARE'}" class="badge badge-share rounded-pill me-1">나눔</span>
                            <span th:if="${post.category == 'FREE'}" class="badge badge-free rounded-pill me-1">자유</span>
                            <a th:href="@{/post/detail/{id}(id=${post.id})}"
                               class="post-link"
                               th:classappend="${post.category == 'NOTICE'} ? 'fw-bold' : ''"
                               th:text="${post.title}">게시글 제목</a>
                        </td>
                        <td>
                            <span class="small" th:text="${post.loginId}">작성자</span>
                        </td>
                        <td class="text-muted small" th:text="${#temporals.format(post.createdAt, 'yyyy.MM.dd')}"></td>
                        <td><span class="like-count" th:text="${post.likeCount}">0</span></td>
                        <td><span class="like-count" th:text="${post.dislikeCount}">0</span></td>
                    </tr>

                    <tr th:if="${posts.empty}">
                        <td colspan="7" class="py-5 text-muted text-center">등록된 게시글이 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- 페이징 (5개씩 표시) -->
            <nav th:if="${posts.totalPages > 0}" class="mt-5 d-flex justify-content-center">

                <ul class="pagination" th:with="
                    currentPage=${posts.number + 1},
                    blockStart=${(currentPage - 1) div 5 * 5 + 1}">

                    <li class="page-item" th:classappend="${blockStart == 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/post(page=${blockStart - 1}, category=${category}, location=${location}, searchType=${searchType}, keyword=${keyword})}">
                            <i class="bi bi-chevron-left"></i>
                        </a>
                    </li>

                    <li class="page-item"
                        th:each="page : ${#numbers.sequence(1, posts.totalPages)}"
                        th:if="${page >= blockStart and page < blockStart + 5}"
                        th:classappend="${page == currentPage} ? 'active'">
                        <a class="page-link"
                           th:href="@{/post(page=${page}, category=${category}, location=${location}, searchType=${searchType}, keyword=${keyword})}"
                           th:text="${page}"></a>
                    </li>

                    <li class="page-item" th:classappend="${blockStart + 4 >= posts.totalPages} ? 'disabled'">
                        <a class="page-link" th:href="@{/post(page=${blockStart + 5}, category=${category}, location=${location}, searchType=${searchType}, keyword=${keyword})}">
                            <i class="bi bi-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

<script layout:fragment="script" th:inline="javascript">
    // 전체 선택/해제
    function toggleAllCheckboxes() {
        const checkAll = document.getElementById('checkAll');
        const checkboxes = document.querySelectorAll('.post-checkbox');
        checkboxes.forEach(cb => cb.checked = checkAll.checked);
    }

    // 선택된 글 요약 요청
    async function summarizeSelected() {
        const checkboxes = document.querySelectorAll('.post-checkbox:checked');
        const selectedIds = Array.from(checkboxes).map(cb => cb.value);

        if (selectedIds.length === 0) {
            alert("요약할 게시글을 하나 이상 선택해주세요.");
            return;
        }

        showLoading("선택하신 게시글들을 분석하고 있어요...");

        try {
            // CSRF 토큰 가져오기
            const token = document.querySelector("meta[name='_csrf']").getAttribute("content");
            const header = document.querySelector("meta[name='_csrf_header']").getAttribute("content");

            const response = await fetch('/post/summarize-selected', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    [header]: token
                },
                body: JSON.stringify(selectedIds)
            });

            if (!response.ok) throw new Error('Network response was not ok');

            const result = await response.text();
            showResult(result);
        } catch (error) {
            console.error('Error:', error);
            showError();
        }
    }

    // [수정] AI 요약 버튼 클릭 핸들러
    function handleAiSummaryClick() {
        // 현재 URL에서 카테고리 파라미터 확인
        const urlParams = new URLSearchParams(window.location.search);
        const currentCategory = urlParams.get('category');

        // 카테고리가 선택된 상태라면 바로 요약 요청
        if (currentCategory && currentCategory.trim() !== '') {
            summarizeCategory(currentCategory);
        } else {
            // 카테고리가 선택되지 않은 상태(전체)라면 모달 띄우기
            const modal = new bootstrap.Modal(document.getElementById('categorySelectionModal'));
            modal.show();
        }
    }

    // 2. 선택한 카테고리로 요약 요청
    async function summarizeCategory(selectedCategory) {
        // 카테고리 선택 모달이 열려있다면 닫기 (안전하게 처리)
        const selectionModalEl = document.getElementById('categorySelectionModal');
        const selectionModal = bootstrap.Modal.getInstance(selectionModalEl);
        if (selectionModal) {
            selectionModal.hide();
        }

        // 현재 검색 조건 가져오기 (카테고리는 선택한 값으로 덮어씀)
        const urlParams = new URLSearchParams(window.location.search);
        const keyword = urlParams.get('keyword') || '';
        const location = urlParams.get('location') || '';

        showLoading(`[${getCategoryName(selectedCategory)}] 게시글을 분석하고 있어요...`);

        try {
            const response = await fetch(`/post/summarize-category?category=${selectedCategory}&keyword=${keyword}&location=${location}`);

            if (!response.ok) throw new Error('Network response was not ok');

            const result = await response.text();
            showResult(result);
        } catch (error) {
            console.error('Error:', error);
            showError();
        }
    }

    function getCategoryName(code) {
        if (code === 'GROUP') return '공구';
        if (code === 'SHARE') return '나눔';
        if (code === 'FREE') return '자유';
        return '전체';
    }

    // 로딩 표시 함수
    function showLoading(message) {
        const summaryContent = document.getElementById('summaryContent');
        summaryContent.innerHTML = `
            <div class="text-center py-5">
                <div class="spinner-border text-primary mb-3" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="fw-bold text-dark mb-0">${message}</p>
                <p class="text-muted small">잠시만 기다려주세요! 🤖</p>
            </div>
        `;
        const summaryModal = new bootstrap.Modal(document.getElementById('summaryModal'));
        summaryModal.show();
    }

    // 결과 표시 함수
    function showResult(result) {
        const summaryContent = document.getElementById('summaryContent');
        summaryContent.innerHTML = `
            <div class="p-2" style="line-height:1.8; font-size: 1.05rem; color: #333;">
                ${result.replace(/\n/g, '<br>')}
            </div>
        `;
    }

    // 에러 표시 함수
    function showError() {
        const summaryContent = document.getElementById('summaryContent');
        summaryContent.innerHTML = `
            <div class="text-center py-4 text-danger">
                <i class="bi bi-exclamation-circle fs-1 mb-2"></i>
                <p class="fw-bold">요약을 가져오는데 실패했습니다.</p>
                <p class="small text-muted">잠시 후 다시 시도해주세요.</p>
            </div>
        `;
    }



    // -------------- 알림 받기 ---------------
    /* <![CDATA[ */
    $(document).ready(function() {

        // 로그인 사용자 확인 (타임리프 문법)
        const loginUserId = "[[${#authentication.principal != 'anonymousUser' ? #authentication.principal.user.id : ''}]]";
        // 서버에서 보낸 내 구독 목록
        const myExistingKeywords = /*[[${myKeywords}]]*/ [];
        // 새로 저장할 키워드
        let newKeywords = [];


        // 페이지 로드 시 알림 버튼 표시 여부 결정
        function checkSearchFilters() {

            let searchText = $('#keyword').val() ? $('#keyword').val().trim() : "";
            newKeywords = []; // 새로 추가한것 초기화
            let isAlreadySubscribed = false;

            if (searchText === "") {
                $('#alertSettingArea').hide();
                $('#alreadySubscribed').hide();
                return; // 검색어가 없으면 종료
            }

            // 이미 구독 중인 목록(myExistingKeywords)에 이 단어가 있는지 확인
            isAlreadySubscribed = myExistingKeywords.includes(searchText);

            if (isAlreadySubscribed) {
                // 이미 구독 중이면 '알림받기' 숨기고 '취소' 보여주기
                $('#alertSettingArea').hide();

                $('#oldKeywordsList').empty().append(`
                    <span class="badge rounded-pill btn-unsubscribe"
                      data-keyword="${searchText}"
                      style="cursor: pointer;">
                    ${searchText} <i class="bi bi-x-lg ms-1"></i>
                </span>
                `);
                $('#alreadySubscribed').show();
            } else {
                // 처음 보는 단어면 '알림받기' 보여주기
                newKeywords = [searchText]; // 서버 전송용 배열에 담기
                $('#appliedKeywords').text(searchText);
                $('#alertSettingArea').show();
                $('#alreadySubscribed').hide();
            }
        }

        // 사용자가 입력하거나 체크를 바꿀 때마다 실행되게 연결
        $('#keyword').on('input', checkSearchFilters);

        // 페이지가 열리자마자 바로 실행
        checkSearchFilters();

        // 알림 받기 버튼 클릭 시
        $('#btnSaveKeyword').on('click', function() {

            if (!loginUserId) {
                alert("로그인 후 이용 가능한 서비스입니다.");
                return;
            }


            // AJAX 전송
            $.ajax({
                url: '/subscription/save',
                type: 'POST',
                contentType: 'application/json',
                beforeSend: function(xhr) {
                    const token = $("meta[name='_csrf']").attr("content");
                    const header = $("meta[name='_csrf_header']").attr("content");
                    if (token && header) {
                        xhr.setRequestHeader(header, token);
                    }
                },
                data: JSON.stringify({
                    userId: loginUserId,
                    keywords: newKeywords,
                    targetType: 'post'
                }),
                success: function(response) {
                    alert("'" + newKeywords[0] + "' 키워드 알림이 설정되었습니다!");

                    // 저장 성공 후, 방금 저장한 것들을 "기존 목록"에 합쳐줍니다. (새로고침 없이 실시간 반영)
                    newKeywords.forEach(k => myExistingKeywords.push(k));

                    // 화면을 다시 체크해서 버튼을 숨깁니다.
                    checkSearchFilters();
                }
            });
        });

    // 배지를 클릭했을 때 실행될 코드
    $(document).on('click', '.btn-unsubscribe', function() {
        const keywordToDelete = $(this).data('keyword'); // 클릭한 배지의 단어 가져오기

        if (!confirm(`'${keywordToDelete}' 알림을 취소하시겠습니까?`)) return;

        const $badge = $(this); // 클릭한 배지 요소를 변수에 담아둠

        $.ajax({
            url: '/subscription/delete', // 서버에 삭제 요청
            type: 'POST',
            contentType: 'application/json',
            beforeSend: function(xhr) {
                const token = $("meta[name='_csrf']").attr("content");
                const header = $("meta[name='_csrf_header']").attr("content");
                if (token && header) xhr.setRequestHeader(header, token);
            },
            data: JSON.stringify({
                userId: loginUserId,
                keywords: [keywordToDelete],
                targetType: 'post'
            }),
            success: function(response) {
                alert("알림 설정이 취소되었습니다.");

                // 메모리에 있는 기존 목록에서도 삭제
                const index = myExistingKeywords.indexOf(keywordToDelete);
                if (index > -1) myExistingKeywords.splice(index, 1);

                // 화면에서 해당 배지 삭제
                $badge.remove();

                // 다시 전체 체크해서 버튼 상태 등 갱신
                checkSearchFilters();
            }
        });
    });
    });


    /* ]]> */
</script>
