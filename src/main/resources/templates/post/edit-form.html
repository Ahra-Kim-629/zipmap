<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css" rel="stylesheet">
    <style>
        .write-container { padding: 60px 0; background-color: #f5f4ef; }
        .write-card { background: #fff; padding: 40px; border-radius: 20px; border: none; }
        .write-title {  font-weight: 800; color: #3E362E; }

        .form-section { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #f1f1f1; }
        .section-label { font-weight: 700; color: #3E362E; margin-bottom: 15px; display: block; font-size: 1.1rem; }

        /* 파일 카드 디자인 */
        .file-card { background: #f8f9fa; border: 1px solid #eee; border-radius: 12px; padding: 15px; display: flex; align-items: center; justify-content: space-between; }

        /* Summernote 및 모달 커스텀 (리뷰 페이지와 100% 동일하게 통일) */
        .note-editor.note-frame { border: 1px solid #eee !important; border-radius: 12px !important; overflow: hidden; }
        .note-toolbar { background-color: #f8f9fa !important; border-bottom: 1px solid #eee !important; }
        .note-modal { z-index: 10050 !important; }
        .note-modal-backdrop { z-index: 10040 !important; display: none !important; }
        .note-modal-content { margin-top: 80px !important; border-radius: 15px !important; box-shadow: 0 15px 50px rgba(0,0,0,0.2) !important; overflow: hidden; }
        .note-modal-footer { height: auto !important; padding: 20px !important; display: flex !important; justify-content: center; gap: 10px; }
        .note-modal-footer .btn { padding: 10px 25px !important; border-radius: 50px !important; font-weight: bold !important; }
        .note-modal-footer .btn-primary { background-color: #F97316 !important; border-color: #F97316 !important; color: white !important;}
        .note-btn { background-color: white !important; border: 1px solid #eee !important; }

        .note-editor.note-frame.fullscreen {
            z-index: 9999 !important;
            background-color: white !important;
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important;
        }

        /* ✨ 수정 완료 버튼 (리스트 검색 버튼과 동일한 오렌지색) */
        .btn-submit-orange {
            background-color: #F97316 !important;
            color: #ffffff !important;
            border: none !important;
            transition: background-color 0.2s;
        }
        .btn-submit-orange:hover {
            background-color: #EA580C !important;
        }
    </style>
</th:block>

<div layout:fragment="content">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <div class="write-container">
        <div class="container">
            <div class="write-card daedong-shadow">
                <div class="text-center mb-5">
                    <h2 class="write-title mb-2">게시글 수정</h2>
                    <p class="text-muted small">작성하신 내용을 수정할 수 있습니다.</p>
                </div>

                <form th:action="@{/post/edit/{id}(id=${post.id})}" method="post" enctype="multipart/form-data">
                    <div class="form-section">
                        <span class="section-label"><i class="bi bi-tag me-2 text-orange"></i>분류 및 지역</span>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="category" class="form-label small fw-bold text-muted">카테고리</label>
                                <select id="category" name="category" class="form-select rounded-3 form-control"
                                        required>
                                    <option value="GROUP" th:selected="${post.category == 'GROUP'}">공구</option>
                                    <option value="SHARE" th:selected="${post.category == 'SHARE'}">나눔</option>
                                    <option value="FREE" th:selected="${post.category == 'FREE'}">자유</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="location" class="form-label small fw-bold text-muted">지역</label>
                                <select id="location" name="location" class="form-select rounded-3 form-control"
                                        required>
                                    <option value="SEOUL_CENTER" th:selected="${post.location == 'SEOUL_CENTER'}">서울
                                        중앙
                                    </option>
                                    <option value="SEOUL_EAST" th:selected="${post.location == 'SEOUL_EAST'}">서울 동부
                                    </option>
                                    <option value="SEOUL_SOUTH" th:selected="${post.location == 'SEOUL_SOUTH'}">서울 남부
                                    </option>
                                    <option value="SEOUL_WEST" th:selected="${post.location == 'SEOUL_WEST'}">서울 서부
                                    </option>
                                    <option value="SEOUL_NORTH" th:selected="${post.location == 'SEOUL_NORTH'}">서울 북부
                                    </option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <span class="section-label"><i class="bi bi-pencil-square me-2 text-orange"></i>내용 수정</span>
                        <div class="mb-4">
                            <label for="title" class="form-label small fw-bold text-muted">제목</label>
                            <input type="text" id="title" name="title" class="form-control rounded-3 py-2"
                                   th:value="${post.title}" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted">내용</label>
                            <textarea id="content" name="content" th:text="${post.content}" required></textarea>
                        </div>
                    </div>

                    <div class="form-section border-0 mb-0">
                        <span class="section-label"><i class="bi bi-paperclip me-2 text-orange"></i>첨부 파일 관리</span>

                        <div th:if="${not #lists.isEmpty(post.fileList)}" class="mb-4">
                            <div th:each="file : ${post.fileList}" th:id="|file-card-${file.id}|"
                                 class="file-card mb-2">
                                <div class="d-flex align-items-center">
                                    <img th:if="${#strings.endsWith(file.filePath,'.jpg') or #strings.endsWith(file.filePath,'.png') or #strings.endsWith(file.filePath,'.gif')}"
                                         th:src="@{/display(fileId=${file.filePath})}" class="rounded me-3" width="50"
                                         height="50" style="object-fit: cover;">
                                    <span class="small text-muted" th:text="'파일 ID: ' + ${file.id}"></span>
                                </div>
                                <button type="button" th:onclick="|deleteFile(${file.id})|"
                                        class="btn btn-sm btn-outline-danger rounded-pill px-3">삭제
                                </button>
                            </div>
                        </div>

                        <div class="bg-light p-3 rounded-3">
                            <label for="newFile" class="form-label small fw-bold">새 파일 추가/교체</label>
                            <input type="file" id="newFile" name="file" class="form-control rounded-3" multiple>
                            <p class="small text-muted mt-2 mb-0">※ 새 파일 추가 시 기존 파일 구성이 변경될 수 있습니다.</p>
                        </div>
                    </div>

                    <div class="d-flex gap-3 justify-content-center mt-5">
                        <button type="submit" class="btn btn-submit-orange px-5 py-3 fw-bold rounded-pill shadow-sm">수정 완료</button>
                        <a th:href="@{/post/detail/{id}(id=${post.id})}" class="btn btn-outline-secondary px-5 py-3 rounded-pill bg-white">수정 취소</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>
    <script th:inline="javascript">
        $(document).ready(function() {
            $('#content').summernote({
                height: 400,
                lang: 'ko-KR',
                dialogsInBody: true,
                dialogsFade: false,
                toolbar: [
                    ['style', ['style']],
                    ['font', ['bold', 'underline', 'clear']],
                    ['color', ['color']],
                    ['para', ['ul', 'ol', 'paragraph']],
                    ['table', ['table']],
                    ['insert', ['link', 'picture', 'hr']],
                    ['view', ['fullscreen', 'codeview', 'help']]
                ],
                callbacks: {
                    onImageUpload: function(files) {
                        for (let i = 0; i < files.length; i++) {
                            uploadSummernoteImage(files[i], this);
                        }
                    }
                }
            });
        });

        function uploadSummernoteImage(file, editor) {
            let data = new FormData(); data.append("file", file);
            let token = $("meta[name='_csrf']").attr("content");
            let header = $("meta[name='_csrf_header']").attr("content");
            $.ajax({
                url: "/review/uploadSummernoteImage", type: "POST", data: data, contentType: false, processData: false,
                beforeSend: function(xhr) { if (token && header) xhr.setRequestHeader(header, token); },
                success: function(response) { $(editor).summernote('insertImage', response.url); }
            });
        }

        function deleteFile(fileId) {
            if (!confirm("정말 이 파일을 삭제하시겠습니까?")) return;
            const token = $("meta[name='_csrf']").attr("content");
            const header = $("meta[name='_csrf_header']").attr("content");
            $.ajax({
                url: "/review/deleteFile/" + fileId, type: "POST",
                beforeSend: function(xhr) { if (token && header) xhr.setRequestHeader(header, token); },
                success: function(result) { if (result.trim() === "success") { $('#file-card-' + fileId).fadeOut(); } },
                error: function() { alert("삭제 실패"); }
            });
        }
    </script>
</div>
</html>
