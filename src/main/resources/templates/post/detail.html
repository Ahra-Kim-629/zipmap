<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<th:block layout:fragment="css">
    <style>
        .detail-container { padding: 60px 0; background-color: #fdfcf9; }
        .detail-card { background: #fff; padding: 50px; border-radius: 24px; border: none; }
        .detail-header { border-bottom: 1px solid #eee; padding-bottom: 30px; margin-bottom: 40px; }
        .detail-title { font-weight: 800; color: #3E362E; line-height: 1.4; }
        .badge-category { background-color: var(--main-orange); color: white; padding: 6px 14px; font-size: 0.8rem; }
        .badge-location { background-color: #f8f9fa; color: #666; border: 1px solid #eee; padding: 6px 14px; font-size: 0.8rem; }
        .content-body { line-height: 1.8; color: #444; font-size: 1.05rem; min-height: 250px; white-space: pre-wrap; word-break: break-all; }
        .btn-like, .btn-dislike { background: white; padding: 10px 25px; border-radius: 50px; font-weight: 700; transition: all 0.3s ease; }
        .btn-like { border: 1px solid #ff4757; color: #ff4757; }
        .btn-dislike { border: 1px solid #57606f; color: #57606f; }
        .reply-section { background: #f8f9fa; border-radius: 20px; padding: 35px; margin-top: 50px; }
        .reply-item { background: #fff; border-radius: 14px; padding: 20px; margin-bottom: 15px; border: 1px solid #eee; }
        .reply-author { font-weight: bold; color: #3E362E; font-size: 0.95rem; }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="detail-container">
        <div class="container" th:if="${postDTO != null}">
            <div class="detail-card daedong-shadow">
                <div class="detail-header">
                    <div class="mb-3">
                        <span class="badge badge-category rounded-pill me-2" th:text="${postDTO.category}">카테고리</span>
                        <span class="badge badge-location rounded-pill" th:text="${postDTO.location}">지역 정보</span>
                    </div>

                    <div class="d-flex justify-content-between align-items-center">
                        <h2 class="detail-title m-0" th:text="${postDTO.title}">제목</h2>
                        <div class="d-flex gap-2 align-items-center">
                            <button id="btn-ai-summary" class="btn btn-outline-primary rounded-pill btn-sm px-3">
                                <i class="bi bi-robot"></i> AI 요약하기
                            </button>
                            <a th:href="@{/report/write/POST/{id}(id=${postDTO.id})}" class="btn btn-outline-danger rounded-pill btn-sm px-3">
                                <i class="bi bi-megaphone"></i> 신고하기
                            </a>
                            <div sec:authorize="isAuthenticated()">
                                <div th:if="${#authentication.principal.id == postDTO.userId}" class="d-flex gap-2">

                                    <a th:href="@{/post/edit/{id}(id=${postDTO.id})}" class="btn btn-light btn-sm rounded-pill px-3 border">수정</a>

                                    <form th:action="@{/post/delete/{id}(id=${postDTO.id})}" method="post"
                                          onsubmit="return confirm('정말로 삭제하시겠습니까?');" style="display:inline;">

                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                                        <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill px-3">삭제</button>
                                    </form>

                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="text-muted small mt-3">
                        <span class="me-3"><i class="bi bi-person me-1"></i>[[${postDTO.loginId}]]</span>
                        <span><i class="bi bi-clock me-1"></i>[[${#temporals.format(postDTO.createdAt, 'yyyy.MM.dd HH:mm')}]]</span>
                    </div>
                </div>

                <div class="content-body mb-5" th:utext="${postDTO.content}"></div>

                <div class="reply-section">
                    <h5 class="fw-bold mb-4">
                        <i class="bi bi-chat-dots-fill me-2 text-orange"></i>댓글
                        <span id="reply-total-count" class="text-orange">[[${postDTO.replyList != null ? postDTO.replyList.size() : 0}]]</span>
                    </h5>

                    <div id="reply-container"></div>

                    <div id="reply-loader" class="text-center my-3" style="display:none;">
                        <div class="spinner-border text-orange" role="status"></div>
                    </div>

                    <div class="mt-4" sec:authorize="isAuthenticated()">
                        <form th:action="@{/reply/write}" method="post" class="bg-white p-3 rounded-4 shadow-sm border">
                            <input type="hidden" name="targetType" value="post">
                            <input type="hidden" name="targetId" th:value="${postDTO.id}">
                            <textarea name="content" class="form-control border-0 mb-2" rows="3" placeholder="의견을 남겨주세요." style="resize: none;"></textarea>
                            <div class="text-end">
                                <button type="submit" class="btn btn-orange px-4 py-2 rounded-pill fw-bold">댓글 등록</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="aiSummaryModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-primary">🤖 AI 본문 요약</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body py-4" id="ai-summary-content" style="white-space: pre-line; line-height: 1.7; color: #444;">
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">닫기</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script layout:fragment="script">
    // 1. 전역 변수 설정: 식당으로 치면 "오늘의 대기 명단" 같은 변수들입니다.
    let currentPage = 0;      // 현재 몇 번째 댓글 페이지인지 기록
    let isLoading = false;    // 지금 데이터를 가져오는 중인지 확인 (중복 요청 방지)
    let isLastPage = false;   // 더 이상 가져올 댓글이 없는지 확인
    const targetId = [[${postDTO.id}]]; // 현재 보고 있는 게시글의 번호
    const currentUserName = "[[${#authentication.name}]]"; // 로그인한 사용자의 이름

    $(document).ready(function() {
        // [홀 서빙 시작] 페이지가 열리자마자 실행되는 기능들입니다.

        // 초기 댓글 로드
        fetchReplies();

        // 무한 스크롤 설정: 바닥에 닿으면 다음 댓글을 가져옵니다.
        $(window).scroll(function() {
            if ($(window).scrollTop() + $(window).height() >= $(document).height() - 200) {
                if (!isLoading && !isLastPage) {
                    fetchReplies();
                }
            }
        });

        // [핵심 기능] AI 요약 버튼 클릭 이벤트
        $("#btn-ai-summary").click(function() {
            // 팝업창(모달) 객체 생성
            const summaryModal = new bootstrap.Modal(document.getElementById('aiSummaryModal'));

            // 팝업창에 "요리 중(분석 중)"이라는 메시지를 먼저 띄웁니다.
            $("#ai-summary-content").html(`
                <div class="text-center p-3">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2 text-muted">AI가 글과 댓글을 읽고 요약하는 중입니다...</p>
                </div>
            `);
            summaryModal.show();

            // 서버 지배인(Controller)에게 요약 요청을 보냅니다.
            $.ajax({
                url: "/post/summarize-detail/" + targetId,
                type: "GET",
                success: function(res) {
                    // 성공하면 AI가 보내준 따끈따끈한 요약 텍스트를 팝업창에 넣습니다.
                    $("#ai-summary-content").html(res);
                },
                error: function() {
                    // 실패하면 에러 메시지를 보여줍니다.
                    $("#ai-summary-content").html('<p class="text-danger text-center">요약에 실패했습니다. 다시 시도해 주세요.</p>');
                }
            });
        });
    }); // $(document).ready 끝

    // [창고지기] 서버에서 댓글 데이터를 가져오는 함수
    function fetchReplies() {
        isLoading = true;
        $("#reply-loader").show();
        $.ajax({
            url: "/reply/list",
            type: "GET",
            data: { targetType: 'post', targetId: targetId, page: currentPage },
            success: function(replies) {
                if (replies && replies.length > 0) {
                    replies.forEach(reply => { $("#reply-container").append(renderReply(reply)); });
                    currentPage++;
                    if (replies.length < 10) isLastPage = true;
                } else { isLastPage = true; }
            },
            complete: function() { isLoading = false; $("#reply-loader").hide(); }
        });
    }

    // [접시 닦기] 가져온 댓글 데이터를 예쁜 HTML 모양으로 만드는 함수
    function renderReply(reply) {
        const isOwner = (currentUserName === reply.loginId);
        let btnHtml = isOwner ? `
            <div class="d-flex align-items-center gap-2">
                <form action="/reply/delete" method="post" class="m-0">
                    <input type="hidden" name="id" value="${reply.id}">
                    <input type="hidden" name="targetType" value="post">
                    <input type="hidden" name="targetId" value="${targetId}">
                    <button type="submit" class="btn btn-link btn-sm p-0 text-danger text-decoration-none border-0" onclick="return confirm('삭제할까요?')">삭제</button>
                </form>
            </div>` : '';

        return `
            <div class="reply-item shadow-sm" id="reply-${reply.id}">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <span class="reply-author">${reply.loginId}</span>
                    ${btnHtml}
                </div>
                <p class="mb-0 text-secondary small">${reply.content}</p>
            </div>`;
    }
</script>
</html>
