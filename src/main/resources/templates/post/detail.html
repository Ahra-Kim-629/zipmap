<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<th:block layout:fragment="css">
    <style>
        .detail-container { padding: 60px 0; background-color: #f5f4ef; }
        .detail-card { background: #fff; padding: 50px; border-radius: 24px; border: none; }
        .detail-header { border-bottom: 1px solid #eee; padding-bottom: 30px; margin-bottom: 40px; }
        .detail-title { font-weight: 800; color: #3E362E; line-height: 1.4; }

        /* 배지 스타일 통일 */
        .badge-category { background-color: var(--main-orange); color: white; padding: 6px 14px; font-size: 0.8rem; }
        .badge-location { background-color: #f8f9fa; color: #666; border: 1px solid #eee; padding: 6px 14px; font-size: 0.8rem; }

        /* 본문 및 줄바꿈 설정 */
        .content-body {
            line-height: 1.8; color: #444; font-size: 1.05rem; min-height: 250px;
            white-space: pre-wrap; word-break: break-all; overflow-wrap: break-word;
        }

        /* 좋아요 버튼 스타일 통일 */
       .btn-like, .btn-dislike {
            background: white; padding: 10px 25px; border-radius: 50px;
            font-weight: 700; transition: all 0.3s ease;
        }
        .btn-like { border: 1px solid #ff4757; color: #ff4757; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.1); }
        .btn-like:hover { background: #ff4757; color: white; transform: translateY(-2px); }
        .btn-like-active { background: #ff4757; color: white; }

        .btn-dislike { border: 1px solid #57606f; color: #57606f; box-shadow: 0 4px 15px rgba(87, 96, 111, 0.1); }
        .btn-dislike:hover { background: #57606f; color: white; transform: translateY(-2px); }
        .btn-dislike-active { background: #57606f; color: white; }

        /* 첨부 파일 섹션 */
        .file-section { background: #f8f9fa; padding: 25px; border-radius: 16px; margin-bottom: 30px; border: 1px solid #f1f1f1; }
        .file-link { color: #555; text-decoration: none; font-size: 0.9rem; font-weight: 500; }
        .file-link:hover { color: var(--main-orange); }

        /* 댓글 영역 디자인 통일 */
        .reply-section { background: #f8f9fa; border-radius: 20px; padding: 35px; margin-top: 50px; }
        .reply-item { background: #fff; border-radius: 14px; padding: 20px; margin-bottom: 15px; border: 1px solid #eee; }
        .reply-author { font-weight: bold; color: #3E362E; font-size: 0.95rem; }
        .reply-date { font-size: 0.8rem; color: #bbb; }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="detail-container">
        <div class="container" th:if="${postDTO != null}">
            <div class="detail-card daedong-shadow">

                <div class="detail-header">
                    <div class="mb-3">
                        <span class="badge badge-category rounded-pill me-2" th:text="${postDTO.category.displayName}">카테고리</span>
                        <span class="badge badge-location rounded-pill"
                              th:text="${postDTO.location.displayName}">지역 정보</span>
                    </div>

                    <div class="d-flex justify-content-between align-items-center">
                        <h2 class="detail-title m-0" th:text="${postDTO.title}">제목</h2>
                        <div class="d-flex gap-2 align-items-center">
                            <button id="btn-ai-summary" class="btn btn-outline-primary rounded-pill btn-sm px-3">
                                <i class="bi bi-robot"></i> AI 요약하기
                            </button>
                            <a th:href="@{/report/write/POST/{id}(id=${postDTO.id})}"
                               class="btn btn-outline-danger rounded-pill btn-sm px-3">
                                <i class="bi bi-megaphone"></i> 신고하기
                            </a>
                            <div sec:authorize="isAuthenticated()">
                                <div th:if="${#authentication != null
                                            and #authentication.principal != null
                                            and #authentication.name == postDTO.loginId}" class="d-flex gap-2">
                                    <a th:href="@{/post/edit/{id}(id=${postDTO.id})}"
                                       class="btn btn-light btn-sm rounded-pill px-3 border">수정</a>

                                    <form th:action="@{/post/delete/{id}(id=${postDTO.id})}" method="post"
                                          onsubmit="return confirm('정말로 삭제하시겠습니까?');" style="display:inline;">

                                        <input type="hidden" th:name="${_csrf.parameterName}"
                                               th:value="${_csrf.token}"/>

                                        <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill px-3">
                                            삭제
                                        </button>
                                    </form>

                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex align-items-center text-muted small mt-2">
                        <span class="me-3"><i class="bi bi-person me-1"></i><span
                                th:text="${postDTO.loginId}">작성자</span></span>
                        <span><i class="bi bi-clock me-1"></i><span
                                th:text="${#temporals.format(postDTO.createdAt, 'yyyy.MM.dd HH:mm')}">작성일</span></span>
                    </div>
                </div>

                <div class="content-body mb-5" th:utext="${postDTO.content}"></div>

                <div th:if="${not #lists.isEmpty(postDTO.fileList)}" class="file-section mb-5">
                    <h6 class="fw-bold mb-3 small"><i class="bi bi-paperclip me-2 text-orange"></i>첨부파일</h6>
                    <ul class="list-unstyled mb-0">
                        <li th:each="file : ${postDTO.fileList}" class="mb-3">
                            <div>
                                <i class="bi bi-file-earmark-arrow-down me-2 text-muted"></i>
                                <a th:href="|/files/${file.filePath}|" th:text="${file.filePath}" class="file-link"
                                   download>파일명</a>
                            </div>
                        </li>
                    </ul>
                </div>

                <div class="d-flex flex-column align-items-center gap-4 mb-5 border-top pt-5">
                    <div class="d-flex gap-3">
                        <button type="button" class="btn-like" id="like-button"
                                th:classappend="${postDTO.reaction == 1} ? 'btn-like-active' : ''"
                                th:onclick="|handleReaction(1)|">
                            <i class="bi bi-hand-thumbs-up-fill me-2"></i>좋아요 <span id="like-count"
                                                                                    th:text="${postDTO.likeCount}">0</span>
                        </button>

                        <button type="button" class="btn-dislike" id="dislike-button"
                                th:classappend="${postDTO.reaction == -1} ? 'btn-dislike-active' : ''"
                                th:onclick="|handleReaction(-1)|">
                            <i class="bi bi-hand-thumbs-down-fill me-2"></i>싫어요 <span id="dislike-count"
                                                                                      th:text="${postDTO.dislikeCount}">0</span>
                        </button>
                    </div>
                    <a th:href="@{/post}" class="btn btn-outline-dark rounded-pill px-4 btn-sm">
                        <i class="bi bi-arrow-left me-1"></i> 목록으로
                    </a>
                </div>

                <div class="mt-4" sec:authorize="isAuthenticated()">
                    <form th:action="@{/reply/write}" method="post" class="bg-white p-3 rounded-4 shadow-sm border">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <input type="hidden" name="targetType" value="post">
                        <input type="hidden" name="targetId" th:value="${postDTO.id}">
                        <textarea name="content" class="form-control border-0 mb-2" rows="3"
                                  placeholder="의견을 남겨주세요." style="resize: none;"></textarea>
                        <div class="text-end">
                            <button type="submit" class="btn btn-orange px-4 py-2 rounded-pill fw-bold">댓글 등록
                            </button>
                        </div>
                    </form>
                </div>

                <div class="reply-section">
                    <h5 class="fw-bold mb-4">
                        <i class="bi bi-chat-dots-fill me-2 text-orange"></i>댓글
                        <span class="text-orange" th:text="${postDTO.replyList != null ? postDTO.replyList.size() : 0}">0</span>
                    </h5>

                    <div id="reply-container"></div>
                    <div id="reply-loader" class="text-center my-3" style="display:none;">
                        <div class="spinner-border text-orange" role="status"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="aiSummaryModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-primary">🤖 AI 본문 요약</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body py-4" id="ai-summary-content"
                     style="white-space: pre-line; line-height: 1.7; color: #444;">
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">닫기</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript" layout:fragment="script">
    /*<![CDATA[*/

    // 1. 전역 변수 설정 (Thymeleaf 안전 탐색 및 매핑 적용)
    let currentPage = 0;
    let isLoading = false;
    let isLastPage = false;
    let hasFocusedReply = false;
    const targetId = [[${postDTO?.id}]];
    const currentUserName = /*[[${#authentication != null ? #authentication.name : null}]]*/ null;
    const urlParams = new URLSearchParams(window.location.search);
    const focusReplyId = urlParams.get("replyId");
    const csrfParameterName = [[${_csrf.parameterName}]];
    const csrfToken = [[${_csrf.token}]];

    $(document).ready(function() {

        /* 알림 메시지 처리 (첫 번째 코드 참고) */
        const flashError = [[${errorMessage}]];
        const flashSuccess = [[${successMessage}]];

        if (flashError) {
            alert(flashError);
        }
        if (flashSuccess) {
            alert(flashSuccess);
        }
        if (urlParams.get('success') === 'report') {
            alert("신고가 정상적으로 접수되었습니다.");
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // 초기 댓글 로드
        if (targetId) {
            fetchReplies();
        }

        // 무한 스크롤 설정 (첫 번째 코드와 동일한 높이 조건 적용)
        $(window).on('scroll', function() {
            if ($(window).scrollTop() + $(window).height() >= $(document).height() - 250) {
                if (!isLoading && !isLastPage) {
                    fetchReplies();
                }
            }
        });

        // AI 요약 버튼 클릭 이벤트
        $("#btn-ai-summary").click(function() {
            const summaryModal = new bootstrap.Modal(document.getElementById('aiSummaryModal'));

            $("#ai-summary-content").html(`
                <div class="text-center p-3">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2 text-muted">AI가 글과 댓글을 읽고 요약하는 중입니다...</p>
                </div>
            `);
            summaryModal.show();

            $.ajax({
                url: "/post/summarize-detail/" + targetId,
                type: "GET",
                success: function(res) {
                    $("#ai-summary-content").html(res);
                },
                error: function() {
                    $("#ai-summary-content").html('<p class="text-danger text-center">요약에 실패했습니다. 다시 시도해 주세요.</p>');
                }
            });
        });
    }); // $(document).ready 끝

    // 서버에서 댓글 데이터를 가져오는 함수
    function fetchReplies() {
        if (isLoading || isLastPage) return;

        isLoading = true;
        $("#reply-loader").show();

        $.ajax({
            url: "/reply/list",
            type: "GET",
            data: { targetType: 'post', targetId: targetId, page: currentPage },
            success: function(replies) {
                if (replies && replies.length > 0) {
                    replies.forEach(reply => { $("#reply-container").append(renderReply(reply)); });
                    tryFocusReply();

                    currentPage++;
                    if (replies.length < 10) isLastPage = true;
                } else {
                    isLastPage = true;
                }
            },
            complete: function() {
                isLoading = false;
                $("#reply-loader").hide();
            }
        });
    }

    function tryFocusReply() {
        if (hasFocusedReply || !focusReplyId) return;

        const target = document.getElementById("reply-" + focusReplyId);

        if (target) {
            target.scrollIntoView({
                behavior: "smooth",
                block: "center"
            });

            target.classList.add("reply-focus");

            setTimeout(() => {
                target.classList.remove("reply-focus");
            }, 2000);

            hasFocusedReply = true;
        }
    }

    // 가져온 댓글 데이터를 예쁜 HTML 모양으로 만드는 함수
    function renderReply(reply) {
        const isOwner = (currentUserName !== null && currentUserName === reply.loginId);
        const authorName = reply.loginId ? reply.loginId : '탈퇴한 회원';
        const authorClass = reply.loginId ? 'reply-author' : 'reply-author text-muted small';

        let btnHtml = isOwner ? `
            <div class="d-flex align-items-center gap-2">
                <button class="btn btn-link btn-sm p-0 text-muted text-decoration-none border-0" onclick="toggleEditForm(${reply.id})" style="line-height: 1;">수정</button>
                <form action="/reply/delete" method="post" class="m-0 d-inline-flex">
                    <input type="hidden" name="${csrfParameterName}" value="${csrfToken}"/>
                    <input type="hidden" name="id" value="${reply.id}">
                    <input type="hidden" name="targetType" value="post">
                    <input type="hidden" name="targetId" value="${targetId}">
                    <button type="submit" class="btn btn-link btn-sm p-0 text-danger text-decoration-none border-0" onclick="return confirm('삭제할까요?')">삭제</button>
                </form>
            </div>` : '';

        return `
            <div class="reply-item shadow-sm" id="reply-${reply.id}">
                <div id="display-${reply.id}">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <span class="${authorClass}">${authorName}</span>
                        ${btnHtml}
                    </div>
                    <p class="mb-0 text-secondary small">${reply.content}</p>
                </div>
                <div id="editForm-${reply.id}" class="mt-3 p-3 bg-light rounded-3" style="display: none;">
                    <form action="/reply/edit" method="post">
                        <input type="hidden" name="${csrfParameterName}" value="${csrfToken}"/>
                        <input type="hidden" name="id" value="${reply.id}">
                        <input type="hidden" name="targetType" value="post">
                        <input type="hidden" name="targetId" value="${targetId}">
                        <textarea name="content" class="form-control border-0 mb-2" rows="2" style="resize:none;">${reply.content}</textarea>
                        <div class="text-end">
                            <button type="submit" class="btn btn-orange btn-sm rounded-pill px-3">저장</button>
                            <button type="button" class="btn btn-light btn-sm rounded-pill px-3 border" onclick="toggleEditForm(${reply.id})">취소</button>
                        </div>
                    </form>
                </div>
            </div>`;
    }

    function toggleEditForm(id) {
        const form = document.getElementById('editForm-' + id);
        const display = document.getElementById('display-' + id);
        if (form.style.display === 'none' || form.style.display === '') {
            form.style.display = 'block';
            display.style.opacity = '0.5';
        } else {
            form.style.display = 'none';
            display.style.opacity = '1';
        }
    }

    function handleReaction(type) {
        if (currentUserName === null || currentUserName === 'anonymousUser' || currentUserName === "") {
            if (confirm("로그인이 필요한 기능입니다. 로그인하시겠습니까?")) {
                const currentPath = window.location.pathname + window.location.search;
                location.href = "/login?prevPage=" + encodeURIComponent(currentPath);
            }
            return;
        }

        $.ajax({
            url: "/reaction",
            type: "POST",
            data: {
                targetType: 'post',
                targetId: targetId,
                type: type,
                [csrfParameterName]: csrfToken
            },
            success: function(res) {
                $("#like-count").text(res.likeCount);
                $("#dislike-count").text(res.dislikeCount);

                $("#like-button").removeClass("btn-like-active");
                $("#dislike-button").removeClass("btn-dislike-active");

                if (res.currentReaction === 1) {
                    $("#like-button").addClass("btn-like-active");
                } else if (res.currentReaction === -1) {
                    $("#dislike-button").addClass("btn-dislike-active");
                }
            },
            error: function(xhr) {
                if (xhr.status === 401) {
                    alert("로그인이 필요합니다.");
                    location.href = "/login";
                } else {
                    alert("처리 중 오류가 발생했습니다.");
                }
            }
        });
    }

    /*]]>*/
</script>
</html>
