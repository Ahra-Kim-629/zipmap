<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <style>
        .board-detail-container { padding: 50px 0; background-color: #fdfcf9; }
        .detail-card { background: #fff; padding: 40px; border-radius: 20px; border: none; }

        /* 상단 헤더 영역 */
        .post-header { border-bottom: 2px solid #f1f1f1; padding-bottom: 20px; margin-bottom: 30px; }
        .post-title {  font-weight: 800; color: #3E362E; line-height: 1.4; }
        .meta-info { font-size: 0.9rem; color: #888; display: flex; flex-wrap: wrap; gap: 15px; }

        /* 카테고리/지역 배지 */
        .badge-category { background-color: var(--main-orange); color: white; padding: 5px 12px; font-size: 0.8rem; }
        .badge-location { background-color: #f8f9fa; color: #666; border: 1px solid #eee; padding: 5px 12px; font-size: 0.8rem; }

        /* 본문 영역 */
        .post-content { line-height: 1.8; color: #444; font-size: 1.05rem; min-height: 200px; padding: 20px 0; }

        /* 반응 버튼 영역 (좋아요/싫어요) */
        .reaction-wrapper { display: flex; justify-content: center; gap: 20px; margin: 40px 0; padding: 20px; border-top: 1px solid #f8f9fa; }
        .btn-reaction { border-radius: 50px; padding: 10px 25px; font-weight: bold; transition: 0.2s; border: 1px solid #eee; background: white; }
        .btn-like:hover { background-color: #fff5f5; border-color: #ff8787; color: #fa5252; }
        .btn-dislike:hover { background-color: #f8f9fa; border-color: #adb5bd; color: #495057; }

        /* 첨부 파일 */
        .file-section { background: #f8f9fa; padding: 20px; border-radius: 12px; margin-bottom: 30px; }
        .file-link { color: #555; text-decoration: none; font-size: 0.9rem; transition: 0.2s; }
        .file-link:hover { color: var(--main-orange); }

        /* 댓글 영역 */
        .reply-container { margin-top: 50px; padding-top: 30px; border-top: 2px solid #3E362E; }
        .reply-item { padding: 20px 0; border-bottom: 1px solid #eee; }
        .reply-author { font-weight: bold; color: #333; margin-right: 10px; }
        .reply-date { font-size: 0.8rem; color: #bbb; }
        .reply-content { margin: 10px 0; color: #555; }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="board-detail-container">
        <div class="container" th:if="${post != null}">
            <div class="detail-card daedong-shadow">

                <div class="post-header">
                    <div class="mb-3">
                        <span class="badge badge-category rounded-pill me-2" th:text="${post.category}">카테고리</span>
                        <span class="badge badge-location rounded-pill" th:text="${post.location}">지역 정보</span>
                    </div>
                    <h2 class="post-title mb-3" th:text="${post.title}">게시글 제목입니다</h2>
                    <div class="meta-info">
                        <span><i class="bi bi-person me-1"></i><span th:text="${post.userId}">작성자</span></span>
                        <span><i class="bi bi-clock me-1"></i><span
                                th:text="${#temporals.format(post.createdAt, 'yyyy.MM.dd HH:mm')}">작성일</span></span>
                    </div>

                    <div th:if="${currentUserId == post.userId}" class="mt-3 text-end">
                        <a th:href="@{/post/edit/{id}(id=${post.id})}"
                           class="btn btn-sm btn-outline-secondary rounded-pill px-3 me-1">수정</a>
                        <form th:action="@{/post/delete/{id}(id=${post.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3"
                                    onclick="return confirm('정말 삭제하시겠습니까?')">삭제
                            </button>
                        </form>
                    </div>
                </div>

                <div class="post-content" th:utext="${post.content}">
                    내용이 표시되는 공간입니다.
                </div>

                <div th:if="${not #lists.isEmpty(post.fileList)}" class="file-section">
                    <h6 class="fw-bold mb-3 small"><i class="bi bi-paperclip me-2"></i>첨부파일</h6>
                    <ul class="list-unstyled mb-0">
                        <li th:each="file : ${post.fileList}" class="mb-1">
                            <i class="bi bi-file-earmark-arrow-down me-1"></i>
                            <a th:href="${file.filePath}" th:text="${file.filePath}" class="file-link">파일명.pdf</a>
                        </li>
                    </ul>
                </div>

                <div class="reaction-wrapper">
                    <form th:action="@{/reaction}" method="post" style="display: inline-block;">
                        <input type="hidden" name="targetType" value="post">
                        <input type="hidden" name="targetId" th:value="${post.id}">
                        <input type="hidden" name="type" value="1">
                        <button type="submit" th:classappend="${myReaction == 1} ? 'btn-active' : ''">
                            👍 좋아요 [[${post.likeCount}]]
                        </button>
                    </form>

                    <form th:action="@{/reaction}" method="post" style="display: inline-block; margin-left: 10px;">
                        <input type="hidden" name="targetType" value="post">
                        <input type="hidden" name="targetId" th:value="${post.id}">
                        <input type="hidden" name="type" value="-1">
                        <button type="submit" th:classappend="${myReaction == -1} ? 'btn-active' : ''">
                            👎 싫어요 [[${post.dislikeCount}]]
                        </button>
                    </form>
                </div>

                <div class="reply-container">
                    <h5 class="fw-bold mb-4"><i class="bi bi-chat-dots me-2"></i>댓글 <span class="text-orange"
                                                                                          th:text="${replyList != null ? replyList.size() : 0}">0</span>
                    </h5>

                    <div class="bg-light p-4 rounded-4 mb-5 shadow-sm">
                        <form th:action="@{/reply/write}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="targetType" value="post">
                            <input type="hidden" name="targetId" th:value="${post.id}">

                            <div class="d-flex gap-2">
                            <textarea name="content" class="form-control border-0 p-3 flex-grow-1" rows="2"
                                      placeholder="따뜻한 댓글을 남겨주세요."
                                      style="border-radius: 12px; resize: none;" required></textarea>

                                <button type="submit" class="btn btn-dark fw-bold"
                                        style="border-radius: 12px; min-width: 80px; white-space: nowrap; height: auto;">
                                    등록
                                </button>
                            </div>
                        </form>
                    </div>

                    <div th:if="${not #lists.isEmpty(replyList)}">
                        <div th:each="reply : ${replyList}" class="reply-item">
                            <div th:id="'reply-content-' + ${reply.id}">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <span class="reply-author" th:text="${reply.loginId}">작성자</span>
                                        <span class="reply-date"
                                              th:text="${#temporals.format(reply.createdAt, 'yyyy.MM.dd HH:mm')}">작성일</span>
                                    </div>
                                    <div th:if="${currentUserId == reply.userId || #authorization.expression('hasRole(''ADMIN'')')}">
                                        <button type="button" th:if="${currentUserId == reply.userId}"
                                                th:onclick="|showEditForm(${reply.id})|"
                                                class="btn btn-link btn-sm text-muted p-0 text-decoration-none">수정
                                        </button>
                                        <form th:action="@{/reply/delete}" method="post" class="d-inline ms-2">
                                            <input type="hidden" th:name="${_csrf.parameterName}"
                                                   th:value="${_csrf.token}"/>
                                            <input type="hidden" name="replyId" th:value="${reply.id}">
                                            <input type="hidden" name="targetId" th:value="${post.id}">
                                            <input type="hidden" name="targetType" value="POST">
                                            <button type="submit"
                                                    class="btn btn-link btn-sm text-danger p-0 text-decoration-none"
                                                    onclick="return confirm('정말 삭제하시겠습니까?')">삭제
                                            </button>
                                        </form>
                                    </div>
                                </div>
                                <p class="reply-content" th:text="${reply.content}">댓글 내용이 들어갑니다.</p>
                            </div>

                            <div th:id="'editForm-' + ${reply.id}" style="display: none; margin-top: 15px;"
                                 class="bg-white p-3 border rounded-3">
                                <form action="/reply/edit" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <input type="hidden" name="id" th:value="${reply.id}">
                                    <input type="hidden" name="targetId" th:value="${post.id}">
                                    <input type="hidden" name="targetType" value="POST">
                                    <div class="input-group">
                                        <input type="text" name="content" th:value="${reply.content}"
                                               class="form-control">
                                        <button type="submit" class="btn btn-orange px-3">저장</button>
                                        <button type="button" th:onclick="|hideEditForm(${reply.id})|"
                                                class="btn btn-secondary px-3">취소
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                    <div th:if="${#lists.isEmpty(replyList)}" class="text-center py-5 text-muted">
                        <p>아직 작성된 댓글이 없습니다. 첫 댓글을 남겨보세요!</p>
                    </div>
                </div>

                <div class="text-center mt-5 border-top pt-4">
                    <a th:href="@{/post}" class="btn btn-light rounded-pill px-4">
                        <i class="bi bi-list me-1"></i> 목록으로 돌아가기
                    </a>
                </div>
            </div>
        </div>
        <div th:if="${post == null}" class="container text-center py-5">
            <h3>존재하지 않는 게시글입니다.</h3>
            <a th:href="@{/post}" class="btn btn-orange mt-3">목록으로 가기</a>
        </div>
    </div>
</div>

<script layout:fragment="script">
    function showEditForm(id) { document.getElementById('editForm-' + id).style.display = 'block'; }
    function hideEditForm(id) { document.getElementById('editForm-' + id).style.display = 'none'; }
</script>

</html>
