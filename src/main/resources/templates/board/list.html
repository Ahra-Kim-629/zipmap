<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 목록</title>
    <style>
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f2f2f2; }
        .pagination { display: flex; justify-content: center; gap: 10px; list-style: none; padding: 0; }
        .pagination li { display: inline; }
        .pagination a { text-decoration: none; color: black; padding: 5px 10px; border: 1px solid #ddd; }
        .pagination .active a { background-color: #007bff; color: white; border-color: #007bff; }
        .pagination .disabled a { color: #ccc; pointer-events: none; }
    </style>
</head>
<body>

<h1>게시글 목록</h1>

<!-- 검색 폼 -->
<form action="/board" method="get" style="margin-bottom: 10px; text-align: right;">
    <select name="searchType">
        <option value="title" th:selected="${searchType == 'category'}">카테고리 전체</option>
        <option value="title" th:selected="${searchType == 'category'}">공구</option>
        <option value="title" th:selected="${searchType == 'category'}">나눔</option>
        <option value="title" th:selected="${searchType == 'category'}">자유</option>
    </select>
    <select name="searchType">
        <option value="title" th:selected="${searchType == 'location'}">지역 전체</option>
        <option value="title" th:selected="${searchType == 'location'}">서울 서부(강서,양천,구로,영등포,금천</option>
        <option value="title" th:selected="${searchType == 'location'}">서울 남부(강남,서초,관악,동작)</option>
        <option value="title" th:selected="${searchType == 'location'}">서울 동부(강동,송파,등등)</option>
        <option value="title" th:selected="${searchType == 'location'}">서울 북부(강동,송파,등등)</option>
        <option value="title" th:selected="${searchType == 'location'}">서울 중앙(종로,용산,서울역 등등)</option>
    </select>
    <input type="text" name="keyword" th:value="${keyword}" placeholder="검색어 입력">
    <button type="submit">검색</button>
</form>

<!-- 게시글 리스트 -->
<table>
    <thead>
    <tr>
        <th>번호</th>
        <th>제목</th>
        <th>작성자</th>
        <th>작성일</th>
        <th>좋아요</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="post : ${posts}">
        <td th:text="${post.id}"></td>
        <td><a th:href="@{/board/detail/{id}(id=${post.id})}" th:text="${post.title}"></a></td>
        <td th:text="${post.userId}"></td>
        <td th:text="${post.createdAt}"></td>
        <td th:text="${post.likeCount}"></td>
    </tr>
    <tr th:if="${posts.empty}">
        <td colspan="5">게시글이 없습니다.</td>
    </tr>
    </tbody>
</table>

<!-- 페이징 -->
<nav th:if="${posts.totalPages > 0}" aria-label="Page navigation">
    <ul class="pagination">
        <!-- 이전 페이지 -->
        <li class="page-item" th:classappend="${posts.first} ? 'disabled'">
            <a class="page-link" th:href="@{/board(page=${posts.number-1}, searchType=${searchType}, keyword=${keyword})}">&lt;</a>
        </li>

        <!-- 페이지 번호 -->
        <li class="page-item" th:each="page : ${#numbers.sequence(0, posts.totalPages-1)}"
            th:classappend="${page == posts.number} ? 'active'">
            <a class="page-link" th:href="@{/board(page=${page}, searchType=${searchType}, keyword=${keyword})}" th:text="${page+1}"></a>
        </li>

        <!-- 다음 페이지 -->
        <li class="page-item" th:classappend="${posts.last} ? 'disabled'">
            <a class="page-link" th:href="@{/board(page=${posts.number+1}, searchType=${searchType}, keyword=${keyword})}">&gt;</a>
        </li>
    </ul>
</nav>

</body>
</html>
