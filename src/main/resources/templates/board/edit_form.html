<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>글 수정 - Zipmap</title>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>
</head>
<body>
<h1>게시글 수정</h1>
<div th:if="${error}" style="color: red;">
    <p th:text="${error}"></p>
</div>
<div th:if="${message}" style="color: red;">
    <p th:text="${message}"></p>
</div>
<form th:action="@{/board/edit/{id}(id=${board.id})}" method="post" enctype="multipart/form-data">
    <div>
        <label for="category">카테고리</label>
        <select id="category" name="category" required>
            <option value="">카테고리 선택</option>
            <option value="GROUP" th:selected="${board.category == 'GROUP'}">공구</option>
            <option value="SHARE" th:selected="${board.category == 'SHARE'}">나눔</option>
            <option value="FREE" th:selected="${board.category == 'FREE'}">자유</option>
        </select>
    </div>
    <div>
        <label for="location">지역</label>
        <select id="location" name="location" required>
            <option value="">지역 선택</option>
            <option value="SEOUL_CENTER" th:selected="${board.location == 'SEOUL_CENTER'}">서울 중앙(종로,용산,서울역 등등)</option>
            <option value="SEOUL_EAST" th:selected="${board.location == 'SEOUL_EAST'}">서울 동부(강동,송파,등등)</option>
            <option value="SEOUL_SOUTH" th:selected="${board.location == 'SEOUL_SOUTH'}">서울 남부(강남,서초,관악,동작)</option>
            <option value="SEOUL_WEST" th:selected="${board.location == 'SEOUL_WEST'}">서울 서부(강서,양천,구로,영등포,금천)</option>
            <option value="SEOUL_NORTH" th:selected="${board.location == 'SEOUL_NORTH'}">서울 북부(강북,성북,등등)</option>
        </select>
    </div>
    <div>
        <label for="title">제목</label>
        <input type="text" id="title" name="title" th:value="${board.title}" required>
    </div>
    <div class="form-group">
        <label for="content">내용</label>
        <textarea class="form-control" id="content" name="content" rows="10" th:text="${board.content}"
                  required></textarea>
    </div>
    <div>
        <label for="file">첨부파일 추가</label>
        <input type="file" id="file" name="file" multiple>
        <p>첨부파일 추가 시 기존 첨부파일은 삭제됩니다.</p>
    </div>

    <div class="form-group">
        <p><b>첨부 파일 관리</b></p>
        <!-- 기존 파일 없는 경우 -->
        <div th:if="${#lists.isEmpty(board.fileList)}">
            <p>첨부된 파일이 없습니다.</p>
        </div>
        <!-- 기존 파일 있는 경우 -->
        <div th:if="${not #lists.isEmpty(board.fileList)}">
            <div th:each="file : ${board.fileList}" th:id="|file-card-${file.id}|"
                 style="margin-bottom: 10px; border: 1px solid #ddd; padding: 10px;">
                <!-- 이미지 파일인 경우 미리보기 -->
                <div th:if="${#strings.endsWith(file.filePath,'.jpg')
                    or #strings.endsWith(file.filePath,'.png')
                    or #strings.endsWith(file.filePath,'.gif')}">
                    <img width="100" th:src="@{/display(fileId=${file.filePath})}" class="img-thumbnail"
                         alt="첨부된 파일">
                    <button type="button" th:onclick="|deleteFile(fileId=${file.id})|"
                            class="btn btn-sm btn-danger">삭제
                    </button>
                </div>

                <!-- 이미지 파일이 아닌 경우 -->
                <p th:text="${file.id}"></p>
            </div>
        </div>

        <div class="form-group">
            <label for="newFile">새 파일 추가/교체 : </label>
            <input type="file" class="form-control-file" id="newFile" name="files" multiple>
        </div>
    </div>

    <div>
        <button type="submit">수정완료</button>
        <a th:href="@{/board/detail/{id}(id=${board.id})}">취소</a>
    </div>
</form>

<script>

    $(document).ready(function() {
    $('#content').summernote({
        height: 400,
        lang: 'ko-KR',
        placeholder: '내용을 입력해주세요.',
        callbacks: {
            onImageUpload: function(files) {
                // 올려진 파일 개수만큼 반복해서 서버에 보내기
    for (let i = 0; i < files.length; i++) {
        uploadSummernoteImage(files[i], this);
    }
            }
        }
    });
});

function uploadSummernoteImage(file, editor) {
    let data = new FormData();
    data.append("file", file);
    $.ajax({
        url: "/review/uploadSummernoteImage", // 아까 만든 컨트롤러 그대로 사용
        type: "POST",
        data: data,
        contentType: false,
        processData: false,
        success: function(response) {
            $(editor).summernote('insertImage', response.url);
        }
    });
}

    function deleteFile(fileId) {
    if (!confirm("정말 이 파일을 삭제하시겠습니까?")) return;

    $.ajax({
        url: "/review/deleteFile/" + fileId,
        type: "POST",
        success: function(result) {
            if (result === "success") {
                // 서버에서 삭제 성공하면 화면에서도 해당 파일 박스를 안 보이게 숨김
                $('#file-card-' + fileId).remove();
                alert("파일이 삭제되었습니다.");
            }
        },
        error: function() {
            alert("파일 삭제에 실패했습니다.");
        }
    });
}
</script>
</body>
</html>
