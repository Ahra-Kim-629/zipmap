<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>글 수정 - Zipmap</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>
</head>
<body>
<h1>게시글 수정</h1>
<div th:if="${error}" style="color: red;">
    <p th:text="${error}"></p>
</div>

<form th:action="@{/board/edit/{id}(id=${board.id})}" method="post">
    <div>
        <label for="category">카테고리</label>
        <select id="category" name="category" required>
            <option value="">카테고리 선택</option>
            <option value="GROUP" th:selected="${board.category == 'GROUP'}">공구</option>
            <option value="SHARE" th:selected="${board.category == 'SHARE'}">나눔</option>
            <option value="FREE" th:selected="${board.category == 'FREE'}">자유</option>
        </select>
    </div>
    <div>
        <label for="location">지역</label>
        <select id="location" name="location" required>
            <option value="">지역 선택</option>
            <option value="SEOUL_CENTER" th:selected="${board.location == 'SEOUL_CENTER'}">서울 중앙(종로,용산,서울역 등등)</option>
            <option value="SEOUL_EAST" th:selected="${board.location == 'SEOUL_EAST'}">서울 동부(강동,송파,등등)</option>
            <option value="SEOUL_SOUTH" th:selected="${board.location == 'SEOUL_SOUTH'}">서울 남부(강남,서초,관악,동작)</option>
            <option value="SEOUL_WEST" th:selected="${board.location == 'SEOUL_WEST'}">서울 서부(강서,양천,구로,영등포,금천)</option>
            <option value="SEOUL_NORTH" th:selected="${board.location == 'SEOUL_NORTH'}">서울 북부(강북,성북,등등)</option>
        </select>
    </div>
    <div>
        <label for="title">제목</label>
        <input type="text" id="title" name="title" th:value="${board.title}" required>
    </div>
    <div class="form-group">
        <label for="content">내용</label>
        <textarea class="form-control" id="content" name="content" rows="10" th:text="${board.content}" required></textarea>
    </div>

    <div>
        <button type="submit">수정완료</button>
        <a th:href="@{/board/detail/{id}(id=${board.id})}">취소</a>
    </div>
</form>

<script>
    $(document).ready(function() {
        $('#content').summernote({
            height: 400,
            lang: 'ko-KR',
            placeholder: '내용을 입력해주세요.',
            callbacks: {
                onImageUpload: function(files) {
                    for (let i = 0; i < files.length; i++) {
                        uploadSummernoteImage(files[i], this);
                    }
                },
                onMediaDelete: function(target) {
                    deleteSummernoteImage(target[0].src);
                }
            }
        });
    });

    // [이미지 업로드]
    function uploadSummernoteImage(file, editor) {
        let data = new FormData();
        data.append("file", file);

        let token = $("meta[name='_csrf']").attr("content");
        let header = $("meta[name='_csrf_header']").attr("content");

        $.ajax({
            url: "/board/uploadSummernoteImage", // ★ 주소 변경됨
            type: "POST",
            data: data,
            contentType: false,
            processData: false,
            beforeSend: function(xhr) {
                if (token && header) {
                    xhr.setRequestHeader(header, token);
                }
            },
            success: function(response) {
                $(editor).summernote('insertImage', response.url);
            }
        });
    }

    // [이미지 삭제]
    function deleteSummernoteImage(src) {
        let token = $("meta[name='_csrf']").attr("content");
        let header = $("meta[name='_csrf_header']").attr("content");

        $.ajax({
            data: {src: src},
            type: "POST",
            url: "/board/deleteSummernoteImage", // ★ 주소 변경됨
            beforeSend: function(xhr) {
                if (token && header) {
                    xhr.setRequestHeader(header, token);
                }
            }
        });
    }
</script>
</body>
</html>
