<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Post Detail</title>
</head>
<body>
<div th:if="${board != null}">
    <h1 th:text="${board.title}">Title</h1>
    <p><strong>Category:</strong> <span th:text="${board.category}">Category</span></p>
    <p><strong>Author:</strong> <span th:text="${board.userId}">User ID</span></p>
    <p><strong>Location:</strong> <span th:text="${board.location}">Location</span></p>
    <p><strong>Date:</strong> <span th:text="${board.createdAt}">Date</span></p>
    <hr>
    <div th:if="${currentUserId == board.userId}" style="margin-bottom: 10px;">
        <a th:href="@{/board/edit/{id}(id=${board.id})}"
           style="padding: 5px 15px; font-size: 14px; background-color: #f8f9fa; border: 1px solid #ddd; color: #333; text-decoration: none; border-radius: 4px;">수정</a>
        <form th:action="@{/board/delete/{id}(id=${board.id})}" method="post" style="display:inline;">
            <button type="submit"
                    onclick="return confirm('정말 삭제하시겠습니까?')"
                    style="padding: 5px 15px; font-size: 14px; background-color: #fff; border: 1px solid #d9534f; color: #d9534f; border-radius: 4px; cursor:pointer;">
                삭제
            </button>
        </form>
    </div>
    <div>
        <p th:text="${board.content}">Content</p>
    </div>
    <hr>
    <div th:if="${not #lists.isEmpty(board.fileList)}">
        <h3>Files</h3>
        <ul>
            <li th:each="file : ${board.fileList}">
                <a th:href="${file.filePath}" th:text="${file.filePath}">File Path</a>
            </li>
        </ul>
    </div>
    <hr>
    <div>
        <span>Likes: <span th:text="${board.likeCount}">0</span></span>
        <span>Dislikes: <span th:text="${board.dislikeCount}">0</span></span>
    </div>
    <hr>
    <h3>Replies</h3>
    <a th:href="@{/board}"
       style="display: inline-block; margin: 20px 0; padding: 10px 20px; background-color: #6c757d; color: white; text-decoration: none; border-radius: 4px;">
        목록으로 돌아가기
    </a>
    <!--        <div th:if="${not #lists.isEmpty(board.replyList)}">-->
    <!--            <ul>-->
    <!--                <li th:each="reply : ${board.replyList}">-->
    <!--                    <p th:text="${reply.content}">Reply Content</p>-->
    <!--                    <small th:text="${reply.createdAt}">Reply Date</small>-->
    <!--                </li>-->
    <!--            </ul>-->
    <!--        </div>-->
    <!-- 댓글 등록 폼 -->
    <div style="margin-bottom: 30px; padding: 15px; background-color: #f9f9f9; border-radius: 5px;">
        <form th:action="@{/reply/write}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="targetType" value="board">
            <input type="hidden" name="targetId" th:value="${board.id}">
            <input type="hidden" name="userId" th:value="${currentUserId}">

            <div style="display: flex; gap: 10px;">
            <textarea name="content" placeholder="댓글을 입력해주세요" required
                      style="flex: 1; height: 60px; padding: 10px; border: 1px solid #ddd; border-radius: 4px;"></textarea>
                <button type="submit"
                        style="width: 80px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">
                    등록
                </button>
            </div>
        </form>
    </div>

    <div th:if="${not #lists.isEmpty(replyList)}">
        <ul style="padding: 0;">
            <li th:each="reply : ${replyList}"
                style="margin-bottom: 20px; list-style: none; border-bottom: 1px solid #eee; padding-bottom: 10px;">

                <div th:id="'reply-content-' + ${reply.id}">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div>
                            <strong th:text="${reply.userId}">작성자</strong> :
                            <span th:text="${reply.content}">댓글 내용</span>
                            <br>
                            <small style="color: #888;" th:text="${reply.createdAt}"></small>
                        </div>

                        <!-- 댓글 삭제 -->
                        <div style="flex-shrink: 0;" th:if="${currentUserId == reply.userId}">
                            <button type="button" th:onclick="'showEditForm(' + ${reply.id} + ')'"
                                    style="padding: 2px 8px; font-size: 12px; background: #eee; border: 1px solid #ccc; cursor: pointer;">
                                수정
                            </button>
                            <form th:action="@{/reply/delete}" method="post" style="display:inline;">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                                <input type="hidden" name="replyId" th:value="${reply.id}">
                                <input type="hidden" name="targetId" th:value="${board.id}">
                                <input type="hidden" name="targetType" value="board">
                                <input type="hidden" name="userId" th:value="${reply.userId}">

                                <button type="submit" onclick="return confirm('정말 삭제하시겠습니까?')"
                                        style="padding: 2px 8px; font-size: 12px; color: #d9534f; background: #fff; border: 1px solid #d9534f; border-radius: 2px; cursor:pointer;">
                                    삭제
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
                <!-- 댓글 수정 -->
                <div th:id="'editForm-' + ${reply.id}"
                     style="display: none; margin-top: 10px; background: #fff; padding: 10px; border: 1px solid #ddd;">
                    <form action="/reply/edit" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="id" th:value="${reply.id}">
                        <input type="hidden" name="targetId" th:value="${board.id}">
                        <input type="hidden" name="targetType" value="board">
                        <div style="display: flex; gap: 5px;">
                            <input type="text" name="content" th:value="${reply.content}"
                                   style="flex: 1; padding: 5px; border: 1px solid #ccc;">
                            <button type="submit"
                                    style="background: #28a745; color: white; border: none; padding: 5px 10px; cursor: pointer;">
                                저장
                            </button>
                            <button type="button" th:onclick="'hideEditForm(' + ${reply.id} + ')'"
                                    style="background: #6c757d; color: white; border: none; padding: 5px 10px; cursor: pointer;">
                                취소
                            </button>
                        </div>
                    </form>
                </div>
            </li>
        </ul>
    </div>
    <div th:if="${#lists.isEmpty(board.replyList)}">
        <p>No replies yet.</p>
    </div>
</div>
<div th:if="${board == null}">
    <p>Post not found.</p>
</div>
</body>
<script>
    function showEditForm(id) { document.getElementById('editForm-' + id).style.display = 'block'; }
    function hideEditForm(id) { document.getElementById('editForm-' + id).style.display = 'none'; }
</script>

</html>
