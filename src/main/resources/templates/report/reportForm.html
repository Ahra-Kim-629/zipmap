<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <style>
        .report-container { padding: 60px 0; background-color: #fdfcf9; }
        .report-card { background: #fff; padding: 40px; border-radius: 20px; border: none; max-width: 700px; margin: 0 auto; }
        .report-title { font-weight: 800; color: #3E362E; margin-bottom: 20px; }

        .info-box { background-color: #fff9f5; border-radius: 12px; padding: 20px; margin-bottom: 30px; border-left: 5px solid var(--main-orange); }
        .info-box ul { margin-bottom: 0; font-size: 0.9rem; color: #666; }

        .form-label { font-weight: 700; color: #555; margin-bottom: 8px; }
        .form-control, .form-select { border-radius: 10px; border: 1px solid #eee; padding: 12px; }
        .form-control:focus, .form-select:focus { border-color: var(--main-orange); box-shadow: 0 0 0 0.25rem rgba(230,126,34,0.1); }

        .btn-submit { background-color: #dc3545; color: white; border: none; padding: 12px 30px; border-radius: 50px; font-weight: 700; transition: 0.3s; }
        .btn-submit:hover { background-color: #c82333; transform: translateY(-2px); }
        .btn-cancel { background-color: #f8f9fa; color: #666; border: 1px solid #eee; padding: 12px 30px; border-radius: 50px; font-weight: 700; }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="report-container">
        <div class="container">
            <div class="report-card daedong-shadow">
                <h2 class="report-title text-center"><i class="bi bi-megaphone-fill text-danger me-2"></i>게시글 신고</h2>

                <div class="info-box">
                    <h6 class="fw-bold"><i class="bi bi-info-circle me-2"></i>신고 안내 사항</h6>
                    <ul>
                        <li>신고하신 내용은 관리자 검토 후 조치되며, 결과는 별도로 통보되지 않을 수 있습니다.</li>
                        <li>허위 신고일 경우 서비스 이용에 제한을 받을 수 있으니 신중하게 작성해 주세요.</li>
                        <li>증거 사진이 있다면 반드시 첨부해 주시기 바랍니다.</li>
                    </ul>
                </div>

                <form th:action="@{/report/submit}" th:object="${reportDTO}" method="post" enctype="multipart/form-data">
                    <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <input type="hidden" th:field="*{postId}"/>

                    <div class="mb-4">
                        <label class="form-label">신고 사유 선택</label>
                        <select th:field="*{reasonType}" class="form-select" required>
                            <option value="" disabled selected>사유를 선택해 주세요</option>
                            <option value="SPAM">스팸/영리목적 홍보</option>
                            <option value="ABUSE">욕설/비하발언/인신공격</option>
                            <option value="INAPPROPRIATE">부적절한 콘텐츠 (음란물/도박)</option>
                            <option value="ETC">기타 (직접 입력)</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">상세 신고 내용</label>
                        <textarea th:field="*{content}" class="form-control" rows="6"
                                  placeholder="신고 사유에 대해 구체적으로 적어주세요. (최소 10자 이상)" required></textarea>
                    </div>

                    <div class="mb-5">
                        <label class="form-label">증거 사진 첨부 (선택)</label>
                        <input type="file" name="reportFile" class="form-control" accept="image/*">
                        <p class="text-muted small mt-2"><i class="bi bi-exclamation-circle me-1"></i>jpg, png, gif 파일만 업로드 가능합니다.</p>
                    </div>

                    <div class="d-flex justify-content-center gap-3">
                        <a th:href="@{/post/detail/{id}(id=*{postId})}" class="btn btn-cancel">취소</a>
                        <button type="submit" class="btn btn-submit shadow-sm">신고 접수하기</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</html>
