<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <style>
        .unregister-container { padding: 80px 0; background-color: #fdfcf9; min-height: 80vh; }
        .unregister-card { max-width: 500px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 20px; border: none; }
        .page-title { font-weight: 800; color: #3E362E; }

        /* 주의사항 박스 */
        .warning-box {
            background-color: #fff5f5;
            border: 1px solid #ffe3e3;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .warning-title { color: #e03131; font-weight: bold; font-size: 0.95rem; margin-bottom: 8px; }
        .warning-text { color: #495057; font-size: 0.85rem; line-height: 1.6; margin-bottom: 0; }

        /* 입력 폼 스타일 */
        .form-label { font-size: 0.85rem; font-weight: 600; color: #666; margin-bottom: 8px; }
        .form-control-readonly { background-color: #f8f9fa !important; border-color: #eee !important; color: #999 !important; }

        /* 버튼 스타일 */
        .btn-unregister { background-color: #e03131 !important; color: white !important; border: none !important; transition: 0.2s; }
        .btn-unregister:hover { background-color: #c92a2a !important; box-shadow: 0 4px 12px rgba(224, 49, 49, 0.2); }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="unregister-container">
        <div class="container">
            <div class="unregister-card daedong-shadow">
                <div class="text-center mb-5">
                    <h2 class="page-title mb-2">회원 탈퇴</h2>
                    <p class="text-muted small">그동안 대동여집도를 이용해 주셔서 감사합니다.</p>
                </div>

                <div class="warning-box">
                    <div class="warning-title"><i class="bi bi-exclamation-triangle-fill me-2"></i>탈퇴 전 확인해 주세요</div>
                    <ul class="warning-text ps-3">
                        <li>탈퇴 시 계정 정보 및 작성하신 모든 데이터는 복구가 불가능합니다.</li>
                        <li>작성하신 후기와 게시글은 삭제되지 않으니, 삭제를 원하시면 먼저 삭제 후 탈퇴해 주세요.</li>
                    </ul>
                </div>

                <form th:action="@{/users/unregister}" th:method="post" th:object="${user}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" th:field="*{id}"/>

                    <div class="mb-4">
                        <label for="loginId" class="form-label">아이디</label>
                        <input type="text" id="loginId" th:field="*{loginId}"
                               class="form-control rounded-3 form-control-readonly" readonly/>
                    </div>

                    <div class="mb-5">
                        <label for="password" class="form-label">비밀번호 확인</label>
                        <input type="password" id="password" name="password" class="form-control rounded-3 py-3"
                               placeholder="본인 확인을 위해 비밀번호를 입력하세요" required/>
                        <div class="form-text mt-2 small text-muted">안전을 위해 비밀번호를 한 번 더 입력해 주세요.</div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-unregister btn-lg fw-bold rounded-pill py-3"
                                onclick="return confirm('정말로 탈퇴하시겠습니까? 탈퇴 후 데이터는 복구할 수 없습니다.')">
                            회원 탈퇴 확정
                        </button>
                        <a th:href="@{/}"
                           class="btn btn-outline-secondary btn-lg rounded-pill py-3 border-0 small text-muted">
                            탈퇴 취소하고 메인으로
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</html>
