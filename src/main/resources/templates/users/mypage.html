<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <style>
        .mypage-container { padding: 60px 0; background-color: #fdfcf9; }
        .mypage-card { background: #fff; padding: 40px; border-radius: 15px; }
        .section-title {color: #3E362E; font-weight: 800; border-bottom: 2px solid var(--main-orange); display: inline-block; padding-bottom: 5px; margin-bottom: 30px; }

        /* 폼 스타일 */
        .form-label { font-size: 0.85rem; font-weight: 600; color: #666; }
        .form-control[readonly] { background-color: #f8f9fa; color: #aaa; cursor: not-allowed; }

        /* 인증 박스 스타일 */
        .cert-box { background-color: #fff9f4; border: 1px dashed var(--main-orange); border-radius: 12px; padding: 25px; transition: transform 0.2s; }
        .cert-box:hover { transform: translateY(-3px); }

        /* 활동 링크 사이드바 스타일 */
        .activity-link { display: flex; align-items: center; padding: 12px 15px; background: #fff; border: 1px solid #eee; border-radius: 8px; color: #555; text-decoration: none; transition: 0.2s; margin-bottom: 10px; }
        .activity-link:hover { background-color: var(--main-orange); color: #fff; border-color: var(--main-orange); }
        .activity-link i { margin-right: 10px; font-size: 1.1rem; }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="container mt-3">
        <div th:if="${error}" class="alert alert-danger border-0 small p-2 text-center" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-warning border-0 small p-2 text-center"
             th:text="${success}"></div>
    </div>

    <div class="mypage-container">
        <div class="container">
            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="mypage-card daedong-shadow">
                        <h3 class="section-title">회원 정보 수정</h3>

                        <form th:action="@{/users/mypage}" th:method="post" th:object="${user}">
                            <input type="hidden" th:field="*{id}"/>

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="loginId" class="form-label">아이디</label>
                                    <input type="text" id="loginId" th:field="*{loginId}" class="form-control rounded-3"
                                           readonly/>
                                </div>
                                <div class="col-md-6">
                                    <label for="name" class="form-label">이름</label>
                                    <input type="text" id="name" th:field="*{name}" class="form-control rounded-3"
                                           readonly/>
                                </div>

                                <div class="col-12 mt-4">
                                    <p class="small fw-bold text-muted mb-2"><i class="bi bi-shield-lock me-1"></i>비밀번호
                                        변경 (필요 시에만 입력)</p>
                                    <div class="row g-2">
                                        <div class="col-md-4">
                                            <input type="password" id="password" name="password"
                                                   class="form-control rounded-3" placeholder="기존 비밀번호"/>
                                        </div>
                                        <div class="col-md-4">
                                            <input type="password" id="newPassword" name="new_password"
                                                   class="form-control rounded-3" placeholder="새 비밀번호"/>
                                        </div>
                                        <div class="col-md-4">
                                            <input type="password" id="passwordConfirm" name="password_confirm"
                                                   class="form-control rounded-3" placeholder="새 비밀번호 확인"/>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-12 mt-4">
                                    <label for="email" class="form-label">이메일</label>
                                    <input type="email" id="email" th:field="*{email}" class="form-control rounded-3"
                                           required/>
                                </div>
                                <div>
                                    <label>성별:</label>
                                    <input type="radio" id="genderM" name="gender" value="M" th:field="*{gender}"/>
                                    <label for="genderM">남자</label>
                                    <input type="radio" id="genderF" name="gender" value="F" th:field="*{gender}"/>
                                    <label for="genderF">여자</label>
                                </div>
                                <div class="col-md-6" style="position:relative;">
                                    <label for="address" class="form-label">거주 주소</label>
                                    <input type="text" id="address" th:field="*{address}"
                                           class="form-control rounded-3"/>
                                    <ul id="addressList"
                                        style="display:none; position:absolute; width: calc(100% - 24px); background:white; border:1px solid #ccc; list-style:none; padding:0; margin:0; z-index:100; top: 100%;">
                                    </ul>
                                </div>
                            </div>

                            <div class="d-flex gap-2 mt-5">
                                <button type="submit" class="btn btn-orange px-5 py-2 rounded-pill fw-bold shadow-sm">
                                    수정 완료
                                </button>
                                <a th:href="@{/}" class="btn btn-outline-secondary px-4 py-2 rounded-pill">취소</a>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="mypage-card daedong-shadow py-4">
                        <h5 class="fw-bold mb-3 px-2">나의 활동</h5>
                        <div class="activity-menu">
                            <a th:href="@{/users/articles(type='reviews')}" class="activity-link">
                                <i class="bi bi-file-earmark-text"></i> 내가 쓴 리뷰
                            </a>
                            <a th:href="@{/users/comments(type='reviews')}" class="activity-link">
                                <i class="bi bi-chat-dots"></i> 내가 쓴 댓글
                            </a>

                            <!-- 알림 -->
                            <hr class="my-3 opacity-5">
                            <h6 class="fw-bold mb-3 px-2" style="font-size: 0.9rem; color: #666;">
                                <i class="bi bi-bell-fill text-warning me-1"></i> 키워드 알림
                            </h6>

                            <div id="mypage-alarm-list" class="px-2" style="max-height: 300px; overflow-y: auto;">
                                <div th:if="${#lists.isEmpty(alarmList)}" class="text-muted small py-3 text-center">
                                    새로운 알림이 없습니다.
                                </div>

                                <div th:each="alarm : ${alarmList}"
                                     class="alarm-item-box mb-2 p-2 rounded-3 border"
                                     th:style="${alarm.isRead == 'N'} ? 'background-color: #fff9f0; border-color: #ffcc80;' : 'background-color: #f8f9fa;'">

                                    <div class="small mb-1" th:text="${alarm.message}"
                                         th:style="${alarm.isRead == 'N'} ? 'font-weight: bold;' : ''">
                                        알림 내용이 들어갑니다.
                                    </div>

                                    <div class="d-flex justify-content-between align-items-center">
                                        <span class="text-muted" style="font-size: 0.7rem;"
                                              th:text="${#temporals.format(alarm.createdAt, 'yyyy-MM-dd HH:mm')}">
                                            2026-02-26
                                        </span>
                                        <button type="button" class="btn btn-sm btn-outline-orange py-0 px-2" style="font-size: 0.7rem;"
                                                th:onclick="readAndGo([[${alarm.id}]], [[${alarm.targetId}]], [[${alarm.targetType}]])">
                                            이동
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <a th:href="@{/users/liked(type='reviews')}" class="activity-link">
                                <i class="bi bi-chat-heart"></i> 좋아요 한 글
                            </a>
                        </div>
                        <hr class="my-4 opacity-5">
                        <div class="px-2">
                            <a th:href="@{/users/unregister}" class="text-danger small text-decoration-none">회원 탈퇴</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:src="'//dapi.kakao.com/v2/maps/sdk.js?appkey=' + ${@environment.getProperty('kakao.maps.appkey')} + '&libraries=services'"></script>

    <script th:inline="javascript">
        // 카카오 주소 검색 서비스(Geocoder) 객체를 생성
 var geocoder = new kakao.maps.services.Geocoder();

 $('#address').on('keyup', function() {
     var query = $(this).val();

     if (query.length > 1) {
         // 주소로 검색을 요청
         geocoder.addressSearch(query, function(result, status) {

             // 검색 성공 시(OK)
             if (status === kakao.maps.services.Status.OK) {
                 let $list = $('#addressList');
                 $list.empty().show();

                 // 결과값(result) 리스트 생성
                 result.forEach(function(item) {
                     let li = $('<li style="padding:10px; cursor:pointer; border-bottom:1px solid #eee;">')
                              .text(item.address_name)
                              .on('click', function() {
                                  $('#address').val(item.address_name);
                                  $list.hide();

                              });
                     $list.append(li);
                 });
             }
         });
     } else {
         $('#addressList').hide();
     }
 });


        // --------- 알림 ----------

        function readAndGo(alarmId, targetId, targetType) {
            const token = $("meta[name='_csrf']").attr("content");
            const header = $("meta[name='_csrf_header']").attr("content");

            // 서버에 읽음 처리 요청 (비동기 POST 방식)
            $.ajax({
                url: '/alarm/read/' + alarmId,
                method: 'POST',
                beforeSend: function(xhr) {
                    // 보내기 전에 헤더에 통행증을 붙여줍니다
                    if(header && token) xhr.setRequestHeader(header, token);
                },
                success: function() {
                    // 읽음 처리가 완료되면 상세 페이지로 이동
                    let path = (targetType === 'REVIEW') ? '/review/detail/' : '/post/detail/';
                    location.href = path + targetId;
                },
                error: function() {
                    alert("알림 처리에 실패했습니다.");
                }
            });
        }
    </script>
</div>
</html>
