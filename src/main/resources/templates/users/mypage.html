<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원 정보 수정</title>
</head>
<body>
    <h1>회원 정보 수정</h1>
    <form th:action="@{/users/mypage}" th:method="post" th:object="${user}">
        <input type="hidden" th:field="*{id}" />
        <input type="hidden" th:field="*{password}">
        <div>
            <label for="loginId">아이디:</label>
            <input type="text" id="loginId" th:field="*{loginId}" readonly />
        </div>
        <div>
            <label for="password">기존 비밀번호</label>
            <input type="text" id="password" name="password" placeholder="기존 비밀번호"/>
        </div>
        <div>
            <label for="newPassword">새 비밀번호</label>
            <input type="text" id="newPassword" name="new_password" placeholder="새 비밀번호"/>
        </div>
        <div>
            <label for="passwordConfirm">새 비밀번호 확인</label>
            <input type="text" id="passwordConfirm" name="password_confirm" placeholder="새 비밀번호 확인"/>
        </div>
        <div>
            <label for="name">이름:</label>
            <input type="text" id="name" th:field="*{name}" readonly />
        </div>
        <div>
            <label for="email">이메일:</label>
            <input type="email" id="email" th:field="*{email}" />
        </div>
        <div>
            <label for="phone">전화번호:</label>
            <input type="text" id="phone" th:field="*{phone}" />
        </div>
        <div>
            <label for="address">주소:</label>
            <input type="text" id="address" th:field="*{address}" />
        </div>
        <button type="submit">수정 완료</button>
        <a th:href="@{/}">취소</a>
    </form>
    <a th:href="@{/}">실거주 주소 수정</a>
    <a th:href="@{/users/unregister}">회원 탈퇴</a>

</body>
</html>
