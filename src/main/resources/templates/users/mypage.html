<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원 정보 수정</title>
</head>
<body>
<h1>회원 정보 수정</h1>
<form th:action="@{/users/mypage}" th:method="post" th:object="${user}">
    <input type="hidden" th:field="*{id}"/>
    <div>
        <label for="loginId">아이디:</label>
        <input type="text" id="loginId" th:field="*{loginId}" readonly/>
    </div>
    <div>
        <label for="password">기존 비밀번호</label>
        <input type="text" id="password" name="password" placeholder="기존 비밀번호"/>
    </div>
    <div>
        <label for="newPassword">새 비밀번호</label>
        <input type="text" id="newPassword" name="new_password" placeholder="새 비밀번호"/>
    </div>
    <div>
        <label for="passwordConfirm">새 비밀번호 확인</label>
        <input type="text" id="passwordConfirm" name="password_confirm" placeholder="새 비밀번호 확인"/>
    </div>
    <div>
        <label for="name">이름:</label>
        <input type="text" id="name" th:field="*{name}" readonly/>
    </div>
    <div>
        <label for="email">이메일:</label>
        <input type="email" id="email" th:field="*{email}"/>
    </div>
    <div>
        <label for="phone">전화번호:</label>
        <input type="text" id="phone" th:field="*{phone}"/>
    </div>
    <div>
        <label for="address">주소:</label>
        <input type="text" id="address" th:field="*{address}"/>
    </div>
    <button type="submit">수정 완료</button>
    <a th:href="@{/}">취소</a>
</form>

<div style="margin-top: 30px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background-color: #f9f9f9;">
    <h3>실거주 인증 서비스</h3>
    <p>실거주 리뷰를 작성하시려면 임대차계약서 인증이 필요합니다.</p>

    <a th:href="@{/users/certification}"
       style="display: inline-block; padding: 10px 20px; background-color: #28a745; color: white; text-decoration: none; border-radius: 5px; font-weight: bold;">
        실거주 인증 신청하기
    </a>
</div>

<br>
<a th:href="@{/}">실거주 주소 수정</a>
<a th:href="@{/users/unregister}">회원 탈퇴</a>

<a th:href="@{/users/articles(type='reviews')}">내가 쓴 리뷰</a>
<a th:href="@{/users/comments(type='reviews')}">내가 쓴 댓글</a>

</body>
</html>
