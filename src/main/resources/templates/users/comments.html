<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>내가 쓴 댓글</title>
    <style>
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f2f2f2; }
        .pagination { display: flex; justify-content: center; gap: 10px; list-style: none; padding: 0; }
        .pagination li { display: inline; }
        .pagination a { text-decoration: none; color: black; padding: 5px 10px; border: 1px solid #ddd; }
        .pagination .active a { background-color: #007bff; color: white; border-color: #007bff; }
        .pagination .disabled a { color: #ccc; pointer-events: none; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tabs a { text-decoration: none; padding: 10px 20px; border: 1px solid #ddd; color: black; }
        .tabs a.active { background-color: #007bff; color: white; border-color: #007bff; }
    </style>
</head>
<body>


<div class="tabs">
    <a th:href="@{/users/comments(type='reviews')}" th:classappend="${type == 'reviews'} ? 'active'">리뷰 댓글</a>
    <a th:href="@{/users/comments(type='posts')}" th:classappend="${type == 'posts' } ? 'active'">게시글 댓글</a>
</div>
<!-- 리뷰 댓글 목록 -->
<div th:if="${type == 'reviews'}">
    <table>
        <thead>
        <tr>
            <th>리뷰 제목</th>
            <th>댓글 내용</th>
            <th>작성일</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="reply : ${replies}">
            <td><a th:href="@{/review/detail/{id}(id=${reply.reviewId})}" th:text="${reply.reviewTitle}"></a></td>
            <td th:text="${reply.content}"></td>
            <td th:text="${#temporals.format(reply.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></td>
        </tr>
        <tr th:if="${replies.empty}">
            <td colspan="3">작성한 댓글이 없습니다.</td>
        </tr>
        </tbody>
    </table>

    <!-- 리뷰 댓글 페이징 -->
    <nav th:if="${replies.totalPages > 0}" aria-label="Page navigation">
        <ul class="pagination">
            <li class="page-item" th:classappend="${replies.first} ? 'disabled'">
                <a class="page-link" th:href="@{/users/comments(type='reviews', page=${replies.number-1})}">&lt;</a>
            </li>
            <li class="page-item" th:each="page : ${#numbers.sequence(0, replies.totalPages-1)}"
                th:classappend="${page == replies.number} ? 'active'">
                <a class="page-link" th:href="@{/users/comments(type='reviews', page=${page})}" th:text="${page+1}"></a>
            </li>
            <li class="page-item" th:classappend="${replies.last} ? 'disabled'">
                <a class="page-link" th:href="@{/users/comments(type='reviews', page=${replies.number+1})}">&gt;</a>
            </li>
        </ul>
    </nav>
</div>
<!-- 게시글 댓글 목록 -->
<div th:if="${type == 'posts'}">
    <table>
        <thead>
        <tr>
            <th>게시글 제목</th>
            <th>댓글 내용</th>
            <th>작성일</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="reply : ${postReplies}">
            <td><a th:href="@{/board/detail/{id}(id=${reply.postId})}" th:text="${reply.postTitle}"></a></td>
            <td th:text="${reply.content}"></td>
            <td th:text="${#temporals.format(reply.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></td>
        </tr>
        <tr th:if="${postReplies.empty}">
            <td colspan="3">작성한 댓글이 없습니다.</td>
        </tr>
        </tbody>
    </table>

    <!-- 게시글 댓글 페이징 -->
    <nav th:if="${postReplies.totalPages > 0}" aria-label="Page navigation">
        <ul class="pagination">
            <li class="page-item" th:classappend="${postReplies.first} ? 'disabled'">
                <a class="page-link" th:href="@{/users/comments(type='posts', page=${postReplies.number-1})}">&lt;</a>
            </li>
            <li class="page-item" th:each="page : ${#numbers.sequence(0, postReplies.totalPages-1)}"
                th:classappend="${page == postReplies.number} ? 'active'">
                <a class="page-link" th:href="@{/users/comments(type='posts', page=${page})}" th:text="${page+1}"></a>
            </li>
            <li class="page-item" th:classappend="${postReplies.last} ? 'disabled'">
                <a class="page-link" th:href="@{/users/comments(type='posts', page=${postReplies.number+1})}">&gt;</a>
            </li>
        </ul>
    </nav>
</div>


<a href="/users/mypage">마이페이지로 돌아가기</a>

</body>
</html>
