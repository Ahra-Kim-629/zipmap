<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <style>
        .board-container { padding: 40px 0; background-color: #f5f4ef; min-height: 80vh; }
        .page-title { font-weight: 800; color: #3E362E; }

        /* 탭 디자인 커스텀 */
        .nav-tabs-custom { border-bottom: none; gap: 10px; margin-bottom: 25px; }
        .nav-tabs-custom .nav-link {
            border: none;
            background: #eee;
            color: #777;
            border-radius: 50px;
            padding: 10px 25px;
            font-weight: 600;
            transition: 0.3s;
        }
        .nav-tabs-custom .nav-link.active {
            background-color: var(--main-orange);
            color: white;
            box-shadow: 0 4px 10px rgba(230,126,34,0.2);
        }

        /* 테이블 및 카드 디자인 */
        .board-table-card { background: white; border-radius: 15px; overflow: hidden; border: none; }
        .table thead { background-color: #f8f9fa; border-bottom: 2px solid #eee; }
        .table th { font-weight: 700; color: #555; font-size: 0.9rem; border: none; padding: 15px; }
        .table td { vertical-align: middle; padding: 15px; font-size: 0.95rem; border-bottom: 1px solid #f1f1f1; }

        /* 링크 및 텍스트 스타일 */
        .post-link { text-decoration: none; color: #333; font-weight: 600; transition: 0.2s; }
        .post-link:hover { color: var(--main-orange); }

        .comment-content { color: #555; font-size: 0.9rem; line-height: 1.4; }
        .text-truncate-custom {
            display: inline-block;
            max-width: 400px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            vertical-align: bottom;
        }

        /* 페이징 */
        .pagination .page-link { color: #555; border: none; margin: 0 3px; border-radius: 8px !important; }
        .pagination .page-item.active .page-link { background-color: var(--main-orange); color: white; }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="board-container">
        <div class="container">
            <div class="mb-4">
                <h2 class="page-title mb-1">내 댓글 활동</h2>
                <p class="text-muted small">내가 작성한 댓글들을 확인하고 해당 게시글로 바로 이동하세요.</p>
            </div>

            <ul class="nav nav-tabs nav-tabs-custom">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${type == 'reviews'} ? 'active'"
                       th:href="@{/users/comments(type='reviews')}">리뷰 댓글</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${type == 'posts'} ? 'active'"
                       th:href="@{/users/comments(type='posts')}">게시글 댓글</a>
                </li>
            </ul>

            <th:block th:with="list=${type == 'reviews' ? reviewReplies : postReplies}">

                <div class="board-table-card daedong-shadow">
                    <table class="table mb-0 text-center">
                        <thead>
                        <tr>
                            <th style="width: 25%;">원문 제목</th>
                            <th style="width: 55%;">댓글 내용</th>
                            <th style="width: 20%;">작성일</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="reply : ${list.content}">
                            <td class="text-start ps-4">

                                <a th:href="@{|/${type == 'reviews' ? 'review' : 'post'}/detail/${reply.targetId}?replyId=${reply.id}|}"
                                   class="post-link small text-muted"
                                   th:text="${reply.articleTitle}">원문 제목</a>
                            </td>
                            <td class="text-start">
                                <span class="comment-content text-truncate-custom" th:text="${reply.content}">댓글 내용</span>
                            </td>
                            <td class="text-muted small" th:text="${#temporals.format(reply.createdAt, 'yyyy.MM.dd HH:mm')}"></td>
                        </tr>
                        <tr th:if="${list.empty}">
                            <td colspan="3" class="py-5 text-muted">작성한 댓글이 없습니다.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- 페이징 review랑 post처럼 통일 수정-->
                <nav th:if="${list.totalPages > 0}" class="mt-5 d-flex justify-content-center">

                    <ul class="pagination" th:with="
                        currentPage=${list.number + 1},
                        blockStart=${(currentPage - 1) div 5 * 5 + 1}">

                        <li class="page-item" th:classappend="${blockStart == 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/users/comments(type=${type}, page=${blockStart - 1})}">
                                <i class="bi bi-chevron-left"></i>
                            </a>
                        </li>

                        <li class="page-item" th:each="page : ${#numbers.sequence(1, list.totalPages)}"
                            th:if="${page >= blockStart and page < blockStart + 5}"
                            th:classappend="${page == currentPage} ? 'active'">
                            <a class="page-link" th:href="@{/users/comments(type=${type}, page=${page})}" th:text="${page}"></a>
                        </li>

                        <li class="page-item" th:classappend="${blockStart + 4 >= list.totalPages} ? 'disabled'">
                            <a class="page-link" th:href="@{/users/comments(type=${type}, page=${blockStart + 5})}">
                                <i class="bi bi-chevron-right"></i>
                            </a>
                        </li>
                    </ul>
                </nav>
            </th:block>

            <div class="text-center mt-5">
                <a href="/users/mypage" class="text-muted text-decoration-none small">
                    <i class="bi bi-arrow-left"></i> 마이페이지로 돌아가기
                </a>
            </div>
        </div>
    </div>
</div>
</html>
