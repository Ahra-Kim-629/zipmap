<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <style>
        .reset-wrapper {
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px 0;
            background-color: #fdfcf9;
        }
        .reset-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            background: #ffffff;
        }
        .reset-title {
            color: #3E362E;
            font-weight: 800;
        }
        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #666;
        }
        .form-control:focus {
            border-color: var(--main-orange);
            box-shadow: 0 0 0 0.25rem rgba(230, 126, 34, 0.1);
        }
        .security-info {
            background-color: #fff9f4;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="reset-wrapper">
        <div class="reset-card daedong-shadow text-center">
            <div class="mb-4">
                <h2 class="reset-title mb-2">비밀번호 재설정</h2>
                <p class="text-muted small">새로운 비밀번호를 입력해 주세요.</p>
            </div>

            <div th:if="${error}" class="alert alert-danger border-0 small p-2 mb-4" th:text="${error}"></div>

            <div class="security-info text-start">
                <p class="small text-orange mb-0">
                    <i class="bi bi-shield-lock-fill me-1"></i>
                    안전한 계정 사용을 위해 타인과 중복되지 않는 비밀번호를 권장합니다.
                </p>
            </div>

            <form th:action="@{/users/reset-password}" method="post" class="text-start">
                <input type="hidden" name="token" th:value="${token}"/>

                <div class="mb-4">
                    <label for="newPassword" class="form-label">새 비밀번호</label>
                    <input type="password" id="newPassword" name="newPassword"
                           class="form-control rounded-3 py-3"
                           placeholder="8자리 이상의 비밀번호" required>
                </div>

                <button type="submit" class="btn btn-orange w-100 py-3 fw-bold rounded-pill shadow-sm mb-3">
                    비밀번호 변경하기
                </button>
            </form>

            <div class="mt-3">
                <a th:href="@{/}" class="text-muted small text-decoration-none">
                    홈으로 돌아가기
                </a>
            </div>
        </div>
    </div>
</div>
</html>
