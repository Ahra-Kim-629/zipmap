<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <style>
        .board-container { padding: 40px 0; background-color: #fdfcf9; min-height: 80vh; }
        .page-title { font-weight: 800; color: #3E362E; }

        /* 탭 디자인 커스텀 */
        .nav-tabs-custom { border-bottom: none; gap: 10px; margin-bottom: 25px; }
        .nav-tabs-custom .nav-link {
            border: none;
            background: #eee;
            color: #777;
            border-radius: 50px;
            padding: 10px 25px;
            font-weight: 600;
            transition: 0.3s;
        }
        .nav-tabs-custom .nav-link.active {
            background-color: var(--main-orange);
            color: white;
            box-shadow: 0 4px 10px rgba(230,126,34,0.2);
        }

        /* 테이블 및 카드 디자인 (기본 게시판과 통일) */
        .board-table-card { background: white; border-radius: 15px; overflow: hidden; border: none; }
        .table thead { background-color: #f8f9fa; border-bottom: 2px solid #eee; }
        .table th { font-weight: 700; color: #555; font-size: 0.9rem; border: none; padding: 15px; }
        .table td { vertical-align: middle; padding: 15px; font-size: 0.95rem; border-bottom: 1px solid #f1f1f1; }

        .post-link { text-decoration: none; color: #333; font-weight: 600; transition: 0.2s; }
        .post-link:hover { color: var(--main-orange); }

        /* 좋아요 아이콘 */
        .like-count { color: #dc3545; font-weight: 600; font-size: 0.9rem; }

        /* 평점 별점 스타일 */
        .point-star { color: #f1c40f; font-weight: bold; }

        /* 페이징 */
        .pagination .page-link { color: #555; border: none; margin: 0 3px; border-radius: 8px !important; }
        .pagination .page-item.active .page-link { background-color: var(--main-orange); color: white; }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="board-container">
        <div class="container">
            <div class="mb-4">
                <h2 class="page-title mb-1">내 활동 내역</h2>
                <p class="text-muted small">내가 작성한 리뷰와 게시글을 한눈에 확인하세요.</p>
            </div>

            <ul class="nav nav-tabs nav-tabs-custom">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${type == 'reviews'} ? 'active'"
                       th:href="@{/users/articles(type='reviews')}">리뷰글</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${type == 'posts'} ? 'active'"
                       th:href="@{/users/articles(type='posts')}">게시글</a>
                </li>
            </ul>

            <div th:if="${type == 'reviews'}" class="board-table-card daedong-shadow">
                <table class="table mb-0 text-center">
                    <thead>
                    <tr>
                        <th style="width: 10%;">번호</th>
                        <th style="width: 30%;">제목</th>
                        <th style="width: 25%;">주소</th>
                        <th style="width: 10%;">평점</th>
                        <th style="width: 10%;">상태</th>
                        <th style="width: 15%;">관리자 승인</th>
                    </tr>
                    </thead>
                    <tbody id="review-list-body">
                    <tr th:each="review : ${reviews.content}">
                        <td class="text-muted small" th:text="${review.id}">번호</td>
                        <td class="text-start ps-4">
                            <a th:href="@{/review/detail/{id}(id=${review.id})}" class="post-link" th:text="${review.title}">제목</a>
                        </td>
                        <td class="text-muted small text-start" th:text="${review.address}">주소</td>
                        <td>
                            <span class="point-star">★</span>
                            <span th:text="${review.point}">0.0</span>
                        </td>
                        <td>
                            <span th:if="${review.reviewStatus != null and review.reviewStatus.name() == 'ACTIVE'}" class="badge bg-success">승인완료</span>
                            <span th:if="${review.reviewStatus != null and review.reviewStatus.name() == 'PENDING'}" class="badge bg-warning text-dark">인증대기</span>
                            <span th:if="${review.reviewStatus != null and review.reviewStatus.name() == 'BANNED'}" class="badge bg-danger">인증반려</span>
                        </td>
                        <td>
                            <div th:if="${review.reviewStatus != null and review.reviewStatus.name() == 'BANNED'}">
                                <!-- 반려 사유 보기 버튼 -->
                                <button type="button" class="btn btn-sm btn-outline-secondary rounded-pill px-2 mb-1"
                                        style="font-size: 0.65rem;"
                                        th:onclick="showRejectReason([[${review.message}]])">
                                    반려 사유 보기
                                </button>
                                <br>
                                <a th:href="@{|/review/edit/${review.id}|}"
                                   class="btn btn-sm btn-outline-danger rounded-pill px-2" style="font-size: 0.65rem;">
                                    재인증하기
                                </a>
                            </div>
                            <span th:unless="${review.reviewStatus != null and review.reviewStatus.name() == 'BANNED'}" class="text-muted">-</span>
                        </td>
                    </tr>

                    <tr th:if="${reviews == null or reviews.empty}">
                        <td colspan="6" class="py-5 text-center text-muted">
                            조회된 리뷰가 없습니다. (유저 ID: <span sec:authentication="principal.user.id"></span>)
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${type == 'posts'}" class="board-table-card daedong-shadow">
                <table class="table mb-0 text-center">
                    <thead>
                    <tr>
                        <th style="width: 10%;">번호</th>
                        <th style="width: 55%;">제목</th>
                        <th style="width: 17%;">작성일</th>
                        <th style="width: 10%;"><i class="bi bi-heart-fill text-danger"></i></th>
                        <th style="width: 8%;"><i class="bi bi-hand-thumbs-down-fill text-primary"></i></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="post : ${posts.content}">
                        <td class="text-muted small" th:text="${post.id}"></td>
                        <td class="text-start ps-4">
                            <a th:href="@{/post/detail/{id}(id=${post.id})}" class="post-link" th:text="${post.title}"></a>
                        </td>
                        <td class="text-muted small" th:text="${#temporals.format(post.createdAt, 'yyyy.MM.dd')}"></td>
                        <td><span class="like-count" th:text="${post.likeCount ?: 0}">0</span></td>
                        <td><span class="like-count text-primary" th:text="${post.dislikeCount ?: 0}">0</span></td>
                    </tr>
                    <tr th:if="${posts.empty}">
                        <td colspan="3" class="py-5 text-muted">작성한 게시글이 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- 페이징 review랑 post처럼 통일 수정-->
            <th:block th:with="list=${type == 'reviews' ? reviews : posts}">
                <nav th:if="${list.totalPages > 0}" class="mt-5 d-flex justify-content-center">

                    <ul class="pagination" th:with="
                        currentPage=${list.number + 1},
                        blockStart=${(currentPage - 1) div 5 * 5 + 1}">

                        <li class="page-item" th:classappend="${blockStart == 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/users/articles(type=${type}, page=${blockStart - 1})}">
                                <i class="bi bi-chevron-left"></i>
                            </a>
                        </li>

                        <li class="page-item" th:each="page : ${#numbers.sequence(1, list.totalPages)}"
                            th:if="${page >= blockStart and page < blockStart + 5}"
                            th:classappend="${page == currentPage} ? 'active'">
                            <a class="page-link" th:href="@{/users/articles(type=${type}, page=${page})}" th:text="${page}"></a>
                        </li>

                        <li class="page-item" th:classappend="${blockStart + 4 >= list.totalPages} ? 'disabled'">
                            <a class="page-link" th:href="@{/users/articles(type=${type}, page=${blockStart + 5})}">
                                <i class="bi bi-chevron-right"></i>
                            </a>
                        </li>
                    </ul>
                </nav>
            </th:block>

            <div class="text-center mt-5">
                <a href="/users/mypage" class="text-muted text-decoration-none small">
                    <i class="bi bi-arrow-left"></i> 마이페이지로 돌아가기
                </a>
            </div>
        </div>
    </div>

    <!-- 반려 사유 모달 -->
    <div class="modal fade" id="rejectReasonModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold text-danger">
                        <i class="bi bi-exclamation-circle-fill me-2"></i>반려 사유
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p id="modalRejectMessage" class="text-secondary mb-0"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">닫기</button>
                </div>
            </div>
        </div>
    </div>

</div>

<script layout:fragment="script">
    function showRejectReason(message) {
        const msg = message ? message : "반려 사유가 등록되지 않았습니다.";
        document.getElementById('modalRejectMessage').innerText = msg;
        const modal = new bootstrap.Modal(document.getElementById('rejectReasonModal'));
        modal.show();
    }
</script>
</html>
