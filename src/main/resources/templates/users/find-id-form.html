<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <style>
        .find-wrapper {
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px 0;
            background-color: #f5f4ef;
        }
        .find-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            background: #ffffff;
        }
        .find-title {
            color: #3E362E;
            font-weight: 800;
        }
        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #666;
        }
        .form-control:focus {
            border-color: var(--main-orange);
            box-shadow: 0 0 0 0.25rem rgba(230, 126, 34, 0.1);
        }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="find-wrapper">
        <div class="find-card daedong-shadow text-center">
            <div class="mb-4">
                <h2 class="find-title mb-2">아이디 찾기</h2>
                <p class="text-muted small">가입 시 등록한 정보를 입력해 주세요.</p>
            </div>

            <div th:if="${error}" class="alert alert-danger border-0 small p-2 mb-4" th:text="${error}"></div>

            <form th:action="@{/users/find/id}" th:method="post" class="text-start">
                <div class="mb-3">
                    <label for="name" class="form-label">이름</label>
                    <input type="text" id="name" name="name" class="form-control rounded-3" placeholder="성함을 입력하세요" required>
                </div>
                <div class="mb-4">
                    <label for="email" class="form-label">이메일</label>
                    <input type="email" id="email" name="email" class="form-control rounded-3" placeholder="가입 이메일을 입력하세요" required>
                </div>
                <button type="submit" class="btn btn-orange w-100 py-3 fw-bold rounded-pill shadow-sm mb-3">
                    아이디 찾기
                </button>
            </form>

            <div class="mt-3">
                <a th:href="@{/login}" class="text-muted small text-decoration-none">
                    <i class="bi bi-arrow-left me-1"></i>로그인으로 돌아가기
                </a>
            </div>
        </div>
    </div>
</div>
</html>
