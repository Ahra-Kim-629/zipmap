<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <style>
        .reset-wrapper {
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px 0;
            background-color: #f5f4ef;
        }
        .reset-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            background: #ffffff;
        }
        .reset-title {
            color: #3E362E;
            font-weight: 800;
        }
        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #666;
        }
        .form-control:focus {
            border-color: var(--main-orange);
            box-shadow: 0 0 0 0.25rem rgba(230, 126, 34, 0.1);
        }
        .security-info {
            background-color: #fff9f4;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="reset-wrapper">
        <div class="reset-card daedong-shadow text-center">
            <div class="mb-4">
                <h2 class="reset-title mb-2">비밀번호 재설정</h2>
                <p class="text-muted small">새로운 비밀번호를 입력해 주세요.</p>
            </div>

            <div th:if="${error}" class="alert alert-danger border-0 small p-2 mb-4" th:text="${error}"></div>

            <div class="security-info text-start">
                <p class="small text-orange mb-0">
                    <i class="bi bi-shield-lock-fill me-1"></i>
                    안전한 계정 사용을 위해 타인과 중복되지 않는 비밀번호를 권장합니다.
                </p>
            </div>

            <form th:action="@{/users/reset-password}" method="post" class="text-start">
                <input type="hidden" name="token" th:value="${token}"/>

                <div class="mb-4">
                    <label for="newPassword" class="form-label">새 비밀번호</label>
                    <input type="password" id="newPassword" name="newPassword"
                           class="form-control rounded-3 py-3"
                           placeholder="새 비밀번호를 입력하세요" required>
                    <div id="passwordHelp" class="form-text">영문 대/소문자, 숫자, 특수문자를 포함하여 8~20자로 입력해주세요.</div>
                </div>

                <div class="mb-4">
                    <label for="passwordConfirm" class="form-label">비밀번호 확인</label>
                    <input type="password" id="passwordConfirm" name="passwordConfirm"
                           class="form-control rounded-3 py-3"
                           placeholder="비밀번호를 다시 입력하세요" required>
                    <div id="passwordMatchHelp" class="form-text"></div>
                </div>

                <button type="submit" id="submitBtn" class="btn btn-orange w-100 py-3 fw-bold rounded-pill shadow-sm mb-3">
                    비밀번호 변경하기
                </button>
            </form>

            <div class="mt-3">
                <a th:href="@{/}" class="text-muted small text-decoration-none">
                    홈으로 돌아가기
                </a>
            </div>
        </div>
    </div>
    <script>
   $(document).ready(function() {
    let isPasswordValid = false;
    let isPasswordMatch = false;
    const $submitBtn = $('button[type="submit"]');

//영문 대/소문자, 숫자, 특수문자 포함 8~20자
    function validatePassword(password) {
        const passwordPattern = /^(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z])(?=.*\W)(?=.*\S+$).{8,20}$/;
        return passwordPattern.test(password);
    }

    function updateSubmitBtn() {
        if (isPasswordValid && isPasswordMatch) {
            $submitBtn.prop('disabled', false);
        } else {
            $submitBtn.prop('disabled', true);
        }
    }

    // 1. 새 비밀번호 유효성 검사
    $('#newPassword').on('input', function() {
        const password = $(this).val();

        if (password === '') {
            $('#passwordHelp').text('영문 대/소문자, 숫자, 특수문자를 포함하여 8~20자로 입력해주세요.')
                             .css('color', '#6c757d');
            isPasswordValid = false; // 재설정 페이지에서는 필수값이므로 false
        } else if (validatePassword(password)) {
            $('#passwordHelp').text('사용 가능한 비밀번호입니다.').css('color', 'green');
            isPasswordValid = true;
        } else {
            $('#passwordHelp').text('형식에 맞지 않는 비밀번호입니다.').css('color', 'red');
            isPasswordValid = false;
        }

        // 비밀번호가 바뀔 때마다 재확인 칸의 일치 여부도 다시 계산
        checkPasswordMatch();
        updateSubmitBtn();
    });

    // 2. 새 비밀번호 재확인 일치 검사
    function checkPasswordMatch() {
        const password = $('#newPassword').val();
        const passwordCk = $('#passwordConfirm').val();

        if (passwordCk === '') {
            $('#passwordMatchHelp').text('');
            isPasswordMatch = false;
        } else if (password === passwordCk && password !== '') {
            $('#passwordMatchHelp').text('비밀번호가 일치합니다.').css('color', 'green');
            isPasswordMatch = true;
        } else {
            $('#passwordMatchHelp').text('비밀번호가 일치하지 않습니다.').css('color', 'red');
            isPasswordMatch = false;
        }
    }

    $('#passwordConfirm').on('input', function() {
        checkPasswordMatch();
        updateSubmitBtn();
    });

    // 초기 실행: 페이지 로드 시 버튼 비활성화 상태
    updateSubmitBtn();
});
    </script>
</div>
</html>
