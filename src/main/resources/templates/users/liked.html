<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <style>
        .board-container { padding: 40px 0; background-color: #fdfcf9; min-height: 80vh; }
        .page-title { font-weight: 800; color: #3E362E; }
        .nav-tabs-custom { border-bottom: none; gap: 10px; margin-bottom: 25px; }
        .nav-tabs-custom .nav-link {
            border: none; background: #eee; color: #777; border-radius: 50px;
            padding: 10px 25px; font-weight: 600; transition: 0.3s;
        }
        .nav-tabs-custom .nav-link.active {
            background-color: var(--main-orange); color: white;
            box-shadow: 0 4px 10px rgba(230,126,34,0.2);
        }
        .board-table-card { background: white; border-radius: 15px; overflow: hidden; border: none; }
        .table thead { background-color: #f8f9fa; border-bottom: 2px solid #eee; }
        .table th { font-weight: 700; color: #555; font-size: 0.9rem; border: none; padding: 15px; }
        .table td { vertical-align: middle; padding: 15px; font-size: 0.95rem; border-bottom: 1px solid #f1f1f1; }
        .post-link { text-decoration: none; color: #333; font-weight: 600; transition: 0.2s; }
        .post-link:hover { color: var(--main-orange); }
        .like-count { font-weight: 600; font-size: 0.9rem; }
        .point-star { color: #f1c40f; font-weight: bold; }
        .pagination .page-link { color: #555; border: none; margin: 0 3px; border-radius: 8px !important; }
        .pagination .page-item.active .page-link { background-color: var(--main-orange); color: white; }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="board-container">
        <div class="container">
            <div class="mb-4">
                <h2 class="page-title mb-1">관심 목록</h2>
                <p class="text-muted small">좋아요를 누른 소중한 글들을 모아보세요.</p>
            </div>

            <ul class="nav nav-tabs nav-tabs-custom">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${type == 'reviews'} ? 'active'" th:href="@{/users/liked(type='reviews')}">리뷰글</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${type == 'posts'} ? 'active'" th:href="@{/users/liked(type='posts')}">게시글</a>
                </li>
            </ul>

            <div class="board-table-card daedong-shadow">
                <table class="table mb-0 text-center">
                    <thead>
                    <tr>
                        <th style="width: 10%;">번호</th>
                        <th style="width: 50%;">제목</th>
                        <th style="width: 15%;" th:text="${type == 'reviews' ? '평점' : '작성일'}">정보</th>
                        <th style="width: 12%;"><i class="bi bi-heart-fill text-danger"></i></th>
                        <th th:if="${type == 'posts'}" style="width: 13%;"><i class="bi bi-hand-thumbs-down-fill text-primary"></i></th>
                    </tr>
                    </thead>
                    <tbody>
                    <th:block th:if="${type == 'reviews'}">
                        <tr th:each="review : ${reviews.content}">
                            <td class="text-muted small" th:text="${review.id}"></td>
                            <td class="text-start ps-4">
                                <a th:href="@{/review/detail/{id}(id=${review.id})}" class="post-link" th:text="${review.title}"></a>
                                <div class="text-muted small" style="font-size: 0.75rem;" th:text="${review.address}"></div>
                            </td>
                            <td><span class="point-star">★</span> <span th:text="${review.point}">0.0</span></td>
                            <td colspan="1"><span class="like-count text-danger" th:text="${review.likeCount ?: 0}">0</span></td>
                        </tr>
                        <tr th:if="${reviews.empty}"><td colspan="4" class="py-5 text-muted">좋아요 한 리뷰가 없습니다.</td></tr>
                    </th:block>

                    <th:block th:if="${type == 'posts'}">
                        <tr th:each="post : ${posts.content}">
                            <td class="text-muted small" th:text="${post.id}"></td>
                            <td class="text-start ps-4">
                                <a th:href="@{/post/detail/{id}(id=${post.id})}" class="post-link" th:text="${post.title}"></a>
                            </td>
                            <td class="text-muted small" th:text="${#temporals.format(post.createdAt, 'yyyy.MM.dd')}"></td>
                            <td><span class="like-count text-danger" th:text="${post.likeCount ?: 0}">0</span></td>
                            <td><span class="like-count text-primary" th:text="${post.dislikeCount ?: 0}">0</span></td>
                        </tr>
                        <tr th:if="${posts.empty}"><td colspan="5" class="py-5 text-muted">좋아요 한 게시글이 없습니다.</td></tr>
                    </th:block>
                    </tbody>
                </table>
            </div>

            <th:block th:with="list=${type == 'reviews' ? reviews : posts}">
                <nav th:if="${list.totalPages > 0}" class="mt-5 d-flex justify-content-center">
                    <ul class="pagination">
                        <li class="page-item" th:classappend="${list.first} ? 'disabled'">
                            <a class="page-link" th:href="@{/users/liked(type=${type}, page=${list.number})}"><i class="bi bi-chevron-left"></i></a>
                        </li>
                        <li class="page-item" th:each="page : ${#numbers.sequence(0, list.totalPages-1)}" th:classappend="${page == list.number} ? 'active'">
                            <a class="page-link" th:href="@{/users/liked(type=${type}, page=${page+1})}" th:text="${page+1}"></a>
                        </li>
                        <li class="page-item" th:classappend="${list.last} ? 'disabled'">
                            <a class="page-link" th:href="@{/users/liked(type=${type}, page=${list.number+2})}"><i class="bi bi-chevron-right"></i></a>
                        </li>
                    </ul>
                </nav>
            </th:block>
            <div class="text-center mt-5"><a href="/users/mypage" class="text-muted text-decoration-none small"><i class="bi bi-arrow-left"></i> 마이페이지로 돌아가기</a></div>
        </div>
    </div>
</div>
</html>
