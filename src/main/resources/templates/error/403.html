<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<div layout:fragment="content" class="d-flex align-items-center justify-content-center" style="min-height: 75vh;">
    <div class="container text-center">
        <div class="error-visual mb-4">
            <div class="bg-light d-inline-flex align-items-center justify-content-center rounded-circle"
                 style="width: 120px; height: 120px;">
                <i class="bi bi-shield-lock text-orange" style="font-size: 3.5rem;"></i>
            </div>
        </div>

        <h2 class="fw-bold mb-3">접근 권한이 없습니다.</h2>

        <p class="text-muted mb-5 fs-5">
            요청하신 페이지에 접근할 수 있는 권한이 없습니다.<br class="d-none d-md-block">
            관리자 전용 페이지이거나 <br class="d-none d-md-block">
            이용 권한이 없는 서비스일 수 있습니다.
        </p>

        <div class="d-flex justify-content-center gap-3">
            <a href="javascript:history.back();" class="btn btn-outline-secondary btn-lg px-4 fw-bold border-2">
                이전 페이지
            </a>
            <a th:href="@{/}" class="btn btn-orange btn-lg px-4 fw-bold shadow-sm">
                대동여집도 홈으로
            </a>
        </div>

        <div class="mt-5 pt-4 border-top">
            <p class="small text-secondary">
                권한 관련하여 지속적인 문제가 발생한다면 <span class="text-orange fw-bold">고객센터</span>로 문의주시기 바랍니다.
            </p>
        </div>
    </div>
</div>
</html>
