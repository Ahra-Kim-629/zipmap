<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <style>
        .detail-container { padding: 50px 0; background-color: #fdfcf9; }
        .detail-card { background: #fff; padding: 40px; border-radius: 20px; border: none; }
        .review-header { border-bottom: 2px solid #f1f1f1; padding-bottom: 20px; margin-bottom: 30px; }
        .review-title {  font-weight: 800; color: #3E362E; }

        /* 배지 및 태그 */
        .info-label { font-size: 0.85rem; color: #888; margin-right: 10px; }
        .badge-pros { background-color: rgba(40, 167, 69, 0.1); color: #28a745; border: none; padding: 5px 12px; }
        .badge-cons { background-color: rgba(220, 53, 69, 0.1); color: #dc3545; border: none; padding: 5px 12px; }

        /* 별점 */
        .star-rating { color: #ffc107; font-size: 1.2rem; font-weight: bold; }

        /* 이미지 갤러리 */
        .review-image { width: 100%; max-width: 500px; border-radius: 12px; transition: transform 0.3s; cursor: pointer; }
        .review-image:hover { transform: scale(1.02); }

        /* 리뷰 본문 */
        .review-content-body {
            line-height: 1.8;
            color: #444;
            font-size: 1.05rem;

            white-space: pre-wrap;    /* 공백과 줄바꿈을 유지하면서 박스 끝에서 자동 줄바꿈 */
            word-break: break-all;    /* 아주 긴 단어나 URL도 박스 크기에 맞춰 강제 줄바꿈 */
            overflow-wrap: break-word; /* 텍스트가 넘칠 경우 단어 안에서 줄바꿈 */

            /* 내부 요소(이미지 등)가 삐져나가는 것 방지 */
            max-width: 100%;
            overflow: hidden;
        }

        /* 후기 내부에 포함된 이미지 자동 크기 조절 */
        .review-content-body img {
            max-width: 100%;          /* 이미지가 부모 너비보다 크면 자동으로 줄어듦 */
            height: auto;
            display: block;
            margin: 20px 0;           /* 이미지 상하 여백 */
        }

        /* 댓글 영역 */
        .reply-section { background: #f8f9fa; border-radius: 15px; padding: 30px; margin-top: 50px; }
        .reply-item { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid #eee; }
        .reply-author { font-weight: bold; color: #3E362E; font-size: 0.95rem; }
        .reply-date { font-size: 0.8rem; color: #bbb; }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="detail-container">
        <div class="container">
            <div class="detail-card daedong-shadow">
                <div class="review-header d-flex justify-content-between align-items-start">
                    <div>
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <span class="badge rounded-pill bg-light text-dark px-3" th:text="${reviewDTO.address}">서울시 관악구...</span>
                            <span class="star-rating">
                                <i class="bi bi-star-fill"></i> <span th:text="${reviewDTO.point}">4.5</span>
                            </span>
                        </div>
                        <h2 class="review-title mb-3" th:text="${reviewDTO.title}">채광 좋은 분리형 원룸 후기</h2>
                        <div class="d-flex align-items-center text-muted small">
                            <i class="bi bi-person-circle me-1"></i> <span class="me-3" th:text="${reviewDTO.loginId}">작성자</span>
                            <i class="bi bi-calendar3 me-1"></i> <span
                                th:text="${#temporals.format(reviewDTO.createdAt, 'yyyy.MM.dd')}">2024.01.01</span>
                        </div>
                    </div>
                    <div sec:authorize="isAuthenticated()" th:if="${#authentication.name == reviewDTO.loginId}">
                        <a th:href="@{|/review/edit/${reviewDTO.id}|}"
                           class="btn btn-outline-secondary btn-sm rounded-pill px-3">수정</a>
                        <form th:action="@{/review/delete/{id}(id=${reviewDTO.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill px-3"
                                    onclick="return confirm('정말 삭제하시겠습니까?')">삭제
                            </button>
                        </form>
                    </div>
                </div>

                <div class="row g-4 mb-5">
                    <div class="col-md-6">
                        <div class="p-3 rounded-3" style="background-color: #f8fff9; border: 1px solid #e1f5e5;">
                            <h6 class="fw-bold text-success mb-3"><i class="bi bi-plus-circle-fill me-2"></i>이 집의 장점
                            </h6>
                            <div class="d-flex flex-wrap gap-2">
                                <span th:each="pros : ${reviewDTO.prosList}" class="badge badge-pros rounded-pill"
                                      th:text="${pros}">채광 좋음</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="p-3 rounded-3" style="background-color: #fff9f9; border: 1px solid #f5e1e1;">
                            <h6 class="fw-bold text-danger mb-3"><i class="bi bi-dash-circle-fill me-2"></i>이 집의 단점</h6>
                            <div class="d-flex flex-wrap gap-2">
                                <span th:each="cons : ${reviewDTO.consList}" class="badge badge-cons rounded-pill"
                                      th:text="${cons}">소음 있음</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div th:if="${not #lists.isEmpty(reviewDTO.fileList)}" class="mb-5">
                    <h6 class="fw-bold mb-3"><i class="bi bi-images me-2 text-orange"></i>내부 사진</h6>
                    <div class="row g-3">
                        <div th:each="file : ${reviewDTO.fileList}" class="col-md-4 col-6">
                            <img th:src="@{/files/{path}(path=${file.filePath})}" class="review-image daedong-shadow"
                                 alt="리뷰 이미지">
                        </div>
                    </div>
                </div>

                <div class="mb-5">
                    <h6 class="fw-bold mb-3 border-bottom pb-2">상세 후기</h6>
                    <div th:utext="${reviewDTO.content}" class="review-content-body"></div>
                </div>

                <div class="text-center border-top pt-4">
                    <a th:href="@{/review}" class="btn btn-light rounded-pill px-4">
                        <i class="bi bi-list me-1"></i> 목록으로 돌아가기
                    </a>
                </div>

                <div class="like-section" style="margin-top: 20px; text-align: center;">
                    <form th:action="@{/reaction}" method="post">
                        <input type="hidden" name="targetType" value="review">
                        <input type="hidden" name="targetId" th:value="${reviewDTO.id}">
                        <input type="hidden" name="type" value="1">
                        <button type="submit"
                                style="border: 1px solid #ddd; padding: 10px 20px; border-radius: 5px; cursor: pointer;">
                            ❤️ 좋아요 <span th:text="${reviewDTO.likeCount}">0</span>
                        </button>
                    </form>
                </div>
                <div sec:authorize="isAnonymous()" style="margin-top: 20px; text-align: center;">
                    <p>❤️ 좋아요 <span th:text="${reviewDTO.likeCount}">0</span></p>
                    <p><small>(로그인 후 좋아요를 누를 수 있습니다)</small></p>
                </div>

                <!-- 범죄 현황 -->
                <div class="crime-info-section mt-4"
                     th:if="${reviewDTO.topCrimes != null and !#lists.isEmpty(reviewDTO.topCrimes)}">

                    <div th:if="${reviewDTO.safetyWarning != null and reviewDTO.safetyWarning != ''}"
                         style="background-color: #FFF5F5; border-left: 4px solid #FF8E8E; padding: 12px 16px; margin-bottom: 20px; border-radius: 4px;">
        <span style="color: #D63031; font-size: 0.9rem; font-weight: 600;">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${reviewDTO.safetyWarning}">경고 문구</span>
        </span>
                    </div>

                    <div style="background: #FAFAFA; border-radius: 12px; padding: 20px; border: 1px solid #F1F1F1;">
                        <h6 class="fw-bold mb-3" style="font-size: 0.95rem; color: #555;">
                            <i class="bi bi-shield-lock me-2"></i>이 지역 주요 범죄 현황 (TOP 3)
                        </h6>

                        <div class="d-flex flex-column gap-2">
                            <div th:each="crime, stat : ${reviewDTO.topCrimes}"
                                 class="d-flex justify-content-between align-items-center"
                                 style="font-size: 0.85rem; padding: 8px 0; border-bottom: 1px dashed #EEE;">

                <span style="color: #666;">
                    <span class="badge bg-secondary me-2" style="font-weight: 400; opacity: 0.8;"
                          th:text="${stat.count} + '위'">1위</span>
                    <span th:text="${crime}" style="font-weight: 500;">범죄명</span>
                </span>

                                <span th:if="${reviewDTO.crimeCounts != null and reviewDTO.crimeCounts.size() > stat.index}"
                                      style="color: #999; font-variant-numeric: tabular-nums;">
                    약 <span th:text="${reviewDTO.crimeCounts[stat.index]}">0</span>건
                </span>
                            </div>
                        </div>
                        <p class="mt-2 mb-0" style="font-size: 0.75rem; color: #BBB;">* 해당 통계는 2024년 인근 경찰서 데이터
                            기준입니다.</p>
                    </div>
                </div>

                <div class="reply-section">
                    <h5 class="fw-bold mb-4"><i class="bi bi-chat-left-text me-2"></i>댓글 <span class="text-orange"
                                                                                               th:text="${reviewDTO.replyList.size()}">0</span>
                    </h5>

                    <div th:each="reply : ${reviewDTO.replyList}" class="reply-item shadow-sm">
                        <div th:id="|display-${reply.id}|">
                            <div class="d-flex justify-content-between mb-2">
                                <span class="reply-author" th:text="${reply.loginId}">사용자</span>
                                <div class="d-flex gap-2">
                                    <th:block sec:authorize="isAuthenticated()"
                                              th:if="${#authentication.name == reply.loginId}">
                                        <button class="btn btn-link btn-sm p-0 text-muted"
                                                th:onclick="|showEditForm(${reply.id})|">수정
                                        </button>
                                        <form th:action="@{/reply/delete}" method="post" class="d-inline">
                                            <input type="hidden" name="replyId" th:value="${reply.id}">
                                            <input type="hidden" name="targetType" value="review">
                                            <input type="hidden" name="targetId" th:value="${reviewDTO.id}">
                                            <button type="submit" class="btn btn-link btn-sm p-0 text-danger"
                                                    onclick="return confirm('삭제하시겠습니까?')">삭제
                                            </button>
                                        </form>
                                    </th:block>
                                </div>
                            </div>
                            <p class="mb-0 text-secondary" th:text="${reply.content}">댓글 내용입니다.</p>
                        </div>

                        <div th:id="|editForm-${reply.id}|" style="display: none;">
                            <form th:action="@{/reply/edit}" method="post">
                                <input type="hidden" name="id" th:value="${reply.id}">
                                <input type="hidden" name="targetType" value="review">
                                <input type="hidden" name="targetId" th:value="${reviewDTO.id}">
                                <textarea name="content" th:text="${reply.content}" class="form-control mb-2"
                                          rows="2"></textarea>
                                <div class="text-end">
                                    <button type="submit" class="btn btn-orange btn-sm rounded-pill px-3">저장</button>
                                    <button type="button" class="btn btn-light btn-sm rounded-pill px-3"
                                            th:onclick="|hideEditForm(${reply.id})|">취소
                                    </button>
                                </div>
                            </form>
                    </div>
                    </div>


                    <div class="mt-4" sec:authorize="isAuthenticated()">
                        <form th:action="@{/reply/write}" method="post" class="bg-white p-3 rounded-3 shadow-sm">
                            <input type="hidden" name="targetType" value="review">
                            <input type="hidden" name="targetId" th:value="${reviewDTO.id}">
                            <textarea name="content" class="form-control border-0 mb-2" rows="3"
                                      placeholder="작성자에게 따뜻한 댓글을 남겨주세요." style="resize: none;"></textarea>
                            <div class="text-end">
                                <button type="submit" class="btn btn-orange px-4 py-2 rounded-pill fw-bold">댓글 등록
                                </button>
                            </div>
                        </form>
                    </div>
                    <div class="text-center mt-3" sec:authorize="isAnonymous()">
                        <p class="small text-muted">
                            <a th:href="@{/login}" class="text-orange fw-bold">로그인</a> 후 댓글을 남길 수 있습니다.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</html>
