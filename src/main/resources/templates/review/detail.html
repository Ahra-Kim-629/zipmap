<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <style>
        .detail-container { padding: 60px 0; background-color: #fdfcf9; }
        .detail-card { background: #fff; padding: 50px; border-radius: 24px; border: none; }
        .detail-header { border-bottom: 1px solid #eee; padding-bottom: 30px; margin-bottom: 40px; }
        .detail-title { font-weight: 800; color: #3E362E; line-height: 1.4; }

        /* 별점 및 배지 */
        .star-rating { color: #ffc107; font-size: 1.2rem; font-weight: bold; }
        .badge-pros { background-color: rgba(40, 167, 69, 0.08); color: #28a745; border: 1px solid rgba(40, 167, 69, 0.15); padding: 5px 12px; }
        .badge-cons { background-color: rgba(220, 53, 69, 0.08); color: #dc3545; border: 1px solid rgba(220, 53, 69, 0.15); padding: 5px 12px; }

        /* 이미지 및 본문 줄바꿈 통일 */
        .review-image { width: 100%; border-radius: 16px; transition: transform 0.3s; cursor: pointer; border: 1px solid #eee; }
        .review-image:hover { transform: scale(1.02); }
        .content-body {
            line-height: 1.8; color: #444; font-size: 1.05rem;
            white-space: pre-wrap; word-break: break-all; overflow-wrap: break-word;
        }
        .content-body img { max-width: 100%; height: auto; display: block; margin: 25px 0; border-radius: 12px; }

        /* 좋아요 버튼 스타일 통일 */
        .btn-like {
            background: white; border: 1px solid #ff4757; color: #ff4757;
            padding: 10px 25px; border-radius: 50px; font-weight: 700;
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.1);
        }
        .btn-like:hover { background: #ff4757; color: white; transform: translateY(-2px); }

        /* 치안 정보 카드 */
        .crime-card { background: #fafafa; border-radius: 20px; padding: 30px; border: 1px solid #f1f1f1; margin-top: 50px; }
        .crime-rank-badge { width: 38px; height: 24px; display: inline-flex; align-items: center; justify-content: center; background: #3E362E; color: #fff; font-size: 0.75rem; border-radius: 6px; margin-right: 12px; }

        /* 댓글 영역 디자인 통일 */
        .reply-section { background: #f8f9fa; border-radius: 20px; padding: 35px; margin-top: 50px; }
        .reply-item { background: #fff; border-radius: 14px; padding: 20px; margin-bottom: 15px; border: 1px solid #eee; }
        .reply-author { font-weight: bold; color: #3E362E; font-size: 0.95rem; }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="detail-container">
        <div class="container">
            <div class="detail-card daedong-shadow">

                <div class="detail-header">
                    <div class="d-flex align-items-center gap-2 mb-3">
                        <span class="badge rounded-pill bg-light text-dark px-3 py-2 border">
                            <i class="bi bi-geo-alt-fill text-orange me-1"></i> <span
                                th:text="${reviewDTO.address}">주소</span>
                        </span>
                        <span class="star-rating ms-2">
                            <i class="bi bi-star-fill"></i> <span th:text="${reviewDTO.point}">4.5</span>
                        </span>
                    </div>
                    <div class="d-flex justify-content-between align-items-start">
                        <h2 class="detail-title mb-3" th:text="${reviewDTO.title}">후기 제목</h2>
                        <div sec:authorize="isAuthenticated()" th:if="${#authentication.name == reviewDTO.loginId}"
                             class="d-flex gap-2">
                            <a th:href="@{|/review/edit/${reviewDTO.id}|}"
                               class="btn btn-light btn-sm rounded-pill px-3 border">수정</a>
                            <form th:action="@{/review/delete/{id}(id=${reviewDTO.id})}" method="post">
                                <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill px-3"
                                        onclick="return confirm('삭제할까요?')">삭제
                                </button>
                            </form>
                        </div>
                    </div>
                    <div class="d-flex align-items-center text-muted small mt-2">
                        <span class="me-3"><i class="bi bi-person me-1"></i> <span
                                th:text="${reviewDTO.loginId}">작성자</span></span>
                        <span><i class="bi bi-calendar3 me-1"></i> <span
                                th:text="${#temporals.format(reviewDTO.createdAt, 'yyyy.MM.dd')}">날짜</span></span>
                    </div>
                </div>

                <div class="row g-4 mb-5">
                    <div class="col-md-6">
                        <div class="p-4 rounded-4" style="background-color: #f8fff9; border: 1px solid #e1f5e5;">
                            <h6 class="fw-bold text-success mb-3"><i class="bi bi-plus-circle-fill me-2"></i>이 집의 장점
                            </h6>
                            <div class="d-flex flex-wrap gap-2">
                                <span th:each="pros : ${reviewDTO.prosList}"
                                      class="badge badge-pros rounded-pill shadow-sm" th:text="${pros}">장점</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="p-4 rounded-4" style="background-color: #fff9f9; border: 1px solid #f5e1e1;">
                            <h6 class="fw-bold text-danger mb-3"><i class="bi bi-dash-circle-fill me-2"></i>이 집의 단점</h6>
                            <div class="d-flex flex-wrap gap-2">
                                <span th:each="cons : ${reviewDTO.consList}"
                                      class="badge badge-cons rounded-pill shadow-sm" th:text="${cons}">단점</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div th:if="${not #lists.isEmpty(reviewDTO.fileList)}" class="mb-5">
                    <h6 class="fw-bold mb-3"><i class="bi bi-images me-2 text-orange"></i>현장 실사</h6>
                    <div class="row g-3">
                        <div th:each="file : ${reviewDTO.fileList}" class="col-md-4 col-6">
                            <img th:src="@{/files/{path}(path=${file.filePath})}" class="review-image shadow-sm"
                                 alt="리뷰 이미지">
                        </div>
                    </div>
                </div>

                <div class="py-4 border-top border-bottom mb-5">
                    <h6 class="fw-bold mb-4 text-muted small">상세 내용</h6>
                    <div th:utext="${reviewDTO.content}" class="content-body"></div>
                </div>

                <div class="d-flex flex-column align-items-center gap-4 mb-5">
                    <form th:action="@{/reaction}" method="post">
                        <input type="hidden" name="targetType" value="review">
                        <input type="hidden" name="targetId" th:value="${reviewDTO.id}">
                        <input type="hidden" name="type" value="1">
                        <button type="submit" class="btn-like">
                            <i class="bi bi-heart-fill me-2"></i>좋아요 <span th:text="${reviewDTO.likeCount}">0</span>
                        </button>
                    </form>
                    <a th:href="@{/review}" class="btn btn-outline-dark rounded-pill px-4 btn-sm">
                        <i class="bi bi-arrow-left me-1"></i> 목록으로
                    </a>
                </div>

                <div class="crime-card" th:if="${reviewDTO.topCrimes != null and !#lists.isEmpty(reviewDTO.topCrimes)}">
                    <h6 class="fw-bold mb-4 text-dark"><i class="bi bi-shield-lock-fill me-2 text-danger"></i>이 지역 치안
                        리포트</h6>
                    <div th:if="${reviewDTO.safetyWarning != null and reviewDTO.safetyWarning != ''}"
                         class="alert alert-danger border-0 small py-2 mb-4">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${reviewDTO.safetyWarning}">경고</span>
                    </div>
                    <div class="row g-3">
                        <div th:each="crime, stat : ${reviewDTO.topCrimes}" class="col-12">
                            <div class="d-flex justify-content-between align-items-center p-3 rounded-3 bg-white border">
                                <span class="small fw-bold text-dark">
                                    <span class="crime-rank-badge" th:text="${stat.count} + '위'">1위</span>
                                    <span th:text="${crime}">범죄</span>
                                </span>
                                <span class="small text-orange fw-bold">약 <span
                                        th:text="${reviewDTO.crimeCounts[stat.index]}">0</span>건</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="reply-section">
                    <h5 class="fw-bold mb-4">
                        <i class="bi bi-chat-dots-fill me-2 text-orange"></i>댓글
                        <span class="text-orange" th:text="${reviewDTO.replyList.size()}">0</span>
                    </h5>

                    <div th:each="reply : ${reviewDTO.replyList}" class="reply-item shadow-sm" th:id="|reply-${reply.id}|">
                        <div th:id="|display-${reply.id}|">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <span class="reply-author" th:text="${reply.loginId}">사용자</span>
                                <div sec:authorize="isAuthenticated()" th:if="${#authentication.name == reply.loginId}"
                                     class="d-flex align-items-center gap-2">
                                    <button class="btn btn-link btn-sm p-0 text-muted text-decoration-none border-0"
                                            th:onclick="|toggleEditForm(${reply.id})|" style="line-height: 1;">수정
                                    </button>
                                    <form th:action="@{/reply/delete}" method="post" class="m-0 d-inline-flex">
                                        <input type="hidden" name="id" th:value="${reply.id}">
                                        <input type="hidden" name="targetType" value="review">
                                        <input type="hidden" name="targetId" th:value="${reviewDTO.id}">
                                        <button type="submit"
                                                class="btn btn-link btn-sm p-0 text-danger text-decoration-none border-0"
                                                onclick="return confirm('삭제할까요?')" style="line-height: 1;">삭제
                                        </button>
                                    </form>
                                </div>
                            </div>
                            <p class="mb-0 text-secondary small" th:text="${reply.content}">댓글 내용</p>
                        </div>

                        <div th:id="|editForm-${reply.id}|" class="mt-3 p-3 bg-light rounded-3" style="display: none;">
                            <form th:action="@{/reply/edit}" method="post">
                                <input type="hidden" name="id" th:value="${reply.id}">
                                <input type="hidden" name="targetType" value="review">
                                <input type="hidden" name="targetId" th:value="${reviewDTO.id}">
                                <textarea name="content" th:text="${reply.content}" class="form-control border-0 mb-2"
                                          rows="2" style="resize:none;"></textarea>
                                <div class="text-end">
                                    <button type="submit" class="btn btn-orange btn-sm rounded-pill px-3">저장</button>
                                    <button type="button" class="btn btn-light btn-sm rounded-pill px-3 border"
                                            th:onclick="|toggleEditForm(${reply.id})|">취소
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div class="mt-4" sec:authorize="isAuthenticated()">
                        <form th:action="@{/reply/write}" method="post" class="bg-white p-3 rounded-4 shadow-sm border">
                            <input type="hidden" name="targetType" value="review">
                            <input type="hidden" name="targetId" th:value="${reviewDTO.id}">
                            <textarea name="content" class="form-control border-0 mb-2" rows="3"
                                      placeholder="의견을 남겨주세요." style="resize: none;"></textarea>
                            <div class="text-end">
                                <button type="submit" class="btn btn-orange px-4 py-2 rounded-pill fw-bold">댓글 등록
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 수정 사용자 권한 체크 -->
<script th:if="${errorMessage}">
    alert([[${errorMessage}]]);
</script>
<script th:if="${successMessage}">
    alert([[${successMessage}]]);
</script>
<script layout:fragment="script">
    function toggleEditForm(id) {
        const form = document.getElementById('editForm-' + id);
        const display = document.getElementById('display-' + id);
        if (form.style.display === 'none' || form.style.display === '') {
            form.style.display = 'block';
            display.style.opacity = '0.5';
        } else {
            form.style.display = 'none';
            display.style.opacity = '1';
        }
    }
    //내가 쓴 댓글 스크롤(포커싱)
    $(document).ready(function() {
        if (window.location.hash) {
            var target = $(window.location.hash);
            if (target.length) {
                $(window).scrollTop(target.offset().top - 100);

                target.css('background-color', '#f4f4f4');
                setTimeout(function() {
                    target.css('background-color', '#fff');
                }, 2000);
            }
        }
    });
</script>
</html>
