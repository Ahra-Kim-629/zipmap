<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css" rel="stylesheet">
    <style>
        .write-container { padding: 60px 0; background-color: #fdfcf9; }
        .write-card { background: #fff; padding: 40px; border-radius: 20px; border: none; }
        .write-title {  font-weight: 800; color: #3E362E; }

        /* 섹션 구분 */
        .form-section { margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #f1f1f1; }
        .section-label { font-weight: 700; color: #3E362E; margin-bottom: 15px; display: block; font-size: 1.1rem; }

        /* 체크박스 -> 칩(Chip) 디자인 */
        .check-group { display: flex; flex-wrap: wrap; gap: 10px; }
        .check-item input[type="checkbox"] { display: none; }
        .check-item label {
            padding: 8px 18px; border-radius: 50px; border: 1px solid #ddd;
            background: #fff; cursor: pointer; font-size: 0.9rem; transition: all 0.2s ease; color: #666;
        }

        .pros-group .check-item input[type="checkbox"]:checked + label {
            background-color: #28a745; border-color: #28a745; color: #fff;
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.2);
        }

        .cons-group .check-item input[type="checkbox"]:checked + label {
            background-color: #dc3545; border-color: #dc3545; color: #fff;
            box-shadow: 0 4px 10px rgba(220, 53, 69, 0.2);
        }

        /* Summernote 및 모달 커스텀 (작성페이지와 동일) */
        .note-editor.note-frame { border: 1px solid #eee !important; border-radius: 12px !important; overflow: hidden; }
        .note-toolbar { background-color: #f8f9fa !important; border-bottom: 1px solid #eee !important; }
        .note-modal { z-index: 10050 !important; }
        .note-modal-backdrop { z-index: 10040 !important; display: none !important; }
        .note-modal-content { margin-top: 80px !important; border-radius: 15px !important; box-shadow: 0 15px 50px rgba(0,0,0,0.2) !important; overflow: hidden; }
        .note-modal-footer { height: auto !important; padding: 20px !important; display: flex !important; justify-content: center; gap: 10px; }
        .note-modal-footer .btn { padding: 10px 25px !important; border-radius: 50px !important; font-weight: bold !important; }
        .note-modal-footer .btn-primary { background-color: var(--main-orange) !important; border-color: var(--main-orange) !important; }

        .note-btn { background-color: white !important; border: 1px solid #eee !important; }

        .note-editor.note-frame.fullscreen {
            z-index: 9999 !important;
            background-color: white !important;
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important;
        }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="write-container">
        <div class="container">
            <div class="write-card daedong-shadow">
                <div class="text-center mb-5">
                    <h2 class="write-title mb-2">원룸 후기 수정</h2>
                    <p class="text-muted small">기존 후기 내용을 수정하거나 보완할 수 있습니다.</p>
                </div>

                <form th:action="@{|/review/edit/${reviewDTO.id}|}" method="post" enctype="multipart/form-data">
                    <div class="form-section">
                        <span class="section-label"><i class="bi bi-info-circle me-2 text-orange"></i>기본 정보</span>
                        <div class="row g-3">
                            <div class="col-md-12">
                                <label for="title" class="form-label small fw-bold text-muted">리뷰 제목</label>
                                <input type="text" class="form-control rounded-3 py-2" id="title" name="title"
                                       th:value="${reviewDTO.title}" required>
                            </div>
                            <div class="col-md-8" style="position:relative;">
                                <label for="address" class="form-label small fw-bold text-muted">주소</label>
                                <input type="text" class="form-control rounded-3 py-2" id="address" name="address"
                                       th:value="${reviewDTO.address}" required>
                                <ul id="addressList" style="display:none; position:absolute; width: calc(100% - 24px); background:white; border:1px solid #ccc; list-style:none; padding:0; margin:0; z-index:100; top: 100%;">
                                </ul>
                            </div>
                            <div class="col-md-4">
                                <label for="point" class="form-label small fw-bold text-muted">종합 평점</label>
                                <select class="form-select rounded-3 py-2" id="point" name="point" required>
                                    <option value="5" th:selected="${reviewDTO.point == 5}">★★★★★ (5점)</option>
                                    <option value="4" th:selected="${reviewDTO.point == 4}">★★★★☆ (4점)</option>
                                    <option value="3" th:selected="${reviewDTO.point == 3}">★★★☆☆ (3점)</option>
                                    <option value="2" th:selected="${reviewDTO.point == 2}">★★☆☆☆ (2점)</option>
                                    <option value="1" th:selected="${reviewDTO.point == 1}">★☆☆☆☆ (1점)</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <span class="section-label"><i class="bi bi-tags me-2 text-orange"></i>키워드 수정</span>

                        <p class="small fw-bold text-success mb-2">이 집의 장점</p>
                        <div class="check-group pros-group mb-4">
                            <div th:each="item : ${ {'채광', '난방', '배수', '온수', '수압', '곰팡이', '해충', '소음', '치안', '집주인'} }"
                                 class="check-item">
                                <input type="checkbox" th:id="'p_' + ${item}" name="prosList" th:value="${item}"
                                       th:checked="${#lists.contains(reviewDTO.prosList, item)}">
                                <label th:for="'p_' + ${item}" th:text="${item}"></label>
                            </div>
                        </div>

                        <p class="small fw-bold text-danger mb-2">이 집의 단점</p>
                        <div class="check-group cons-group">
                            <div th:each="item : ${ {'채광', '난방', '배수', '온수', '수압', '곰팡이', '해충', '소음', '치안', '집주인'} }"
                                 class="check-item">
                                <input type="checkbox" th:id="'c_' + ${item}" name="consList" th:value="${item}"
                                       th:checked="${#lists.contains(reviewDTO.consList, item)}">
                                <label th:for="'c_' + ${item}" th:text="${item}"></label>
                            </div>
                        </div>
                    </div>

                    <div class="form-section border-0 mb-0">
                        <span class="section-label"><i class="bi bi-pencil-square me-2 text-orange"></i>상세 내용</span>
                        <textarea id="content" name="content" th:text="${reviewDTO.content}" required></textarea>
                    </div>

                    <div class="d-flex gap-3 justify-content-center mt-5">
                        <button type="submit" class="btn btn-orange px-5 py-3 fw-bold rounded-pill shadow-sm">수정 완료
                        </button>
                        <a th:href="@{|/review/detail/${reviewDTO.id}|}"
                           class="btn btn-outline-secondary px-5 py-3 rounded-pill">수정 취소</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>
    <script th:src="'//dapi.kakao.com/v2/maps/sdk.js?appkey=' + ${@environment.getProperty('kakao.maps.appkey')} + '&libraries=services'"></script>

    <script th:inline="javascript">
        $(document).ready(function() {
            $('#content').summernote({
                height: 400,
                lang: 'ko-KR',
                dialogsInBody: true,
                dialogsFade: false,
                toolbar: [
                    ['style', ['style']],
                    ['font', ['bold', 'underline', 'clear']],
                    ['color', ['color']],
                    ['para', ['ul', 'ol', 'paragraph']],
                    ['table', ['table']],
                    ['insert', ['link', 'picture', 'hr']],
                    ['view', ['fullscreen', 'codeview', 'help']]
                ],
                callbacks: {
                    onImageUpload: function(files) {
                        for (let i = 0; i < files.length; i++) {
                            uploadSummernoteImage(files[i], this);
                        }
                    }
                }
            });
        });

        function uploadSummernoteImage(file, editor) {
            let data = new FormData();
            data.append("file", file);

            var token = $("meta[name='_csrf']").attr("content");
            var header = $("meta[name='_csrf_header']").attr("content");
            $.ajax({
                url: "/review/uploadSummernoteImage",
                type: "POST",
                data: data,
                contentType: false,
                processData: false,
                beforeSend: function(xhr) {
                    if (token && header) {
                        xhr.setRequestHeader(header, token);
                    }
                },
                success: function(response) {
                    $(editor).summernote('insertImage', response.url);
                }
            });
        }

        // 파일 삭제 Ajax (기능 유지 및 알림 보강)
        function deleteFile(fileId) {
            if (!confirm("정말 이 파일을 삭제하시겠습니까?")) return;

            const token = $("meta[name='_csrf']").attr("content");
            const header = $("meta[name='_csrf_header']").attr("content");

            $.ajax({
                url: "/review/deleteFile/" + fileId,
                type: "POST",
                beforeSend: function(xhr) {
                    if (token && header) xhr.setRequestHeader(header, token);
                },
                success: function(result) {
                    if (result.trim() === "success") {
                        $('#file-card-' + fileId).fadeOut(300, function() { $(this).remove(); });
                    } else {
                        alert("삭제 처리에 실패했습니다.");
                    }
                },
                error: function(xhr) {
                    alert("삭제 중 오류가 발생했습니다.");
                }
            });
        }

       // 카카오 주소 검색 서비스(Geocoder) 객체를 생성
 var geocoder = new kakao.maps.services.Geocoder();

 $('#address').on('keyup', function() {
     var query = $(this).val();

     if (query.length > 1) {
         // 주소로 검색을 요청
         geocoder.addressSearch(query, function(result, status) {

             // 검색 성공 시(OK)
             if (status === kakao.maps.services.Status.OK) {
                 let $list = $('#addressList');
                 $list.empty().show();

                 // 결과값(result) 리스트 생성
                 result.forEach(function(item) {
                     let li = $('<li style="padding:10px; cursor:pointer; border-bottom:1px solid #eee;">')
                              .text(item.address_name)
                              .on('click', function() {
                                  $('#address').val(item.address_name);
                                  $list.hide();

                              });
                     $list.append(li);
                 });
             }
         });
     } else {
         $('#addressList').hide();
     }
 });
    </script>
</div>
</html>
