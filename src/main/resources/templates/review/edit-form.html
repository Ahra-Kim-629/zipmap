<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css" rel="stylesheet">
    <style>
        .write-container { padding: 60px 0; background-color: #f5f4ef; }
        .write-card { background: #fff; padding: 40px; border-radius: 20px; border: none; }
        .write-title {  font-weight: 800; color: #3E362E; }

        /* 섹션 구분 */
        .form-section { margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #f1f1f1; }
        .section-label { font-weight: 700; color: #3E362E; margin-bottom: 15px; display: block; font-size: 1.1rem; }

        /* 체크박스 -> 칩(Chip) 디자인 */
        .check-group { display: flex; flex-wrap: wrap; gap: 10px; }
        .check-item input[type="checkbox"] { display: none; }
        .check-item label {
            padding: 8px 18px; border-radius: 50px; border: 1px solid #ddd;
            background: #fff; cursor: pointer; font-size: 0.9rem; transition: all 0.2s ease; color: #666;
        }

        .pros-group .check-item input[type="checkbox"]:checked + label {
            background-color: #28a745; border-color: #28a745; color: #fff;
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.2);
        }

        .cons-group .check-item input[type="checkbox"]:checked + label {
            background-color: #dc3545; border-color: #dc3545; color: #fff;
            box-shadow: 0 4px 10px rgba(220, 53, 69, 0.2);
        }

        /* Summernote 및 모달 커스텀 (작성페이지와 동일) */
        .note-editor.note-frame { border: 1px solid #eee !important; border-radius: 12px !important; overflow: hidden; }
        .note-toolbar { background-color: #f8f9fa !important; border-bottom: 1px solid #eee !important; }
        .note-modal { z-index: 10050 !important; }
        .note-modal-backdrop { z-index: 10040 !important; display: none !important; }
        .note-modal-content { margin-top: 80px !important; border-radius: 15px !important; box-shadow: 0 15px 50px rgba(0,0,0,0.2) !important; overflow: hidden; }
        .note-modal-footer { height: auto !important; padding: 20px !important; display: flex !important; justify-content: center; gap: 10px; }
        .note-modal-footer .btn { padding: 10px 25px !important; border-radius: 50px !important; font-weight: bold !important; }
        .note-modal-footer .btn-primary { background-color: var(--main-orange) !important; border-color: var(--main-orange) !important; }

        .note-btn { background-color: white !important; border: 1px solid #eee !important; }

        .note-editor.note-frame.fullscreen {
            z-index: 9999 !important;
            background-color: white !important;
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important;
        }

        /* ✨ 수정 완료 버튼 (리스트 검색 버튼과 동일한 오렌지색) */
        .btn-submit-orange {
            background-color: #F97316 !important;
            color: #ffffff !important;
            border: none !important;
            transition: background-color 0.2s;
        }
        .btn-submit-orange:hover {
            background-color: #EA580C !important;
        }

        /* ✨ 대표 사진(썸네일) 선택 UI 전용 CSS 추가 */
        .thumbnail-wrapper { margin-top: 20px; padding: 25px; background: #fffaf6; border-radius: 15px; border: 2px dashed #ffcba4; display: none; }
        .thumbnail-title { font-size: 1rem; font-weight: 800; color: #d35400; margin-bottom: 15px; }
        .thumbnail-list { display: flex; gap: 15px; flex-wrap: wrap; }
        .thumb-item { position: relative; width: 130px; height: 130px; border-radius: 12px; overflow: hidden; cursor: pointer; border: 4px solid transparent; transition: all 0.2s; background: #fff; }
        .thumb-item img { width: 100%; height: 100%; object-fit: cover; }
        .thumb-badge { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.6); color: white; font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; font-weight: bold; transition: all 0.2s; }

        /* 선택되었을 때의 스타일 */
        .thumb-item.selected { border-color: var(--main-orange); box-shadow: 0 5px 15px rgba(230,126,34,0.4); transform: translateY(-3px); }
        .thumb-item.selected .thumb-badge { background: var(--main-orange); }

        /* ✨ 썸머노트 본문 내 이미지 세로 1줄 정렬 (가로 이어붙임 방지) */
        .note-editable img {
            display: block !important;
            max-width: 100% !important;
            margin: 20px 0 !important;
            border-radius: 8px;
            transition: outline 0.2s;
            cursor: pointer;
        }
        .note-editable img::selection, .note-editable img::-moz-selection { background: transparent; }
        .note-control-selection { border: 3px dashed var(--main-orange) !important; border-radius: 8px; }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="write-container">
        <div class="container">
            <div class="write-card daedong-shadow">
                <div class="text-center mb-5">
                    <h2 class="write-title mb-2">원룸 후기 수정</h2>
                    <p class="text-muted small">기존 후기 내용을 수정하거나 보완할 수 있습니다.</p>
                </div>

                <form id="reviewForm" th:action="@{|/review/edit/${reviewDTO.id}|}" method="post" enctype="multipart/form-data">
                    <div class="form-section">
                        <span class="section-label"><i class="bi bi-info-circle me-2 text-orange"></i>기본 정보</span>
                        <div class="row g-3">
                            <div class="col-md-12">
                                <label for="title" class="form-label small fw-bold text-muted">리뷰 제목</label>
                                <input type="text" class="form-control rounded-3 py-2" id="title" name="title"
                                       th:value="${reviewDTO.title}" required>
                            </div>
                            <div class="col-md-8" style="position:relative;">
                                <label for="address" class="form-label small fw-bold text-muted">주소</label>
                                <input type="text" class="form-control rounded-3 py-2" id="address" name="address"
                                       th:value="${reviewDTO.address}" required>
                                <ul id="addressList" style="display:none; position:absolute; width: calc(100% - 24px); background:white; border:1px solid #ccc; list-style:none; padding:0; margin:0; z-index:100; top: 100%;">
                                </ul>
                            </div>
                            <div class="col-md-4">
                                <label for="point" class="form-label small fw-bold text-muted">종합 평점</label>
                                <select class="form-select rounded-3 py-2" id="point" name="point" required>
                                    <option value="5" th:selected="${reviewDTO.point == 5}">★★★★★ (5점)</option>
                                    <option value="4" th:selected="${reviewDTO.point == 4}">★★★★☆ (4점)</option>
                                    <option value="3" th:selected="${reviewDTO.point == 3}">★★★☆☆ (3점)</option>
                                    <option value="2" th:selected="${reviewDTO.point == 2}">★★☆☆☆ (2점)</option>
                                    <option value="1" th:selected="${reviewDTO.point == 1}">★☆☆☆☆ (1점)</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <span class="section-label"><i class="bi bi-tags me-2 text-orange"></i>키워드 수정</span>

                        <p class="small fw-bold text-success mb-2">이 집의 장점</p>
                        <div class="check-group pros-group mb-4">
                            <div th:each="item : ${ {'채광', '난방', '배수', '온수', '수압', '곰팡이', '해충', '소음', '치안', '집주인'} }"
                                 class="check-item">
                                <input type="checkbox" th:id="'p_' + ${item}" name="prosList" th:value="${item}"
                                       th:checked="${#lists.contains(reviewDTO.prosList, item)}">
                                <label th:for="'p_' + ${item}" th:text="${item}"></label>
                            </div>
                        </div>

                        <p class="small fw-bold text-danger mb-2">이 집의 단점</p>
                        <div class="check-group cons-group">
                            <div th:each="item : ${ {'채광', '난방', '배수', '온수', '수압', '곰팡이', '해충', '소음', '치안', '집주인'} }"
                                 class="check-item">
                                <input type="checkbox" th:id="'c_' + ${item}" name="consList" th:value="${item}"
                                       th:checked="${#lists.contains(reviewDTO.consList, item)}">
                                <label th:for="'c_' + ${item}" th:text="${item}"></label>
                            </div>
                        </div>
                    </div>

                    <div class="form-section border-0 mb-0">
                        <span class="section-label"><i class="bi bi-pencil-square me-2 text-orange"></i>상세 내용</span>
                        <textarea id="content" name="content" th:text="${reviewDTO.content}" required></textarea>

                        <input type="hidden" id="thumbnailPath" name="thumbnailPath" th:value="${reviewDTO.thumbnailPath}">

                        <div id="thumbnailArea" class="thumbnail-wrapper" th:style="${reviewDTO.thumbnailPath != null} ? 'display:block;' : 'display:none;'">
                            <div class="thumbnail-title"><i class="bi bi-image me-2"></i>대표 사진(썸네일)을 선택해주세요</div>
                            <div id="thumbnailList" class="thumbnail-list">
                                <div th:if="${reviewDTO.thumbnailPath != null}"
                                     class="thumb-item selected"
                                     th:data-url="${reviewDTO.thumbnailPath}"
                                     onclick="selectThumbnail(this)">
                                    <div class="thumb-badge"><i class="bi bi-check-circle-fill"></i> 대표</div>
                                    <img th:src="@{${reviewDTO.thumbnailPath}}" alt="업로드 이미지">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-3 justify-content-center mt-5">
                        <button type="button" id="submitBtn" class="btn btn-submit-orange px-5 py-3 fw-bold rounded-pill shadow-sm">수정 완료</button>
                        <a th:href="@{|/review/detail/${reviewDTO.id}|}" class="btn btn-outline-secondary px-5 py-3 rounded-pill bg-white">수정 취소</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>
    <script th:src="'//dapi.kakao.com/v2/maps/sdk.js?appkey=' + ${@environment.getProperty('kakao.maps.appkey')} + '&libraries=services'"></script>

    <script th:inline="javascript">
        // =======================================================
        // 1. 썸네일 선택 및 추가 함수 (Write 폼과 동일)
        // =======================================================
        window.selectThumbnail = function(element) {
            $('.thumb-item').removeClass('selected');
            $('.thumb-badge').html('선택');
            $(element).addClass('selected');
            $(element).find('.thumb-badge').html('<i class="bi bi-check-circle-fill"></i> 대표');
            $('#thumbnailPath').val($(element).data('url'));
        };

        function addThumbnailCard(imageUrl) {
            $('#thumbnailArea').fadeIn();
            let isFirst = $('#thumbnailList .thumb-item').length === 0;
            let selectedClass = isFirst ? 'selected' : '';
            let badgeText = isFirst ? '<i class="bi bi-check-circle-fill"></i> 대표' : '선택';

            if (isFirst) { $('#thumbnailPath').val(imageUrl); }

            let cardHtml = `
                <div class="thumb-item ${selectedClass}" data-url="${imageUrl}" onclick="selectThumbnail(this)">
                    <div class="thumb-badge">${badgeText}</div>
                    <img src="${imageUrl}" alt="업로드 이미지">
                </div>
            `;
            $('#thumbnailList').append(cardHtml);
        }

        function uploadSummernoteImage(file, editor) {
            let data = new FormData();
            data.append("file", file);
            var token = $("meta[name='_csrf']").attr("content");
            var header = $("meta[name='_csrf_header']").attr("content");

            $.ajax({
                url: "/review/uploadSummernoteImage",
                type: "POST",
                data: data,
                contentType: false, processData: false,
                beforeSend: function(xhr) { if (token && header) xhr.setRequestHeader(header, token); },
                success: function(response) {
                    $(editor).summernote('insertImage', response.url);
                    addThumbnailCard(response.url);
                },
                error: function(e) { console.log("에러 내용:", e); alert("이미지 업로드 실패"); }
            });
        }

        // =======================================================
        // 2. 썸머노트 초기화 및 동기화 로직
        // =======================================================
        $(document).ready(function() {
            let syncTimeout;

            $('#content').summernote({
                height: 700,
                minHeight: 500,
                maxHeight: 1200,
                lang: 'ko-KR',
                placeholder: '내용을 입력해주세요. <br><br>💡 사진 위치를 바꾸고 싶다면?<br>사진을 클릭 후 잘라내기(Ctrl+X)를 하고, 원하는 곳에 붙여넣기(Ctrl+V) 하시면 됩니다!',
                dialogsInBody: true, dialogsFade: false,
                toolbar: [
                    ['style', ['style']],
                    ['font', ['bold', 'underline', 'clear']],
                    ['color', ['color']],
                    ['para', ['ul', 'ol', 'paragraph']],
                    ['table', ['table']],
                    ['insert', ['link', 'picture', 'hr']],
                    ['view', ['fullscreen', 'codeview', 'help']]
                ],
                callbacks: {
                    onImageUpload: function(files) {
                        for (let i = 0; i < files.length; i++) {
                            uploadSummernoteImage(files[i], this);
                        }
                    },
                    onChange: function(contents) {
                        clearTimeout(syncTimeout);
                        syncTimeout = setTimeout(function() {
                            try {
                                let tempDiv = document.createElement('div');
                                tempDiv.innerHTML = contents;
                                let editorImages = tempDiv.getElementsByTagName('img');

                                let currentFileNames = [];
                                for(let i = 0; i < editorImages.length; i++) {
                                    let src = editorImages[i].src;
                                    try { src = decodeURI(src); } catch(e) {}
                                    currentFileNames.push(src.substring(src.lastIndexOf('/') + 1));
                                }

                                $('.thumb-item').each(function() {
                                    let cardUrl = $(this).data('url');
                                    try { cardUrl = decodeURI(cardUrl); } catch(e) {}
                                    let cardFileName = cardUrl.substring(cardUrl.lastIndexOf('/') + 1);

                                    if (!currentFileNames.includes(cardFileName)) {
                                        let wasSelected = $(this).hasClass('selected');
                                        $(this).remove();

                                        if (wasSelected) {
                                            let remainingFirst = $('.thumb-item').first();
                                            if (remainingFirst.length > 0) {
                                                window.selectThumbnail(remainingFirst[0]);
                                            } else {
                                                $('#thumbnailPath').val('');
                                                $('#thumbnailArea').fadeOut();
                                            }
                                        }
                                    }
                                });

                                if ($('.thumb-item').length === 0) {
                                    $('#thumbnailPath').val('');
                                    $('#thumbnailArea').fadeOut();
                                }
                            } catch (err) {
                                console.log("동기화 에러:", err);
                            }
                        }, 300);
                    }
                }
            });

            // =======================================================
            // ✨ [수정 페이지 전용] 로딩 직후 기존 본문 사진들을 갤러리에 복원!
            // =======================================================
            setTimeout(function() {
                let existingContents = $('#content').summernote('code');
                let tempDiv = document.createElement('div');
                tempDiv.innerHTML = existingContents;
                let existingImages = tempDiv.getElementsByTagName('img');

                let savedThumbnail = $('#thumbnailPath').val(); // DB에서 가져온 기존 대표사진 경로
                try { savedThumbnail = decodeURI(savedThumbnail); } catch(e) {}
                let savedFileName = savedThumbnail ? savedThumbnail.substring(savedThumbnail.lastIndexOf('/') + 1) : '';

                // 타임리프가 임시로 그려둔 게 있다면 싹 비움 (중복 방지)
                $('#thumbnailList').empty();

                if (existingImages.length > 0) {
                    $('#thumbnailArea').show();

                    for(let i = 0; i < existingImages.length; i++) {
                        let src = existingImages[i].getAttribute('src');
                        try { src = decodeURI(src); } catch(e) {}
                        let fileName = src.substring(src.lastIndexOf('/') + 1);

                        let isSelected = false;

                        // 1순위: DB에 저장된 대표사진과 파일명이 같으면 선택!
                        if (savedFileName && fileName === savedFileName) {
                            isSelected = true;
                        }
                        // 2순위: DB에 대표사진이 없는데 기존 사진이 있다면 첫 번째 사진을 무조건 대표로!
                        else if (!savedFileName && i === 0) {
                            isSelected = true;
                        }

                        let selectedClass = isSelected ? 'selected' : '';
                        let badgeText = isSelected ? '<i class="bi bi-check-circle-fill"></i> 대표' : '선택';

                        if (isSelected) {
                            $('#thumbnailPath').val(src); // 서버로 보낼 값 확실하게 세팅
                        }

                        let cardHtml = `
                            <div class="thumb-item ${selectedClass}" data-url="${src}" onclick="selectThumbnail(this)">
                                <div class="thumb-badge">${badgeText}</div>
                                <img src="${src}" alt="업로드 이미지">
                            </div>
                        `;
                        $('#thumbnailList').append(cardHtml);
                    }
                }
            }, 500); // 썸머노트가 완전히 로딩될 때까지 0.5초(500ms) 기다렸다가 스윽 그려줍니다!

            // =======================================================
            // 3. 폼 제출 검증 및 카카오 주소 검색 (중복 제거 완료)
            // =======================================================
            $('#submitBtn').on('click', function(e) {
                let content = $('#content').summernote('code');
                let pureText = content.replace(/<[^>]*>?/gm, '').trim();

                if(pureText.length < 50) {
                    alert("리뷰 내용을 최소 50자 이상 작성해주세요. (현재 " + pureText.length + "자)");
                    return false;
                }

                $('#reviewForm').submit();
            });

            var geocoder = new kakao.maps.services.Geocoder();
            $('#address').on('keyup', function() {
                var query = $(this).val();
                if (query.length > 1) {
                    geocoder.addressSearch(query, function(result, status) {
                        if (status === kakao.maps.services.Status.OK) {
                            let $list = $('#addressList');
                            $list.empty().show();
                            result.forEach(function(item) {
                                let li = $('<li style="padding:10px; cursor:pointer; border-bottom:1px solid #eee;">')
                                         .text(item.address_name)
                                         .on('click', function() {
                                             $('#address').val(item.address_name);
                                             $list.hide();
                                         });
                                $list.append(li);
                            });
                        }
                    });
                } else {
                    $('#addressList').hide();
                }
            });
        });

        // 파일 삭제 Ajax (기존 코드 유지)
        function deleteFile(fileId) {
            if (!confirm("정말 이 파일을 삭제하시겠습니까?")) return;
            const token = $("meta[name='_csrf']").attr("content");
            const header = $("meta[name='_csrf_header']").attr("content");

            $.ajax({
                url: "/review/deleteFile/" + fileId,
                type: "POST",
                beforeSend: function(xhr) { if (token && header) xhr.setRequestHeader(header, token); },
                success: function(result) {
                    if (result.trim() === "success") {
                        $('#file-card-' + fileId).fadeOut(300, function() { $(this).remove(); });
                    } else { alert("삭제 처리에 실패했습니다."); }
                },
                error: function(xhr) { alert("삭제 중 오류가 발생했습니다."); }
            });
        }
    </script>
</div>
</html>
