<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <style>
        .review-container { padding: 40px 0; background-color: #fdfcf9; }
        .page-title {  font-weight: 800; color: #3E362E; }

        /* 지도 관련 스타일 */
        .map-section { position: relative; width: 100%; height: 450px; border-radius: 15px; overflow: hidden; display: none; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #map { width: 100%; height: 100%; }

        /* 필터 및 검색 */
        .search-card { background: white; padding: 25px; border-radius: 15px; border: none; }
        .filter-label { font-size: 0.85rem; font-weight: 700; color: #666; margin-right: 15px; min-width: 40px; display: inline-block; }
        .checkbox-item { margin-right: 12px; cursor: pointer; font-size: 0.9rem; }
        .checkbox-item input { accent-color: var(--main-orange); margin-right: 4px; }

        /* 테이블 스타일 */
        .review-table-card { background: white; border-radius: 15px; overflow: hidden; border: none; }
        .table thead { background-color: #f8f9fa; border-bottom: 2px solid #eee; }
        .table th { font-weight: 700; color: #555; font-size: 0.9rem; border: none; padding: 15px; }
        .table td { vertical-align: middle; padding: 15px; font-size: 0.95rem; border-bottom: 1px solid #f1f1f1; }
        .review-link { text-decoration: none; color: #333; font-weight: 600; transition: 0.2s; }
        .review-link:hover { color: var(--main-orange); }

        /* 페이징 스타일 */
        .pagination-container { margin-top: 40px; }
        .page-link { color: #555; border: none; margin: 0 3px; border-radius: 8px !important; transition: 0.2s; }
        .page-item.active .page-link { background-color: var(--main-orange); border-color: var(--main-orange); color: white; }
        .page-link:hover:not(.active) { background-color: #eee; }

        /* =========================================================
           🌟 고급 지도 디자인 (로딩, 안전율 배지, 리뷰 핀) 추가
           ========================================================= */

        /* 1. 로딩 스피너 창 */
        .map-loading { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:999; display:flex; justify-content:center; align-items:center; flex-direction:column; }
        .spinner-orange { width: 3rem; height: 3rem; color: var(--main-orange); }

        /* 2. 안전율 프리미엄 배지 디자인 */
        .premium-badge {
            display: flex; align-items: center; padding: 8px 16px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            font-size: 0.9rem; font-weight: 800; color: #333;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            cursor: default;
        }
        .premium-badge:hover {
            transform: translateY(-5px);
            z-index: 100;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* 배지 안의 동그란 점 (심장박동 애니메이션) */
        .status-dot {
            width: 12px; height: 12px; border-radius: 50%; margin-right: 8px;
            animation: pulse-dot 1.5s infinite;
        }
        .grade-safe { border-color: rgba(76, 175, 80, 0.5); }
        .grade-safe .status-dot { background: #4CAF50; box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); }

        .grade-normal { border-color: rgba(255, 193, 7, 0.5); }
        .grade-normal .status-dot { background: #FFC107; box-shadow: 0 0 0 0 rgba(255, 193, 7, 0.7); }

        .grade-danger { border-color: rgba(255, 87, 34, 0.5); }
        .grade-danger .status-dot { background: #FF5722; box-shadow: 0 0 0 0 rgba(255, 87, 34, 0.7); }

        @keyframes pulse-dot {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 var(--pulse-color); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0,0,0,0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0,0,0,0); }
        }

        /* 3. 일반 리뷰 건수 마커 (말풍선 모양) */
        .review-pin {
            background: var(--main-orange); color: white;
            padding: 8px 15px; border-radius: 20px; font-weight: 800;
            box-shadow: 0 4px 10px rgba(230,126,34,0.4);
            position: relative; cursor: pointer; transition: 0.2s;
        }
        .review-pin:hover { background: #d35400; transform: scale(1.1); }
        .review-pin::after {
            content: ''; position: absolute; bottom: -6px; left: 50%;
            transform: translateX(-50%);
            border-width: 6px 6px 0; border-style: solid;
            border-color: var(--main-orange) transparent transparent transparent;
        }

        .region-detail-card {
            position: absolute; bottom: -150px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 350px; background: white; border-radius: 20px;
            box-shadow: 0 -5px 30px rgba(0,0,0,0.2); z-index: 500; padding: 25px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* 쫀득하게 올라오는 애니메이션 */
            opacity: 0; pointer-events: none;
        }
        .region-detail-card.show {
            bottom: 25px; opacity: 1; pointer-events: auto;
        }
        .card-close-btn {
            position: absolute; top: 15px; right: 20px; cursor: pointer;
            color: #adb5bd; font-size: 1.5rem; transition: 0.2s;
        }
        .card-close-btn:hover { color: #333; }
        .card-region-title { font-size: 1.3rem; font-weight: 900; color: #333; margin-bottom: 5px; }
        .card-grade-badge {
            display: inline-block; padding: 5px 12px; border-radius: 20px;
            color: white; font-weight: 800; font-size: 0.8rem; margin-bottom: 15px;
        }
        .card-info-text { font-size: 0.95rem; color: #666; font-weight: 600; margin-bottom: 20px; }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="review-container">
        <div class="container">
            <div class="d-flex justify-content-between align-items-end mb-4">
                <div>
                    <h2 class="page-title mb-1">원룸 후기 목록</h2>
                    <p class="text-muted small mb-0">서울 전역의 실제 거주 후기를 지도로 확인해 보세요.</p>
                </div>
                <div class="btn-group shadow-sm rounded-pill overflow-hidden">
                    <button class="btn btn-white border-end px-3" onclick="handleMapClick()">
                        <i class="bi bi-map me-1"></i>지도로 보기
                    </button>
                    <button class="btn btn-white px-3" onclick="viewSafetyMap()">
                        <i class="bi bi-shield-check me-1 text-success"></i>지역별 안전율
                    </button>
                    <a th:href="@{/review/write}" class="btn btn-orange px-4 fw-bold">
                        <i class="bi bi-pencil-square me-1"></i>리뷰 작성
                    </a>
                </div>
            </div>

            <div id="mapWrapper" class="map-section daedong-shadow">
                <div id="map"></div>
                <div id="mapLoading" class="map-loading" style="display:none;">
                    <div class="spinner-border spinner-orange" role="status"></div>
                    <div class="mt-2 fw-bold text-orange">안전율 데이터를 분석 중입니다...</div>
                </div>

                <div id="regionDetailCard" class="region-detail-card">
                    <i class="bi bi-x-lg card-close-btn" onclick="closeDetailCard()"></i>
                    <div class="card-region-title" id="cardRegionName">지역명</div>
                    <div class="card-grade-badge" id="cardGrade">등급</div>
                    <div class="card-info-text">
                        <i class="bi bi-exclamation-triangle-fill text-warning me-1"></i>
                        해당 지역 범죄 발생: <span id="cardCrimeCount" class="text-dark fw-bold">0건</span>
                    </div>
                    <button id="cardSearchBtn" class="btn btn-dark w-100 rounded-pill fw-bold">
                        이 지역 원룸 후기 보기 <i class="bi bi-arrow-right ms-1"></i>
                    </button>
                </div>
                <div id="safetyLegend" class="map-legend"
                     style="display:none; position:absolute; top:20px; right:20px; z-index:10; background:white; padding:15px; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.1);">
                    <div class="small fw-bold mb-2 border-bottom pb-1">지역 안전 등급</div>
                    <div class="d-flex align-items-center mb-1"><span
                            style="width:10px; height:10px; background:#4CAF50; border-radius:50%; margin-right:8px;"></span>안전
                    </div>
                    <div class="d-flex align-items-center mb-1"><span
                            style="width:10px; height:10px; background:#FFC107; border-radius:50%; margin-right:8px;"></span>보통
                    </div>
                    <div class="d-flex align-items-center"><span
                            style="width:10px; height:10px; background:#FF5722; border-radius:50%; margin-right:8px;"></span>위험
                    </div>
                </div>
            </div>

            <div class="search-card daedong-shadow mb-4">
                <form id="searchForm" th:action="@{/review}" th:method="get">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <select name="searchType" id="searchType" class="form-select rounded-3 form-control">
                                <option value="titleAddress" th:selected="${searchType == 'titleAddress'}">제목+주소
                                </option>
                                <option value="content" th:selected="${searchType == 'content'}">내용</option>
                            </select>
                        </div>
                        <div class="col-md-7">
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0 rounded-start-3"><i
                                        class="bi bi-search text-muted"></i></span>
                                <input type="text" th:value="${keyword}" name="keyword" id="keyword"
                                       class="form-control border-start-0 rounded-end-3" placeholder="검색어를 입력하세요">
                            </div>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-dark w-100 rounded-3 fw-bold form-control">검색하기
                            </button>
                        </div>
                    </div>

                    <div class="mt-3 pt-3 border-top">
                        <div class="d-flex align-items-start mb-2">
                            <span class="filter-label">장점</span>
                            <div class="d-flex flex-wrap">
                                <label th:each="p : ${prosList}" class="checkbox-item">
                                    <input type="checkbox" name="pros" th:value="${p}"
                                           th:checked="${pros != null && pros.contains(p)}">
                                    <span th:text="${p}"></span>
                                </label>
                            </div>
                        </div>
                        <div class="d-flex align-items-start">
                            <span class="filter-label">단점</span>
                            <div class="d-flex flex-wrap">
                                <label th:each="c : ${consList}" class="checkbox-item">
                                    <input type="checkbox" name="cons" th:value="${c}"
                                           th:checked="${cons != null && cons.contains(c)}">
                                    <span th:text="${c}"></span>
                                </label>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <div class="review-table-card daedong-shadow">
                <table class="table mb-0 text-center">
                    <thead>
                    <tr>
                        <th style="width: 45%;">제목</th>
                        <th style="width: 15%;">지역</th>
                        <th style="width: 15%;">평점</th>
                        <th style="width: 25%;">작성일</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="review : ${reviews.content}">
                        <td class="text-start ps-4">
                            <a th:href="@{/review/detail/{id}(id=${review.id})}" class="review-link"
                               th:text="${review.title}"></a>
                        </td>
                        <td>
                            <span class="badge bg-light text-dark fw-normal rounded-pill px-3"
                                  th:text="${review.address != null and review.address.split(' ').length > 1 ? review.address.split(' ')[1] : review.address}"></span>
                        </td>
                        <td>
                            <span class="text-warning fw-bold" th:text="'★ ' + ${review.point}"></span>
                        </td>
                        <td class="text-muted small"
                            th:text="${#temporals.format(review.createdAt, 'yyyy.MM.dd')}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <nav class="pagination-container d-flex justify-content-center">
                <ul class="pagination">
                    <li class="page-item" th:classappend="${reviews.first} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/review(page=${reviews.number-1}, searchType=${searchType}, keyword=${keyword}, pros=${pros}, cons=${cons})}">
                            <i class="bi bi-chevron-left"></i>
                        </a>
                    </li>
                    <li class="page-item" th:each="page: ${#numbers.sequence(0, reviews.totalPages-1)}"
                        th:classappend="${page == reviews.number} ? 'active'">
                        <a class="page-link"
                           th:href="@{/review(page=${page}, searchType=${searchType}, keyword=${keyword}, pros=${pros}, cons=${cons})}"
                           th:text="${page+1}"></a>
                    </li>
                    <li class="page-item" th:classappend="${reviews.last} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/review(page=${reviews.number+1}, searchType=${searchType}, keyword=${keyword}, pros=${pros}, cons=${cons})}">
                            <i class="bi bi-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

    <script th:src="'//dapi.kakao.com/v2/maps/sdk.js?appkey=' + ${@environment.getProperty('kakao.maps.appkey')} + '&libraries=services'"></script>

    <script th:inline="javascript">
        window.allReviews = /*[[${allReviews}]]*/ [];
        let map, geocoder;
        let currentOverlays = [];

        function initMap() {
            const mapWrapper = document.getElementById('mapWrapper');
            mapWrapper.style.display = 'block';

            if (!map) {
                const mapContainer = document.getElementById('map');
                geocoder = new kakao.maps.services.Geocoder();
                map = new kakao.maps.Map(mapContainer, {
                    center: new kakao.maps.LatLng(37.566826, 126.9786567),
                    level: 8
                });
            } else {
                setTimeout(() => { map.relayout(); map.setCenter(new kakao.maps.LatLng(37.566826, 126.9786567)); }, 100);
            }
        }

        function clearOverlays() {
            currentOverlays.forEach(overlay => overlay.setMap(null));
            currentOverlays = [];
            closeDetailCard(); // 지도 초기화할 때 팝업도 같이 닫기
        }

        // 팝업 카드 닫기 함수
        function closeDetailCard() {
            const card = document.getElementById('regionDetailCard');
            if(card) card.classList.remove('show');
        }

        function handleMapClick() {
            initMap();
            document.getElementById('safetyLegend').style.display = 'none';
            clearOverlays();
            displayReviewMarkers();
        }

        // --- ★ 프리미엄 모드: 반응형 팝업 & 스무스 패닝 ---
        function viewSafetyMap() {
            initMap();
            document.getElementById('safetyLegend').style.display = 'block';
            clearOverlays();

            const loading = document.getElementById('mapLoading');
            if(loading) loading.style.display = 'flex';

            fetch('/review/safety-map')
                .then(res => res.json())
                .then(data => {
                    if(loading) loading.style.display = 'none';

                    data.forEach(stat => {
                        if (stat.lat > 0) {
                            let gradeClass = stat.grade === 'SAFE' ? 'grade-safe' : (stat.grade === 'NORMAL' ? 'grade-normal' : 'grade-danger');
                            let pulseColor = stat.grade === 'SAFE' ? 'rgba(76,175,80,0.6)' : (stat.grade === 'NORMAL' ? 'rgba(255,193,7,0.6)' : 'rgba(255,87,34,0.6)');

                            // HTML 문자열 대신 실제 DOM 요소를 만들어야 onClick 이벤트를 달 수 있습니다!
                            let contentElement = document.createElement('div');
                            contentElement.className = `premium-badge ${gradeClass}`;
                            contentElement.style.setProperty('--pulse-color', pulseColor);
                            contentElement.innerHTML = `<div class="status-dot"></div><span>${stat.region}</span>`;

                            // 🎯 [핵심] 마커 클릭 시 발생하는 액션!
                            contentElement.onclick = function() {
                                // 1. 스무스 패닝 (카메라 부드럽게 이동)
                                let moveLatLon = new kakao.maps.LatLng(stat.lat, stat.lng);
                                map.panTo(moveLatLon);

                                // 2. 팝업 카드 정보 업데이트
                                document.getElementById('cardRegionName').innerText = stat.region;

                                let gradeText = stat.grade === 'SAFE' ? '안전 (상위권)' : (stat.grade === 'NORMAL' ? '보통 (중위권)' : '위험 (하위권)');
                                let gradeColor = stat.grade === 'SAFE' ? '#4CAF50' : (stat.grade === 'NORMAL' ? '#FFC107' : '#FF5722');

                                const badgeLabel = document.getElementById('cardGrade');
                                badgeLabel.innerText = gradeText;
                                badgeLabel.style.backgroundColor = gradeColor;

                                document.getElementById('cardCrimeCount').innerText = stat.crimeCount + "건";

                                // 3. 팝업 카드 버튼에 '검색 연동' 기능 달기
                                document.getElementById('cardSearchBtn').onclick = function() {
                                    document.getElementById('searchType').value = 'titleAddress';
                                    document.getElementById('keyword').value = stat.region;
                                    document.getElementById('searchForm').submit();
                                };

                                // 4. 팝업 카드 스르륵 띄우기
                                document.getElementById('regionDetailCard').classList.add('show');
                            };

                            let overlay = new kakao.maps.CustomOverlay({
                                position: new kakao.maps.LatLng(stat.lat, stat.lng),
                                content: contentElement, // 생성한 DOM 요소 넣기
                                yAnchor: 0.5
                            });

                            overlay.setMap(map);
                            currentOverlays.push(overlay);
                        }
                    });
                })
                .catch(err => {
                    if(loading) loading.style.display = 'none';
                    console.error(err);
                    alert("데이터를 불러오는 중 오류가 발생했습니다.");
                });
        }

        // --- 일반 리뷰 건수 마커 (기존 유지) ---
        function displayReviewMarkers() {
            if (!map || !geocoder) return;

            const selectedPros = Array.from(document.querySelectorAll('input[name="pros"]:checked')).map(i => i.value);
            const selectedCons = Array.from(document.querySelectorAll('input[name="cons"]:checked')).map(i => i.value);
            const reviewsByGu = {};
            const reviews = window.allReviews || [];

            reviews.forEach(review => {
                const address = review.address;
                const pros = review.pros ? review.pros.split(',') : [];
                const cons = review.cons ? review.cons.split(',') : [];

                if (!selectedPros.every(p => pros.includes(p)) || !selectedCons.every(c => cons.includes(c))) return;
                if (!address) return;

                const guMatch = address.match(/([가-힣]+구)/);
                if (!guMatch) return;

                const gu = guMatch[1];
                if (!reviewsByGu[gu]) reviewsByGu[gu] = [];
                reviewsByGu[gu].push(address);
            });

            const bounds = new kakao.maps.LatLngBounds();
            const guKeys = Object.keys(reviewsByGu);
            if (guKeys.length === 0) return;

            guKeys.forEach(gu => {
                const firstAddress = gu;
                geocoder.addressSearch(firstAddress, function(result, status) {
                    if (status === kakao.maps.services.Status.OK) {
                        const coords = new kakao.maps.LatLng(result[0].y, result[0].x);

                        const content = document.createElement('div');
                        content.className = 'review-pin';
                        content.innerHTML = `${gu} <span style="opacity:0.8; font-size:0.8rem;">${reviewsByGu[gu].length}건</span>`;

                        content.onclick = function() {
                            document.getElementById('searchType').value = 'titleAddress';
                            document.getElementById('keyword').value = gu;
                            document.getElementById('searchForm').submit();
                        };

                        const overlay = new kakao.maps.CustomOverlay({
                            map: map, position: coords, content: content, yAnchor: 1
                        });

                        overlay.setMap(map);
                        currentOverlays.push(overlay);

                        bounds.extend(coords);
                        map.setBounds(bounds);
                    }
                });
            });
        }
    </script>
</div>
</html>
