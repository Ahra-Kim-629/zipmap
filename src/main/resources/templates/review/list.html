<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<th:block layout:fragment="css">
    <style>
        .review-container { padding: 40px 0; background-color: #fdfcf9; }
        .page-title { font-weight: 800; color: #3E362E; }

        .map-section { position: relative; width: 100%; height: 500px; border-radius: 15px; overflow: hidden; display: none; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #map { width: 100%; height: 100%; }

        .search-card { background: white; padding: 25px; border-radius: 15px; border: none; }
        .filter-label { font-size: 0.85rem; font-weight: 700; color: #666; margin-right: 15px; min-width: 40px; display: inline-block; }
        .checkbox-item { margin-right: 12px; cursor: pointer; font-size: 0.9rem; }
        .checkbox-item input { accent-color: var(--main-orange); margin-right: 4px; }

        .review-table-card { background: white; border-radius: 15px; overflow: hidden; border: none; }
        .table thead { background-color: #f8f9fa; border-bottom: 2px solid #eee; }
        .table th { font-weight: 700; color: #555; font-size: 0.9rem; border: none; padding: 15px; }
        .table td { vertical-align: middle; padding: 15px; font-size: 0.95rem; border-bottom: 1px solid #f1f1f1; }
        .review-link { text-decoration: none; color: #333; font-weight: 600; transition: 0.2s; }
        .review-link:hover { color: var(--main-orange); }

        .pagination-container { margin-top: 40px; }
        .page-link { color: #555; border: none; margin: 0 3px; border-radius: 8px !important; transition: 0.2s; }
        .page-item.active .page-link { background-color: var(--main-orange); border-color: var(--main-orange); color: white; }
        .page-link:hover:not(.active) { background-color: #eee; }

        /* =========================================================
           🌟 1. 로딩 스피너 및 안전율 배지
           ========================================================= */
        .map-loading { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:999; display:flex; justify-content:center; align-items:center; flex-direction:column; }
        .spinner-orange { width: 3rem; height: 3rem; color: var(--main-orange); }

        .premium-badge {
            display: flex; align-items: center; padding: 8px 16px;
            background: rgba(255, 255, 255, 0.95); border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            font-size: 0.9rem; font-weight: 800; color: #333;
            border: 2px solid transparent; transition: all 0.3s ease; cursor: pointer;
        }
        .premium-badge:hover { transform: translateY(-5px); z-index: 100; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }

        .status-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; animation: pulse-dot 1.5s infinite; }
        .grade-safe { border-color: rgba(76, 175, 80, 0.5); }
        .grade-safe .status-dot { background: #4CAF50; box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); }
        .grade-normal { border-color: rgba(255, 193, 7, 0.5); }
        .grade-normal .status-dot { background: #FFC107; box-shadow: 0 0 0 0 rgba(255, 193, 7, 0.7); }
        .grade-danger { border-color: rgba(255, 87, 34, 0.5); }
        .grade-danger .status-dot { background: #FF5722; box-shadow: 0 0 0 0 rgba(255, 87, 34, 0.7); }

        @keyframes pulse-dot {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 var(--pulse-color); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0,0,0,0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0,0,0,0); }
        }

        /* =========================================================
           🌟 2. 팝업 카드 (바텀 시트)
           ========================================================= */
        .region-detail-card {
            position: absolute; bottom: -150px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 350px; background: white; border-radius: 20px;
            box-shadow: 0 -5px 30px rgba(0,0,0,0.2); z-index: 500; padding: 25px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; pointer-events: none;
        }
        .region-detail-card.show { bottom: 25px; opacity: 1; pointer-events: auto; }
        .card-close-btn { position: absolute; top: 15px; right: 20px; cursor: pointer; color: #adb5bd; font-size: 1.5rem; transition: 0.2s; }
        .card-close-btn:hover { color: #333; }
        .card-region-title { font-size: 1.3rem; font-weight: 900; color: #333; margin-bottom: 5px; }
        .card-grade-badge { display: inline-block; padding: 5px 12px; border-radius: 20px; color: white; font-weight: 800; font-size: 0.8rem; margin-bottom: 15px; }
        .card-info-text { font-size: 0.95rem; color: #666; font-weight: 600; margin-bottom: 20px; }

        /* =========================================================
           👑 3. 리뷰 마커 디자인
           ========================================================= */
        .review-pin {
            background: #ffffff;
            color: #333333;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.8rem;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.12);
            position: relative; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 10;
            text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 2px solid var(--main-orange);
        }
        .review-pin:hover { transform: scale(1.1) rotate(-3deg); z-index: 20; }
        .review-pin::after {
            content: ''; position: absolute; bottom: -6px; left: 50%;
            transform: translateX(-50%);
            border-width: 6px 6px 0; border-style: solid;
            border-color: var(--main-orange) transparent transparent transparent;
        }

        .top-pro-badge {
            margin-top: 2px; font-size: 0.65rem; font-weight: 700;
            color: white;
            background: var(--main-orange);
            border-radius: 10px;
            padding: 2px 6px; display: inline-block;
        }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="review-container">
        <div class="container">
            <div class="d-flex justify-content-between align-items-end mb-4">
                <div>
                    <h2 class="page-title mb-1">원룸 후기 목록</h2>
                    <p class="text-muted small mb-0">서울 전역의 실제 거주 후기를 지도로 확인해 보세요.</p>
                </div>
                <div class="btn-group shadow-sm rounded-pill overflow-hidden">
                    <button type="button" class="btn btn-white border-end px-3" onclick="handleMapClick()">
                        <i class="bi bi-map me-1 text-info"></i>리뷰 지도 보기
                    </button>
                    <button type="button" class="btn btn-white px-3" onclick="viewSafetyMap()">
                        <i class="bi bi-shield-check me-1 text-success"></i>지역별 안전율
                    </button>
                    <a th:href="@{/review/write}" class="btn btn-orange px-4 fw-bold">
                        <i class="bi bi-pencil-square me-1"></i>리뷰 작성
                    </a>
                </div>
            </div>

            <div id="mapWrapper" class="map-section daedong-shadow">
                <div id="map"></div>
                <div id="mapLoading" class="map-loading" style="display:none;">
                    <div class="spinner-border spinner-orange" role="status"></div>
                    <div class="mt-2 fw-bold text-orange">데이터를 분석 중입니다...</div>
                </div>

                <div id="regionDetailCard" class="region-detail-card">
                    <i class="bi bi-x-lg card-close-btn" onclick="closeDetailCard()"></i>
                    <div class="card-region-title" id="cardRegionName">지역명</div>
                    <div class="card-grade-badge" id="cardGrade">등급</div>
                    <div class="card-info-text">
                        <i class="bi bi-exclamation-triangle-fill text-warning me-1"></i>
                        해당 지역 범죄 발생: <span id="cardCrimeCount" class="text-dark fw-bold">0건</span>
                    </div>
                    <button id="cardSearchBtn" class="btn btn-dark w-100 rounded-pill fw-bold">
                        이 지역 원룸 후기 보기 <i class="bi bi-arrow-right ms-1"></i>
                    </button>
                </div>

                <div id="safetyLegend" class="map-legend" style="display:none; position:absolute; top:20px; right:20px; z-index:10; background:white; padding:15px; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.1);">
                    <div class="small fw-bold mb-2 border-bottom pb-1">지역 안전 등급</div>
                    <div class="d-flex align-items-center mb-1"><span style="width:10px; height:10px; background:#4CAF50; border-radius:50%; margin-right:8px;"></span>안전</div>
                    <div class="d-flex align-items-center mb-1"><span style="width:10px; height:10px; background:#FFC107; border-radius:50%; margin-right:8px;"></span>보통</div>
                    <div class="d-flex align-items-center"><span style="width:10px; height:10px; background:#FF5722; border-radius:50%; margin-right:8px;"></span>위험</div>
                </div>
            </div>

            <div class="search-card daedong-shadow mb-4">
                <form id="searchForm" th:action="@{/review}" th:method="get">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <select name="searchType" id="searchType" class="form-select rounded-3 form-control">
                                <option value="titleAddress" th:selected="${searchType == 'titleAddress'}">제목+주소</option>
                                <option value="content" th:selected="${searchType == 'content'}">내용</option>
                            </select>
                        </div>
                        <div class="col-md-7">
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0 rounded-start-3"><i class="bi bi-search text-muted"></i></span>
                                <input type="text" th:value="${keyword}" name="keyword" id="keyword" class="form-control border-start-0 rounded-end-3" placeholder="검색어를 입력하세요">
                            </div>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-dark w-100 rounded-3 fw-bold form-control">검색하기</button>
                        </div>
                    </div>

                    <!-- 알림받기 버튼 -->
                    <div th:if="${keyword != null and keyword != ''}">
                        <div th:if="${!isSubscribed}" id="alertSettingArea">
                            <p> 찾으시는 키워드 '[[${keyword}]]'에 대한 새 리뷰 알림을 받으시겠어요? </p>
                            <button type="button" id="btnSaveKeyword" class="btn btn-primary">알림 받기</button>
                        </div>

                        <div th:if="${isSubscribed}" id="alreadySubscribed" style="display: block !important;">
                            <span class="badge badge-success" style="background-color: green; color: white; padding: 5px;">
                                '[[${keyword}]]'는 알림 설정되어 있습니다.
                            </span>
                        </div>
                    </div>


                    <div class="mt-3 pt-3 border-top">
                        <div class="d-flex align-items-start mb-2">
                            <span class="filter-label">장점</span>
                            <div class="d-flex flex-wrap">
                                <label th:each="p : ${prosList}" class="checkbox-item">
                                    <input type="checkbox" name="pros" th:value="${p}" th:checked="${pros != null && pros.contains(p)}">
                                    <span th:text="${p}"></span>
                                </label>
                            </div>
                        </div>
                        <div class="d-flex align-items-start">
                            <span class="filter-label">단점</span>
                            <div class="d-flex flex-wrap">
                                <label th:each="c : ${consList}" class="checkbox-item">
                                    <input type="checkbox" name="cons" th:value="${c}" th:checked="${cons != null && cons.contains(c)}">
                                    <span th:text="${c}"></span>
                                </label>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <div class="review-table-card daedong-shadow">
                <table class="table mb-0 text-center">
                    <thead>
                    <tr>
                        <th style="width: 45%;">제목</th>
                        <th style="width: 15%;">지역</th>
                        <th style="width: 15%;">평점</th>
                        <th style="width: 25%;">작성일</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="review : ${reviews.content}">
                        <td class="text-start ps-4">
                            <a th:href="@{/review/detail/{id}(id=${review.id})}" class="review-link" th:text="${review.title}"></a>
                        </td>
                        <td>
                            <span class="badge bg-light text-dark fw-normal rounded-pill px-3" th:text="${review.address != null and review.address.split(' ').length > 1 ? review.address.split(' ')[1] : review.address}"></span>
                        </td>
                        <td>
                            <span class="text-warning fw-bold" th:text="'★ ' + ${review.point}"></span>
                        </td>
                        <td class="text-muted small" th:text="${#temporals.format(review.createdAt, 'yyyy.MM.dd')}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <nav class="pagination-container d-flex justify-content-center">
                <ul class="pagination">
                    <li class="page-item" th:classappend="${reviews.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/review(page=${reviews.number-1}, searchType=${searchType}, keyword=${keyword}, pros=${pros}, cons=${cons})}"><i class="bi bi-chevron-left"></i></a>
                    </li>
                    <li class="page-item" th:each="page: ${#numbers.sequence(0, reviews.totalPages-1)}" th:classappend="${page == reviews.number} ? 'active'">
                        <a class="page-link" th:href="@{/review(page=${page}, searchType=${searchType}, keyword=${keyword}, pros=${pros}, cons=${cons})}" th:text="${page+1}"></a>
                    </li>
                    <li class="page-item" th:classappend="${reviews.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/review(page=${reviews.number+1}, searchType=${searchType}, keyword=${keyword}, pros=${pros}, cons=${cons})}"><i class="bi bi-chevron-right"></i></a>
                    </li>
                </ul>
            </nav>
        </div>

        <script th:src="'//dapi.kakao.com/v2/maps/sdk.js?appkey=' + ${@environment.getProperty('kakao.maps.appkey')} + '&libraries=services'"></script>

        <script th:inline="javascript">
            window.allReviews = /*[[${allReviews}]]*/ [];
             let map, geocoder;
             let currentOverlays = [];
             let activeSafetyCircle = null;

             // ★ 최적화 1: 서울 25개 구 좌표 사전 등록 (카카오 서버 통신 딜레이 100% 제거!)
             const SEOUL_COORDS = {
                 "강남구": {lat: 37.5172, lng: 127.0473}, "강동구": {lat: 37.5301, lng: 127.1238},
                 "강북구": {lat: 37.6396, lng: 127.0257}, "강서구": {lat: 37.5509, lng: 126.8497},
                 "관악구": {lat: 37.4784, lng: 126.9516}, "광진구": {lat: 37.5385, lng: 127.0822},
                 "구로구": {lat: 37.4954, lng: 126.8874}, "금천구": {lat: 37.4565, lng: 126.8954},
                 "노원구": {lat: 37.6542, lng: 127.0568}, "도봉구": {lat: 37.6688, lng: 127.0471},
                 "동대문구": {lat: 37.5744, lng: 127.0400}, "동작구": {lat: 37.5124, lng: 126.9393},
                 "마포구": {lat: 37.5665, lng: 126.9018}, "서대문구": {lat: 37.5791, lng: 126.9368},
                 "서초구": {lat: 37.4837, lng: 127.0324}, "성동구": {lat: 37.5633, lng: 127.0371},
                 "성북구": {lat: 37.5891, lng: 127.0182}, "송파구": {lat: 37.5145, lng: 127.1066},
                 "양천구": {lat: 37.5169, lng: 126.8660}, "영등포구": {lat: 37.5263, lng: 126.8962},
                 "용산구": {lat: 37.5326, lng: 126.9900}, "은평구": {lat: 37.6027, lng: 126.9291},
                 "종로구": {lat: 37.5729, lng: 126.9796}, "중구": {lat: 37.5641, lng: 126.9970},
                 "중랑구": {lat: 37.6063, lng: 127.0926}
             };

             document.addEventListener("DOMContentLoaded", function() {
                 const urlParams = new URLSearchParams(window.location.search);
                 if (urlParams.get('mapOpen') === 'true') {
                     window.history.replaceState({}, document.title, "/review");
                     // 딜레이를 300ms에서 50ms로 확 줄였습니다!
                     setTimeout(() => {
                         initMap();
                         document.getElementById('safetyLegend').style.display = 'none';
                         clearOverlays();
                         displayReviewMarkers();
                     }, 50);
                 }
             });

             function initMap() {
                 const mapWrapper = document.getElementById('mapWrapper');
                 mapWrapper.style.display = 'block';

                 if (!map) {
                     const mapContainer = document.getElementById('map');
                     // geocoder는 이제 안전율 지도에서만 가끔 씁니다.
                     geocoder = new kakao.maps.services.Geocoder();
                     map = new kakao.maps.Map(mapContainer, {
                         center: new kakao.maps.LatLng(37.566826, 126.9786567),
                         level: 8
                     });
                 } else {
                     setTimeout(() => {
                         map.relayout();
                         map.setCenter(new kakao.maps.LatLng(37.566826, 126.9786567));
                         map.setLevel(8);
                     }, 50);
                 }
             }

             function clearOverlays() {
                 currentOverlays.forEach(overlay => overlay.setMap(null));
                 currentOverlays = [];
                 if(activeSafetyCircle) { activeSafetyCircle.setMap(null); activeSafetyCircle = null; }
                 closeDetailCard();
             }

             function closeDetailCard() {
                 const card = document.getElementById('regionDetailCard');
                 if(card) card.classList.remove('show');
                 if(activeSafetyCircle) { activeSafetyCircle.setMap(null); activeSafetyCircle = null; }
             }

             // --- 1. 리뷰 지도 보기 ---
             function handleMapClick() {
                 const urlParams = new URLSearchParams(window.location.search);

                 // ★ 최적화 2: 새로고침 전에 즉시 지도를 열고 로딩창을 띄워 화면 멈춤 방지
                 if (urlParams.has('keyword') || urlParams.has('pros') || urlParams.has('cons')) {
                     document.getElementById('mapWrapper').style.display = 'block';
                     document.getElementById('mapLoading').style.display = 'flex';
                     location.href = '/review?mapOpen=true';
                     return;
                 }

                 initMap();
                 document.getElementById('safetyLegend').style.display = 'none';
                 clearOverlays();
                 displayReviewMarkers();
             }

             // --- 2. 지역별 안전율 보기 ---
             function viewSafetyMap() {
                 initMap();
                 document.getElementById('safetyLegend').style.display = 'block';
                 clearOverlays();

                 const loading = document.getElementById('mapLoading');
                 if(loading) loading.style.display = 'flex';

                 fetch('/review/safety-map')
                     .then(res => res.json())
                     .then(data => {
                         if(loading) loading.style.display = 'none';

                         data.forEach(stat => {
                             if (stat.lat > 0) {
                                 let gradeClass = stat.grade === 'SAFE' ? 'grade-safe' : (stat.grade === 'NORMAL' ? 'grade-normal' : 'grade-danger');
                                 let pulseColor = stat.grade === 'SAFE' ? 'rgba(76,175,80,0.6)' : (stat.grade === 'NORMAL' ? 'rgba(255,193,7,0.6)' : 'rgba(255,87,34,0.6)');
                                 let circleColor = stat.grade === 'SAFE' ? '#4CAF50' : (stat.grade === 'NORMAL' ? '#FFC107' : '#FF5722');

                                 let contentElement = document.createElement('div');
                                 contentElement.className = `premium-badge ${gradeClass}`;
                                 contentElement.style.setProperty('--pulse-color', pulseColor);
                                 contentElement.innerHTML = `<div class="status-dot"></div><span>${stat.region}</span>`;

                                 contentElement.onclick = function() {
                                     let moveLatLon = new kakao.maps.LatLng(stat.lat, stat.lng);
                                     map.panTo(moveLatLon);

                                     if(activeSafetyCircle) activeSafetyCircle.setMap(null);
                                     activeSafetyCircle = new kakao.maps.Circle({
                                         center: moveLatLon, radius: 2500,
                                         strokeWeight: 2, strokeColor: circleColor, strokeOpacity: 0.8,
                                         fillColor: circleColor, fillOpacity: 0.2
                                     });
                                     activeSafetyCircle.setMap(map);

                                     document.getElementById('cardRegionName').innerText = stat.region;
                                     let gradeText = stat.grade === 'SAFE' ? '안전 (상위권)' : (stat.grade === 'NORMAL' ? '보통 (중위권)' : '위험 (하위권)');

                                     const badgeLabel = document.getElementById('cardGrade');
                                     badgeLabel.innerText = gradeText;
                                     badgeLabel.style.backgroundColor = circleColor;

                                     document.getElementById('cardCrimeCount').innerText = stat.crimeCount + "건";

                                     document.getElementById('cardSearchBtn').onclick = function() {
                                         document.getElementById('searchType').value = 'titleAddress';
                                         document.getElementById('keyword').value = stat.region;
                                         document.getElementById('searchForm').submit();
                                     };

                                     document.getElementById('regionDetailCard').classList.add('show');
                                 };

                                 let overlay = new kakao.maps.CustomOverlay({
                                     position: new kakao.maps.LatLng(stat.lat, stat.lng),
                                     content: contentElement, yAnchor: 0.5
                                 });

                                 overlay.setMap(map);
                                 currentOverlays.push(overlay);
                             }
                         });
                     })
                     .catch(err => {
                         if(loading) loading.style.display = 'none';
                         alert("데이터를 불러오는 중 오류가 발생했습니다.");
                     });
             }

             // --- 3. 리뷰 마커 보기 (★ 비동기 딜레이 완전 제거!) ---
             function displayReviewMarkers() {
                 if (!map) return;

                 const selectedPros = Array.from(document.querySelectorAll('input[name="pros"]:checked')).map(i => i.value);
                 const selectedCons = Array.from(document.querySelectorAll('input[name="cons"]:checked')).map(i => i.value);
                 const reviewsByGu = {};
                 const reviews = window.allReviews || [];

                 const proTextMap = {
                     "채광": "☀️ 채광맛집", "난방": "♨️ 난방빵빵", "배수": "🌊 배수원활",
                     "온수": "🚿 온수콸콸", "수압": "💦 수압최고", "곰팡이": "✨ 곰팡이없음",
                     "해충": "🚫 벌레청정", "소음": "🔇 방음우수", "치안": "👮 안전제일", "집주인": "🤝 좋은집주인"
                 };

                 reviews.forEach(review => {
                     const address = review.address;
                     const pros = review.prosStr ? review.prosStr.split(',') : [];

                     if (!selectedPros.every(p => pros.includes(p)) || !selectedCons.every(c => cons.includes(c))) return;
                     if (!address) return;

                     const guMatch = address.match(/([가-힣]+구)/);
                     if (!guMatch) return;

                     const gu = guMatch[1];
                     if (!reviewsByGu[gu]) reviewsByGu[gu] = { count: 0, totalPoint: 0, prosCount: {} };

                     reviewsByGu[gu].count += 1;
                     reviewsByGu[gu].totalPoint += review.point;

                     pros.forEach(p => {
                         let trimmedPro = p.trim();
                         if (trimmedPro) {
                             reviewsByGu[gu].prosCount[trimmedPro] = (reviewsByGu[gu].prosCount[trimmedPro] || 0) + 1;
                         }
                     });
                 });

                 const bounds = new kakao.maps.LatLngBounds();
                 const guKeys = Object.keys(reviewsByGu);
                 if (guKeys.length === 0) return;

                 // ★ 기존의 느렸던 geocoder.addressSearch를 지우고, SEOUL_COORDS를 사용해 즉시 그림!
                 guKeys.forEach(gu => {
                     if(!SEOUL_COORDS[gu]) return; // 만약 매핑 안 된 구가 있다면 스킵

                     const coords = new kakao.maps.LatLng(SEOUL_COORDS[gu].lat, SEOUL_COORDS[gu].lng);
                     const guData = reviewsByGu[gu];
                     const avgPoint = (guData.totalPoint / guData.count).toFixed(1);

                     let topPro = "";
                     let maxCount = 0;
                     for (const [proName, count] of Object.entries(guData.prosCount)) {
                         if (count > maxCount) {
                             maxCount = count;
                             topPro = proName;
                         }
                     }

                     const pinHtml = document.createElement('div');
                     pinHtml.className = 'review-pin';

                     let innerHTML = `<div>${gu} <span style="opacity:0.9; font-size:0.8rem; border-left:1px solid rgba(255,255,255,0.4); padding-left:5px; margin-left:3px;">⭐${avgPoint} (${guData.count})</span></div>`;

                     if (topPro) {
                         let displayProText = proTextMap[topPro] || `👍 ${topPro} 우수`;
                         innerHTML += `<div class="top-pro-badge">${displayProText}</div>`;
                     }

                     pinHtml.innerHTML = innerHTML;

                     pinHtml.onclick = function() {
                         document.getElementById('searchType').value = 'titleAddress';
                         document.getElementById('keyword').value = gu;
                         document.getElementById('searchForm').submit();
                     };

                     const pinOverlay = new kakao.maps.CustomOverlay({
                         map: map, position: coords, content: pinHtml, yAnchor: 1, zIndex: 10
                     });

                     currentOverlays.push(pinOverlay);
                     bounds.extend(coords);
                 });

                 // 지도 확대 비율 조정
                 if (guKeys.length === 1) {
                     map.setCenter(new kakao.maps.LatLng(SEOUL_COORDS[guKeys[0]].lat, SEOUL_COORDS[guKeys[0]].lng));
                     map.setLevel(5);
                 } else {
                     map.setBounds(bounds);
                 }
             }

    $(document).ready(function() {

        // 페이지 로드 시 알림 버튼 표시 여부 결정
        function checkSearchFilters() {
            let keywords = [];

            // 검색어(id="keyword") 가져오기
            let searchText = $('#keyword').val() ? $('#keyword').val().trim() : "";
            if(searchText) keywords.push(searchText);

            // 체크박스(name="pros", name="cons") 가져오기
            $('input[name="pros"]:checked, input[name="cons"]:checked').each(function() {
                keywords.push($(this).val());
            });

            // 키워드가 하나라도 있다면 알림 설정 영역 표시
            if(keywords.length > 0 && $('#alertSettingArea').length > 0) {
                $('#appliedKeywords').text(keywords.join(", "));
                $('#alertSettingArea').show(); // 새로고침 후에는 바로 보이게 show()
            }
        }

        // 페이지가 열리자마자 바로 실행
        checkSearchFilters();

        // 알림 받기 버튼 클릭 시 서버로 전송
        $('#btnSaveKeyword').on('click', function() {
            let keywordList = [];

            // 현재 입력/체크된 값들 다시 수집
            let searchText = $('#keyword').val().trim();
            if(searchText) keywordList.push(searchText);

            $('input[name="pros"]:checked, input[name="cons"]:checked').each(function() {
                keywordList.push($(this).val());
            });

            let uniqueKeywords = [...new Set(keywordList)];

            // 로그인 사용자 확인 (타임리프 문법)
            let loginUserId = /*[[${#authentication.principal != 'anonymousUser' ? #authentication.principal.id : null}]]*/ null;

            if (!loginUserId) {
                alert("로그인 후 이용 가능한 서비스입니다.");
                return;
            }

            // AJAX 전송
            $.ajax({
                url: '/subscription/save',
                type: 'POST',
                contentType: 'application/json',
                beforeSend: function(xhr) {
                    const token = $("meta[name='_csrf']").attr("content");
                    const header = $("meta[name='_csrf_header']").attr("content");
                    if (token && header) {
                        xhr.setRequestHeader(header, token);
                    }
                },
                data: JSON.stringify({
                    userId: loginUserId,
                    keywords: uniqueKeywords,
                    targetType: 'review'
                }),
                success: function(response) {
                    alert("알림 설정이 완료되었습니다!");
                    // 버튼 영역 찾기
                    const area = $('#alertSettingArea');
                    // 영역 내용 변환
                    area.html('<span class="badge badge-success">이미 구독 중인 키워드입니다!</span>');
                    area.fadeIn();
                }
            });
        });
    });
