<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <title>리뷰 목록</title>

    <!-- CSS: 테이블, 검색, 체크박스, 지도 -->
    <style>
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f2f2f2; }
        .pagination { margin-top: 20px; text-align: center; }
        .pagination a, .pagination strong { margin: 0 5px; text-decoration: none; color: black; }
        .pagination strong { font-weight: bold; color: red; }
        .search-container { margin-bottom: 20px; border: 1px solid #ddd; padding: 15px; border-radius: 5px; }
        .checkbox-group { margin: 5px 0; }
        .checkbox-group label { margin-right: 10px; }
        #map { width: 100%; height: 400px; margin-bottom: 20px; border: 1px solid #ddd; }
    </style>

    <!-- 카카오 지도 SDK: key secret properties 사용 -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        var kakaoKey = /*[[${@environment.getProperty('kakao.api.key')}]]*/ 'DEFAULT_KEY';
        var baseUrl = /*[[${@environment.getProperty('app.url')}]]*/ 'http://localhost:8080';
        /*]]>*/
    </script>
    <script th:src="@{'//dapi.kakao.com/v2/maps/sdk.js?appkey=' + ${kakaoKey} + '&libraries=services'}"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

<h1>리뷰 목록</h1>

<div style="margin-bottom: 10px;">
    <a th:href="@{/review/write}">[리뷰 등록]</a>
    <button type="button" onclick="handleMapClick()">[리뷰 지도 보기]</button>
    <button type="button" onclick="handleSafetyMapClick()">[지역 안전율 보기]</button>
</div>

<div id="map" style="display:none;"></div>

<!-- 검색 폼 -->
<form id="searchForm" th:action="@{/review}" th:method="get" class="search-container">
    <div>
        <select name="searchType" id="searchType">
            <option value="titleAddress" th:selected="${searchType == 'titleAddress'}">제목+주소</option>
            <option value="content" th:selected="${searchType == 'content'}">내용</option>
        </select>
        <input type="text" name="keyword" id="keyword" th:value="${keyword != null ? keyword : ''}" placeholder="검색어 입력">
        <button type="submit">검색</button>
    </div>

    <div class="checkbox-group">
        <span>장점:</span>
        <label th:each="p : ${prosList != null ? prosList : {}}">
            <input type="checkbox" name="pros" th:value="${p}" th:checked="${pros != null && pros.contains(p)}">
            <span th:text="${p}"></span>
        </label>
    </div>

    <div class="checkbox-group">
        <span>단점:</span>
        <label th:each="c : ${consList != null ? consList : {}}">
            <input type="checkbox" name="cons" th:value="${c}" th:checked="${cons != null && cons.contains(c)}">
            <span th:text="${c}"></span>
        </label>
    </div>
</form>

<!-- 리뷰 테이블 -->
<table>
    <colgroup>
        <col style="width: 40%">
        <col style="width: 20%">
        <col style="width: 15%">
        <col style="width: 10%">
        <col style="width: 15%">
    </colgroup>
    <thead>
    <tr>
        <th>제목</th>
        <th>주소</th>
        <th>작성자 ID</th>
        <th>평점</th>
        <th>작성일</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="review : ${reviews != null ? reviews.content : {}}"
        class="review-item"
        th:data-address="${review.address != null ? review.address : ''}"
        th:data-title="${review.title}"
        th:data-pros="${review.prosList != null ? #strings.arrayJoin(review.prosList, ',') : ''}"
        th:data-cons="${review.consList != null ? #strings.arrayJoin(review.consList, ',') : ''}">

        <td style="text-align: left;">
            <a th:href="@{/review/detail(id=${review.id})}" th:text="${review.title}"></a>
        </td>
        <td th:text="${review.address != null && review.address.contains('동 ') ? review.address.substring(0, review.address.indexOf('동 ') + 1) : review.address}"></td>
        <td th:text="${review.loginId}"></td>
        <td th:text="${review.point}"></td>
        <td th:text="${review.createdAt != null ? #temporals.format(review.createdAt, 'yyyy-MM-dd HH:mm:ss') : ''}"></td>
    </tr>
    </tbody>
</table>

<div class="pagination" th:if="${reviews != null && reviews.totalPages > 0}">
    <span th:each="page: ${#numbers.sequence(0, reviews.totalPages-1)}">
        <a th:if="${page != reviews.number}" th:href="@{/review(page=${page}, searchType=${searchType != null ? searchType : 'titleAddress'}, keyword=${keyword != null ? keyword : ''})}" th:text="${page+1}"></a>
        <strong th:if="${page == reviews.number}" th:text="${page+1}"></strong>
    </span>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    window.allReviews = /*[[${#objects.toJson(allReviews != null ? allReviews : [])}]]*/ [];
    /*]]>*/
</script>

<script>
    let map, geocoder, markers = [];
    let safetyMap, safetyMarkers = [];

    // 리뷰 지도 버튼
    function handleMapClick() { toggleMap(); }
    // 안전율 지도 버튼
    function handleSafetyMapClick() { toggleSafetyMap(); }

    // 리뷰 지도
    function toggleMap() {
        const mapContainer = document.getElementById('map');
        mapContainer.style.display = 'block';
        setTimeout(() => {
            if (!map) {
                geocoder = new kakao.maps.services.Geocoder();
                map = new kakao.maps.Map(mapContainer, {
                    center: new kakao.maps.LatLng(37.566826, 126.9786567),
                    level: 7
                });
            }
            displayReviewMarkers();
        }, 100);
    }

    function displayReviewMarkers() {
        if (!map || !geocoder) return;
        markers.forEach(m => m.setMap(null));
        markers = [];

        const reviews = window.allReviews || [];
        const bounds = new kakao.maps.LatLngBounds();

        reviews.forEach(review => {
            const address = review.address;
            if (!address) return;
            const guMatch = address.match(/([가-힣]+구)/);
            if (!guMatch) return;
            const gu = guMatch[1];

            geocoder.addressSearch(gu, function(result, status) {
                if (status === kakao.maps.services.Status.OK) {
                    const coords = new kakao.maps.LatLng(result[0].y, result[0].x);
                    const content = document.createElement('div');
                    content.style.cssText = 'padding:5px 10px;background:#FF5A5F;color:white;border-radius:20px;font-weight:bold;';
                    content.innerHTML = 1;
                    const overlay = new kakao.maps.CustomOverlay({ map, position: coords, content, yAnchor: 1 });
                    markers.push(overlay);
                    bounds.extend(coords);
                    map.setBounds(bounds);
                }
            });
        });
    }

    // 안전율 지도
    function toggleSafetyMap() {
        const mapContainer = document.getElementById('map');
        mapContainer.style.display = 'block';
        setTimeout(() => {
            if (!safetyMap) {
                safetyMap = new kakao.maps.Map(mapContainer, {
                    center: new kakao.maps.LatLng(37.566826, 126.9786567),
                    level: 7
                });
            }
            displaySafetyMarkers();
        }, 100);
    }

    function displaySafetyMarkers() {
        if (!safetyMap) return;
        safetyMarkers.forEach(m => m.setMap(null));
        safetyMarkers = [];

        $.ajax({
            url: baseUrl + '/review/safety-map',
            type: 'GET',
            dataType: 'json',
            success: function(data) {
                const bounds = new kakao.maps.LatLngBounds();
                const geocoder = new kakao.maps.services.Geocoder();

                data.forEach(item => {
                    geocoder.addressSearch(item.region, function(result, status) {
                        if (status === kakao.maps.services.Status.OK) {
                            const coords = new kakao.maps.LatLng(result[0].y, result[0].x);
                            const content = document.createElement('div');
                            content.style.cssText = 'padding:5px 10px;background:#4CAF50;color:white;border-radius:20px;font-weight:bold;';
                            content.innerHTML = item.safetyRate.toFixed(1) + '%';
                            const overlay = new kakao.maps.CustomOverlay({ map: safetyMap, position: coords, content, yAnchor: 1 });
                            safetyMarkers.push(overlay);
                            bounds.extend(coords);
                            safetyMap.setBounds(bounds);
                        }
                    });
                });
            },
            error: function(xhr, status, error){
                alert("안전율 데이터 로딩 실패: " + error);
            }
        });
    }
</script>

</body>
</html>
