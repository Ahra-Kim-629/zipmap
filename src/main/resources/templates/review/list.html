<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <title>리뷰 목록</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
        .pagination {
            margin-top: 20px;
            text-align: center;
        }
        .pagination , .pagination strong {
            margin: 0 5px;
            text-decoration: none;
            color: black;
        }
        .pagination strong {
            font-weight: bold;
            color: red;
        }
    </style>
</head>
<body>

    <h1>리뷰 목록</h1>

    <div style="margin-bottom: 10px;">
        <a th:href="@{/review/write}">[리뷰 등록]</a>
    </div>

    <!-- 검색 폼 -->
    <form th:action="@{/review}" th:method="get" style="margin-bottom: 20px;">
        <select name="searchType">
            <option value="title" th:selected="${searchType == 'title'}">제목</option>
            <option value="content" th:selected="${searchType == 'content'}">내용</option>
            <option value="writer" th:selected="${searchType == 'writer'}">작성자</option>
        </select>
        <input type="text" th:value="${keyword}" name="keyword" placeholder="검색어 입력">
        <button type="submit">검색</button>
    </form>

    <!-- 리뷰 테이블 -->
    <table>
        <colgroup>
            <col style="width: 40%">
            <col style="width: 20%">
            <col style="width: 15%">
            <col style="width: 10%">
            <col style="width: 15%">
        </colgroup>
        <thead>
        <tr>
            <th>제목</th>
            <th>주소</th>
            <th>작성자 ID</th>
            <th>평점</th>
            <th>작성일</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="review : ${reviews.content}">
            <td style="text-align: left;">
                <a th:href="@{/review/detail(id=${review.id})}" th:text="${review.title}"></a>
            </td>
            <td th:text="${review.address != null && review.address.contains('동 ') ? review.address.substring(0, review.address.indexOf('동 ') + 1) : review.address}"></td>
            <td th:text="${review.loginId}"></td>
            <td th:text="${review.point}"></td>
            <td th:text="${review.createdAt != null ? #temporals.format(review.createdAt, 'yyyy-MM-dd HH:mm:ss') : ''}"></td>
        </tr>
        </tbody>
    </table>

    <!-- 페이징 -->
    <div class="pagination" th:if="${reviews.totalPages > 0}">
        <!-- 이전 페이지 -->
        <a th:if="${!reviews.first}" th:href="@{/review(page=${reviews.number-1}, searchType=${searchType}, keyword=${keyword})}">&laquo; 이전</a>
        <span th:if="${reviews.first}" style="color: gray;">&laquo; 이전</span>

        <!-- 페이지 번호 -->
        <span th:each="page: ${#numbers.sequence(0, reviews.totalPages-1)}">
            <a th:if="${page != reviews.number}"
               th:href="@{/review(page=${page}, searchType=${searchType}, keyword=${keyword})}"
               th:text="${page+1}"></a>
            <strong th:if="${page == reviews.number}" th:text="${page+1}"></strong>
        </span>

        <!-- 다음 페이지 -->
        <a th:if="${!reviews.last}" th:href="@{/review(page=${reviews.number+1}, searchType=${searchType}, keyword=${keyword})}">다음 &raquo;</a>
        <span th:if="${reviews.last}" style="color: gray;">다음 &raquo;</span>
    </div>

</body>
</html>
