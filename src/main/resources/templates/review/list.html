<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org/">
<head>
  <meta charset="UTF-8">
  <title>리뷰 목록</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <style>
    body { background: #f2f3f7; font-family: 'Noto Sans KR', sans-serif; }
    .container { margin-top: 30px; }

    h2 { font-weight: 700; color: #2c3e50; text-align: center; margin-bottom: 25px; }

    /* 검색폼 반응형 */
    .search-form { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
    .search-form select, .search-form input, .search-form button {
        flex: 1 1 auto;
        min-width: 120px;
        padding: 10px 15px;
        border-radius: 10px;
        border: 1px solid #ccc;
        transition: all 0.3s;
    }
    .search-form button { font-weight: 600; border: none; }
    .search-form .btn-primary { background: #5e72e4; color: #fff; }
    .search-form .btn-primary:hover { background: #324cdd; }
    .btn-success { border-radius: 10px; font-weight: 600; background: #00b894; border: none; transition: all 0.3s; }
    .btn-success:hover { background: #019875; }

    /* 리뷰 카드 */
    .review-card { background: #fff; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.08); padding: 20px; margin-bottom: 20px; transition: transform 0.3s, box-shadow 0.3s; }
    .review-card:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,0.12); }
    .review-title a { font-weight: 700; font-size: 1.1rem; color: #5e72e4; text-decoration: none; }
    .review-title a:hover { text-decoration: underline; }
    .review-meta { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; color: #7f8c8d; font-size: 0.9rem; align-items: center; }

    /* 페이징 */
    .pagination { justify-content: center; margin-top: 20px; }
    .pagination .page-link { color: #5e72e4; font-weight: 600; border-radius: 8px; }
    .pagination .page-item.active .page-link { background-color: #5e72e4; border-color: #5e72e4; color: #fff; }

    /* 지도 모달 */
    #map { width: 100%; height: 300px; border-radius: 10px; }
    @media (min-width: 576px) {
        #map { height: 400px; }
    }
  </style>
</head>
<body>

<div class="container">
  <h2>리뷰 목록</h2>

  <!-- 리뷰 등록 버튼 -->
  <div class="mb-3 text-end">
    <a th:href="@{/review/write}" class="btn btn-success">리뷰 등록</a>
  </div>

  <!-- 검색폼 -->
  <form th:action="@{/review}" th:method="get" class="search-form">
    <select name="searchType" class="form-select">
      <option value="title" th:selected="${searchType == 'title'}">제목</option>
      <option value="content" th:selected="${searchType == 'content'}">내용</option>
      <option value="writer" th:selected="${searchType == 'writer'}">작성자</option>
    </select>
    <input type="text" th:value="${keyword}" name="keyword" class="form-control" placeholder="검색어를 입력하세요.">
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#mapModal">지도 검색</button>
    <button type="submit" class="btn btn-primary">검색</button>
  </form>

  <!-- 리뷰 카드 목록 -->
  <div th:each="review : ${reviews.content}" class="review-card">
    <div class="review-title">
      <a th:href="@{/review/detail(id=${review.id})}" th:text="${review.title}"></a>
    </div>
    <div class="review-meta">
      <span th:text="${review.address != null ? (review.address.contains('동 ') ? review.address.substring(0, review.address.indexOf('동 ') + 1) : review.address) : ''}"></span>
      <span>ID: <span th:text="${review.user_id}"></span></span>
      <span>평점: <span th:utext="${'&#9733;'.repeat(review.point)}"></span></span>
      <span th:text="${#temporals.format(review.created_at, 'yyyy-MM-dd HH:mm:ss')}"></span>
    </div>
  </div>

  <!-- 페이징 -->
  <nav th:if="${reviews.totalPages > 0}" aria-label="Page navigation">
    <ul class="pagination">
      <li class="page-item" th:classappend="${reviews.first} ? 'disabled'">
        <a class="page-link" th:href="@{/review(page=${reviews.number-1}, searchType=${searchType}, keyword=${keyword})}">&laquo;</a>
      </li>
      <li class="page-item" th:each="page: ${#numbers.sequence(0, reviews.totalPages-1)}"
          th:classappend="${page == reviews.number} ? 'active'">
        <a class="page-link"
           th:href="@{/review(page=${page}, searchType=${searchType}, keyword=${keyword})}"
           th:text="${page+1}"></a>
      </li>
      <li class="page-item" th:classappend="${reviews.last} ? 'disabled'">
        <a class="page-link" th:href="@{/review(page=${reviews.number+1}, searchType=${searchType}, keyword=${keyword})}">&raquo;</a>
      </li>
    </ul>
  </nav>
</div>

<!-- 지도 모달 -->
<div class="modal fade" id="mapModal" tabindex="-1" aria-labelledby="mapModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="mapModalLabel">지도 검색</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div id="map"></div>
      </div>
    </div>
  </div>
</div>

<!-- 카카오 지도 API -->
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=YOUR_APP_KEY&libraries=services"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  var mapModal = document.getElementById('mapModal');
  mapModal.addEventListener('shown.bs.modal', function () {
      var container = document.getElementById('map');
      var options = { center: new kakao.maps.LatLng(37.5665, 126.9780), level: 5 };
      var map = new kakao.maps.Map(container, options);

      var geocoder = new kakao.maps.services.Geocoder();
      var keyword = document.querySelector('input[name="keyword"]').value;
      if(keyword) {
          geocoder.addressSearch(keyword, function(result, status) {
              if (status === kakao.maps.services.Status.OK) {
                  var coords = new kakao.maps.LatLng(result[0].y, result[0].x);
                  new kakao.maps.Marker({ map: map, position: coords });
                  map.setCenter(coords);
              }
          });
      }
  });
</script>

</body>
</html>
