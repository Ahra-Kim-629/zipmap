<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>리뷰 작성 페이지</title>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>
</head>
<body>
<div class="container">
    <h2>리뷰 작성</h2>
    <form th:action="@{/review/write}" method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label for="title">제목</label>
            <input type="text" class="form-control" id="title" name="title" required>
        </div>

        <div class="form-group">
            <label for="address">주소</label>
            <input type="text" class="form-control" id="address" name="address" required>
        </div>

        <div class="form-group">
            <label for="point">별점</label>
            <select class="form-control" id="point" name="point" required>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>
        </div>

        <div class="form-group">
            <p class="pros">장점</p>
            <label><input type="checkbox" id="lighting" name="prosList" value="채광">채광</label>
            <label><input type="checkbox" id="heating" name="prosList" value="난방">난방</label>
            <label><input type="checkbox" id="drainage" name="prosList" value="배수">배수</label>
            <label><input type="checkbox" id="hot_water" name="prosList" value="온수">온수</label>
            <label><input type="checkbox" id="water_pressure" name="prosList" value="수압">수압</label>
            <label><input type="checkbox" id="mold" name="prosList" value="곰팡이">곰팡이</label>
            <label><input type="checkbox" id="insect" name="prosList" value="해충">해충</label>
            <label><input type="checkbox" id="noise" name="prosList" value="소음">소음</label>
            <label><input type="checkbox" id="safety" name="prosList" value="치안">치안</label>
            <label><input type="checkbox" id="landlord" name="prosList" value="집주인">집주인</label>

            <p class="cons">단점</p>
            <label><input type="checkbox" id="c_lighting" name="consList" value="채광">채광</label>
            <label><input type="checkbox" id="c_heating" name="consList" value="난방">난방</label>
            <label><input type="checkbox" id="c_drainage" name="consList" value="배수">배수</label>
            <label><input type="checkbox" id="c_hot_water" name="consList" value="온수">온수</label>
            <label><input type="checkbox" id="c_water_pressure" name="consList" value="수압">수압</label>
            <label><input type="checkbox" id="c_mold" name="consList" value="곰팡이">곰팡이</label>
            <label><input type="checkbox" id="c_insect" name="consList" value="해충">해충</label>
            <label><input type="checkbox" id="c_noise" name="consList" value="소음">소음</label>
            <label><input type="checkbox" id="c_safety" name="consList" value="치안">치안</label>
            <label><input type="checkbox" id="c_landlord" name="consList" value="집주인">집주인</label>

        </div>


        <div class="form-group">
            <label for="content">내용</label>
            <textarea class="form-control" id="content" name="content" rows="20" cols="40" required></textarea>
        </div>

        <button type="submit" class="btn btn-primary">작성</button>

    </form>

    <a th:href="@{/review/list}">작성취소/ 리뷰목록으로 이동</a>

</div>

<script>
    $(document).ready(function() {
        $('#content').summernote({
            height: 400,                 // 에디터 높이
            lang: 'ko-KR',               // 언어 설정 (한글 패키지 추가 시)
            placeholder: '내용을 입력해주세요.',
            callbacks: {
                // 이미지를 업로드했을 때 실행되는 함수
                onImageUpload: function(files) {
                    // 올려진 파일 개수만큼 반복해서 서버에 보내기
    for (let i = 0; i < files.length; i++) {
        uploadSummernoteImage(files[i], this);
    }
                }
            }
        });
    });

    // 이미지를 서버에 저장하고 주소를 받아오는 Ajax 함수
    function uploadSummernoteImage(file, editor) {
        let data = new FormData();
        data.append("file", file);
        $.ajax({
            url: "/review/uploadSummernoteImage",
            type: "POST",
            data: data,
            contentType: false,
            processData: false,
            success: function(response) {
                // 서버가 알려준 이미지 주소를 본문에 삽입
                $(editor).summernote('insertImage', response.url);
            }
        });
    }
</script>
</body>
</html>
