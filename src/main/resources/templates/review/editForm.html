<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>리뷰 수정 페이지</title>

    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>
</head>
<body>
<div class="container">
    <h2>리뷰 수정</h2>
    <form th:action="@{|/review/edit/${reviewDTO.id}|}" method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label for="title">제목</label>
            <input type="text" class="form-control" id="title" name="title" th:value="${reviewDTO.title}">
        </div>

        <div class="form-group">
            <label for="address">주소</label>
            <input type="text" class="form-control" id="address" name="address" th:value="${reviewDTO.address}">
        </div>

        <div class="form-group">
            <label for="point">별점</label>
            <select class="form-control" id="point" name="point" th:value="${reviewDTO.point}">
                <option value="1" th:selected="${reviewDTO.point == 1}">1</option>
                <option value="2" th:selected="${reviewDTO.point == 2}">2</option>
                <option value="3" th:selected="${reviewDTO.point == 3}">3</option>
                <option value="4" th:selected="${reviewDTO.point == 4}">4</option>
                <option value="5" th:selected="${reviewDTO.point == 5}">5</option>
            </select>
        </div>

        <div class="form-group">
            <p class="pros"><b>장점</b></p>
            <th:block th:each="item : ${ {'채광', '난방', '배수', '온수', '수압', '곰팡이', '해충', '소음', '치안', '집주인'} }">
                <label>
                    <input type="checkbox" name="prosList" th:value="${item}"
                           th:checked="${reviewDTO.prosList != null and #lists.contains(reviewDTO.prosList, item)}">[[${item}]]
                </label>
            </th:block>

            <p class="cons"><b>단점</b></p>
            <th:block th:each="item : ${ {'채광', '난방', '배수', '온수', '수압', '곰팡이', '해충', '소음', '치안', '집주인'} }">
                <label>
                    <input type="checkbox" name="consList" th:value="${item}"
                           th:checked="${reviewDTO.consList != null and #lists.contains(reviewDTO.consList, item)}">[[${item}]]
                </label>
            </th:block>
        </div>

        <div class="form-group">
            <label for="content">내용</label>
            <textarea class="form-control" id="content" name="content" rows="10" th:text="${reviewDTO.content}" required></textarea>
        </div>

        <button type="submit" class="btn btn-primary">수정 완료</button>
        <a th:href="@{|/review/detail/${reviewDTO.id}|}" class="btn btn-secondary">수정 취소</a>
    </form>
</div>

<script>
    $(document).ready(function() {
        $('#content').summernote({
            height: 400,
            lang: 'ko-KR',
            placeholder: '내용을 입력해주세요.',
            callbacks: {
                // 1. 이미지 업로드 시
                onImageUpload: function(files) {
                    for (let i = 0; i < files.length; i++) {
                        uploadSummernoteImage(files[i], this);
                    }
                },
                // 2. 이미지 삭제 시 (x 버튼)
                onMediaDelete: function(target) {
                    deleteSummernoteImage(target[0].src);
                }
            }
        });
    });

    // [이미지 업로드 함수]
    function uploadSummernoteImage(file, editor) {
        let data = new FormData();
        data.append("file", file);

        // 헤더 토큰 가져오기
        var token = $("meta[name='_csrf']").attr("content");
        var header = $("meta[name='_csrf_header']").attr("content");

        $.ajax({
            url: "/review/uploadSummernoteImage",
            type: "POST",
            data: data,
            contentType: false,
            processData: false,
            // ★★★ 핵심: 전송 전에 헤더에 보안 키 심기 ★★★
            beforeSend: function(xhr) {
                if (token && header) {
                    xhr.setRequestHeader(header, token);
                }
            },
            success: function(response) {
                // 에디터에 이미지 태그 삽입
                $(editor).summernote('insertImage', response.url);
            },
            error: function(e) {
                console.error(e);
                alert("이미지 업로드 실패 (관리자에게 문의하세요)");
            }
        });
    }

    // [이미지 삭제 함수] - 에디터에서 지울 때 서버 파일도 삭제
    function deleteSummernoteImage(src) {
        var token = $("meta[name='_csrf']").attr("content");
        var header = $("meta[name='_csrf_header']").attr("content");

        $.ajax({
            data: {src: src},
            type: "POST",
            url: "/review/deleteSummernoteImage",
            beforeSend: function(xhr) {
                if (token && header) {
                    xhr.setRequestHeader(header, token);
                }
            },
            success: function(response) {
                console.log("파일 삭제 성공");
            }
        });
    }
</script>
</body>
</html>
