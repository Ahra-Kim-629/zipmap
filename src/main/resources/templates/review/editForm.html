<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>리뷰 수정 페이지</title>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>
</head>
<body>
    <div class="container">
        <h2>리뷰 수정</h2>
        <form th:action="@{|/review/edit/${reviewDTO.id}}|" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label for="title">제목</label>
                <input type="text" class="form-control" id="title" name="title" th:value="${reviewDTO.title}">
            </div>

            <div class="form-group">
                <label for="address">주소</label>
                <input type="text" class="form-control" id="address" name="address" th:value="${reviewDTO.address}">
            </div>

            <div class="form-group">
                <label for="point">별점</label>
                <select class="form-control" id="point" name="point" th:value="${reviewDTO.point}">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>

            <div class="form-group">
                <p class="pros"><b>장점 (기존 선택한 항목들이 표시됩니다.)</b></p>
                <th:block th:each="item : ${ {'채광', '난방', '배수', '온수', '수압', '곰팡이', '해충', '소음', '치안', '집주인'} }">
                    <label>
                        <input type="checkbox" name="prosList" th:value="${item}"
                            th:checked="${#lists.contains(reviewDTO.prosList, item)}">[[${item}]]
                    </label>
                </th:block>

                <p class="cons"><b>단점 (기존 선택한 항목들이 표시됩니다.)</b></p>
                <th:block th:each="item : ${ {'채광', '난방', '배수', '온수', '수압', '곰팡이', '해충', '소음', '치안', '집주인'} }">
                    <label>
                        <input type="checkbox" name="consList" th:value="${item}"
                            th:checked="${#lists.contains(reviewDTO.consList, item)}">[[${item}]]
                    </label>
                </th:block>
            </div>

            <div class="form-group">
                <label for="content">내용</label>
                <textarea class="form-control" id="content" name="content" rows="10" th:text="${reviewDTO.content}" required></textarea>
            </div>

            <div class="form-group">
                <p><b>첨부 파일 관리</b></p>
                <!-- 기존 파일 없는 경우 -->
                <div th:if="${#lists.isEmpty(reviewDTO.fileList)}">
                    <p>첨부된 파일이 없습니다.</p>
                </div>
                <!-- 기존 파일 있는 경우 -->
                <div th:if="${not #lists.isEmpty(reviewDTO.fileList)}">
                <div th:each="file : ${reviewDTO.fileList}" th:id="|file-card-${file.id}|" style="margin-bottom: 10px; border: 1px solid #ddd; padding: 10px;">
                    <!-- 이미지 파일인 경우 미리보기 -->
                    <div th:if="${#strings.endsWith(file.filePath,'.jpg')
                    or #strings.endsWith(file.filePath,'.png')
                    or #strings.endsWith(file.filePath,'.gif')}">
                        <img width="100" th:src="@{/display(fileId=${file.filePath})}" class="img-thumbnail" alt="첨부된 파일">
                        <button type="button" th:onclick="|deleteFile(fileId=${file.id})|" class="btn btn-sm btn-danger">삭제</button>
                    </div>

                    <!-- 이미지 파일이 아닌 경우 -->
                    <p th:text="${file.id}"></p>
                </div>
                </div>

                <div class="form-group">
                    <label for="newFile">새 파일 추가/교체 : </label>
                    <input type="file" class="form-control-file" id="newFile" name="files" multiple>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">수정 완료</button>
            <a th:href="@{|/review/detail/${reviewDTO.id}|}" class="btn btn-secondary">수정 취소</a>
        </form>
    </div>


<script>

    $(document).ready(function() {
    $('#content').summernote({
        height: 400,
        lang: 'ko-KR',
        placeholder: '내용을 입력해주세요.',
        callbacks: {
            onImageUpload: function(files) {
                // 올려진 파일 개수만큼 반복해서 서버에 보내기
    for (let i = 0; i < files.length; i++) {
        uploadSummernoteImage(files[i], this);
    }
            }
        }
    });
});

function uploadSummernoteImage(file, editor) {
    let data = new FormData();
    data.append("file", file);
    $.ajax({
        url: "/review/uploadSummernoteImage", // 아까 만든 컨트롤러 그대로 사용
        type: "POST",
        data: data,
        contentType: false,
        processData: false,
        success: function(response) {
            $(editor).summernote('insertImage', response.url);
        }
    });
}

    function deleteFile(fileId) {
    if (!confirm("정말 이 파일을 삭제하시겠습니까?")) return;

    $.ajax({
        url: "/review/deleteFile/" + fileId,
        type: "POST",
        success: function(result) {
            if (result === "success") {
                // 서버에서 삭제 성공하면 화면에서도 해당 파일 박스를 안 보이게 숨김
                $('#file-card-' + fileId).remove();
                alert("파일이 삭제되었습니다.");
            }
        },
        error: function() {
            alert("파일 삭제에 실패했습니다.");
        }
    });
}
</script>
</body>
</html>
